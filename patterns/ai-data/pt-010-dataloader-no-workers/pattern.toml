[meta]
id = "pt-010"
name = "dataloader-no-workers"
category = "ai-data"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is PyTorch DataLoader instantiated with num_workers=0 or without specifying num_workers for training on large datasets?

"""

explanation = """
Using num_workers=0 (or omitting it, which defaults to 0) forces single-process data loading, creating a bottleneck where the GPU waits idle while data is loaded. Setting num_workers to 2-8 enables multi-process data loading, significantly improving training throughput by pre-fetching batches while the GPU trains.

"""

tags = ["pytorch", "data-loading", "performance", "dataloader"]
related_patterns = []
references = ["https://pytorch.org/docs/stable/data.html#multi-process-data-loading"]

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. DataLoader explicitly setting num_workers=0 in training context:
   - DataLoader(dataset, batch_size=64, shuffle=True, num_workers=0)
   - loader = DataLoader(..., num_workers=0, ...) used for model training
   - Training loop iterating over loader with num_workers=0

2. DataLoader created without num_workers parameter (defaults to 0):
   - DataLoader(train_dataset, batch_size=128, shuffle=True) missing num_workers
   - loader = DataLoader(dataset, batch_size=32) in training pipeline
   - No num_workers specified for training data loading

Answer NO if:
- DataLoader sets num_workers to any value > 0 (num_workers=2, num_workers=4, etc.)
- Using num_workers=0 conditionally for debugging (if debug: num_workers=0 else: 4)
- DataLoader is only for small inference/validation workloads (not training)
- Context suggests this is debugging code or small dataset testing

Context exclusions:
- Skip if num_workers=0 only in debug/test mode with production config using workers
- Skip if the dataset is demonstrably tiny (< 100 samples) or for quick inference
- Skip if there's a comment explaining num_workers=0 is intentional for debugging
- Skip DataLoaders used only for validation/testing on small batches
"""

warning_message = """
DataLoader with num_workers=0 forces single-process data loading, creating a bottleneck where the GPU idles while waiting for data. Set num_workers to 2-8 (based on CPU cores) to enable multi-process data loading with prefetching, significantly improving training throughput.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

