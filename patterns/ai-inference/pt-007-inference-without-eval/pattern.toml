description = """
Proper inference requires BOTH model.eval() AND torch.no_grad(). Missing model.eval() leaves dropout active and batchnorm updating. Missing torch.no_grad() wastes memory storing gradients. Both are needed for correct and efficient inference.
"""

explanation = """
Missing model.eval() disables dropout incorrectly and changes batchnorm behavior. Missing torch.no_grad() wastes memory storing activations. Both are needed during evaluation.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find inference functions (call model() without loss.backward()).
Is model.eval() MISSING or is torch.no_grad() MISSING?

YES = eval() is MISSING or no_grad() is MISSING (BUG)
NO = has BOTH eval() AND no_grad(), OR no inference functions exist
"""

warning_message = """
Missing model.eval() disables dropout incorrectly and changes batchnorm behavior. Missing torch.no_grad() wastes memory storing activations. Both are needed during evaluation.

"""

