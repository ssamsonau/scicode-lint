# Pattern: pt-011-unbatched-gpu-inference
# Fixed: Pattern was misnamed as "device-mismatch" but detects unbatched GPU inference.

[meta]
id = "pt-011"
name = "unbatched-gpu-inference"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-06"
author = "scicode-lint"

description = """
Sending the entire test dataset to GPU in a single forward pass causes out-of-memory errors on large datasets. Process data in batches using a DataLoader to avoid OOM and enable efficient GPU utilization.
"""

explanation = """
Sending the entire test set to GPU at once causes OOM on large datasets. Evaluate in batches.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze GPU inference for memory efficiency.

Sending entire test datasets to GPU in a single forward pass causes out-of-memory errors on large datasets. GPU memory is limited and cannot hold millions of samples at once.

Correct approach: Process data in batches using DataLoader or manual batch loops.

Does this code pass entire datasets to GPU without batching?

Look for:
- model(X_test.cuda()) or model(X_test.to(device)) on full dataset
- Entire test set moved to GPU before single forward pass
- No DataLoader or batch loop for evaluation

YES = Bug found: entire dataset sent to GPU in single forward pass
NO = Correct: batched evaluation using DataLoader or batch loops
"""

warning_message = """
Sending the entire test set to GPU at once causes OOM on large datasets. Evaluate in batches.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/entire_dataset_to_gpu.py"
description = "Evaluation functions that move entire test dataset to GPU in a single operation without batching"
expected_issue = "The evaluate_on_test_set and run_inference functions load all test data to GPU at once, which will cause OOM errors on large datasets"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "evaluate_on_test_set"
snippet = "test_images = test_images.to(device)"

[[tests.positive]]
file = "test_positive/single_forward_pass.py"
description = "Test functions that perform single forward pass on entire test set loaded to GPU"
expected_issue = "The test_model and predict_all functions move complete datasets to GPU without batching, risking memory overflow"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "test_model"
snippet = "X_test = X_test.cuda()"

[[tests.negative]]
file = "test_negative/batched_evaluation.py"
description = "Properly batched evaluation using data loaders to process test set in chunks"

[[tests.negative]]
file = "test_negative/proper_batch_processing.py"
description = "Correct implementation using DataLoader for batch-wise GPU processing"


# === Auto-generated entries (review and update) ===
[[tests.positive]]
file = "test_positive/real_time_processor.py"
description = "Real-time inference that processes individual items without buffering, sending each sample to GPU separately instead of batching"
expected_issue = "The process_stream and RealtimeClassifier functions handle each item individually and send it to GPU, which is inefficient for throughput but acceptable for true streaming if latency is critical"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "process_stream"
snippet = "model.to(device)"

[[tests.negative]]
file = "test_negative/real_time_processor_batched.py"
description = "Real-time inference with buffering that accumulates samples into batches before GPU processing, improving throughput while maintaining streaming capability"
