[meta]
id = "pt-017"
name = "jit-trace-control-flow"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using torch.jit.trace() on models with data-dependent control flow produces incorrect results. Tracing only captures the execution path taken during trace time - branches not executed are silently omitted.
"""

explanation = """
torch.jit.trace() records operations for a specific input. If your model has if-statements or loops that depend on input values, use torch.jit.script() instead.
"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze JIT tracing for control flow issues.

torch.jit.trace() records the operations executed for a single example input. If a model contains data-dependent control flow (if statements based on tensor values, variable-length loops), tracing will only capture one execution path.

For models with control flow, use torch.jit.script() instead.
torch.jit.trace() is only safe for models with fixed computation graphs.

Does this code trace a model with data-dependent control flow?

Look for:
- torch.jit.trace() on functions/modules with if statements on tensor values
- Traced models with loops that depend on input data

YES = Bug found: jit.trace() on model with data-dependent control flow
NO = Correct: using jit.script(), or model has no data-dependent control flow
"""

warning_message = """
torch.jit.trace() on models with data-dependent control flow produces incorrect results. Use torch.jit.script() for models with if-statements or variable loops.
"""

min_confidence = 0.85
false_positive_risks = []

