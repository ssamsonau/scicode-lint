[meta]
id = "ml-001"
name = "scaler-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when a scaler, normalizer, or encoder is fit on the full dataset (including test data) before splitting into train/test sets. This causes the model's validation metrics to be overly optimistic because test set information leaked into the preprocessing step.
"""

explanation = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for data leakage from scalers/normalizers. Answer YES ONLY if you see EXPLICIT evidence of:
1. torch.cat([train, test]) or np.concatenate([train, test]) or pd.concat() combining train and test, THEN fitting on the combined data, OR
2. fit() or fit_transform() called on data BEFORE train_test_split() is called, OR
3. all_data = ... combining train+test, followed by all_data.mean(), all_data.std(), etc.

Answer NO if:
- scaler.fit(train_data) or train_data.mean() (fitting/stats on train data only)
- Function parameters suggest already-split data (train_data, test_data parameters) with no combining operations visible in the function
"""

warning_message = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]
