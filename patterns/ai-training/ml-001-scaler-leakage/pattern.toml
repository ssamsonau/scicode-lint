# Pattern: ml-001-scaler-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-001"
name = "scaler-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when a scaler, normalizer, or encoder is fit on the full dataset (including test data) before splitting into train/test sets. This causes the model's validation metrics to be overly optimistic because test set information leaked into the preprocessing step.
"""

explanation = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for scaler.fit() or fit_transform() or manual mean()/std()/min()/max() calls.
Is "test" data (named test_data, X_test, test_set, etc.) used BEFORE the statistics are computed?

Check for:
1. Variables named "test" concatenated with train BEFORE fit/statistics
2. fit_transform() called BEFORE train_test_split()
3. Manual stats on combined train+test arrays

YES = test data is included in preprocessing statistics (data leakage)
NO = test data is NOT used in statistics computation
"""

warning_message = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

min_confidence = 0.85
false_positive_risks = []

