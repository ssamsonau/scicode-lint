[meta]
id = "ml-001"
name = "scaler-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when a scaler, normalizer, or encoder is fit on the full dataset (including test data) before splitting into train/test sets. This causes the model's validation metrics to be overly optimistic because test set information leaked into the preprocessing step.
"""

explanation = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find scaler.fit() or fit_transform() calls in the code.
Is scaler fit() called BEFORE train/test split (on full data)?

YES = fit() called on FULL data BEFORE train_test_split (BUG)
NO = fit() on train-only data, OR no scaler exists
"""

warning_message = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]
