# Pattern: ml-002-target-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-002"
name = "target-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Target leakage occurs when a feature is derived from or directly uses the target variable (y). Common examples: creating a category from y.mean(), using target statistics as features, or encoding y-derived information into X.
"""

explanation = """
Target leakage: features contain information derived from the target variable. The model essentially sees the answer in the input, leading to unrealistic performance.
"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Does this code create features derived from the target variable y?

Check for: df['feature'] = ... y ... where y values are used to compute X features.

YES = Found: features computed from y (target encoding, y.mean(), groupby y)
NO = Clean: y only used for model.fit(X, y), not to create features
"""

warning_message = """
Target leakage: feature created from target variable y. Remove this feature - it contains the answer.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]
# Test cases for ml-002-target-leakage

[[tests.positive]]
file = "test_positive/feature_derived_from_target.py"
description = "Feature created from target variable using groupby transform"
expected_issue = "Target leakage: feature derived from target variable"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "create_target_derived_feature"
snippet = "df.groupby('category')['target'].transform('mean')"

[[tests.negative]]
file = "test_negative/no_target_derived_features.py"
description = "Features derived from other features, not from target"

[[tests.context_dependent]]
file = "test_context_dependent/target_encoding_in_training.py"
