[meta]
id = "ml-002"
name = "target-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when feature selection (e.g., SelectKBest, mutual information, correlation filtering) is performed on the full dataset before cross-validation or train/test splitting. This causes the model to use information from the test set to choose features, leading to overly optimistic performance estimates.
"""

explanation = """
Data leakage: features are selected using information from the test set. Move feature selection inside each CV fold or after the split.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Is feature selection (e.g., SelectKBest, mutual_info, correlation filtering) performed on the full dataset before cross-validation or train/test splitting?

"""

warning_message = """
Data leakage: features are selected using information from the test set. Move feature selection inside each CV fold or after the split.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

