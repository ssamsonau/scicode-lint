related_patterns = []
references = []

[detection]
question = """
Find groupby().mean() or target encoding on target column.
Is target encoding computed BEFORE train/test split?

YES = target encoding on FULL data BEFORE split (BUG)
NO = encoding computed from train data only, OR no target encoding exists
"""

warning_message = """
Data leakage: target-derived features encode test set information. Compute features only on training data.

"""

