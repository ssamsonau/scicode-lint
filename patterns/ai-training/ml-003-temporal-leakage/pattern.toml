updated = "2026-03-03"
author = "scicode-lint"

description = """
Are any features derived from the target variable or computed using statistics of the full dataset before the train/test split?

"""

explanation = """
Data leakage: target-derived features encode test set information. Compute features only on training data.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for target leakage where statistics are computed from the FULL dataset (including test data). Answer YES ONLY if:

1. df.groupby('category')['target'].mean() (or similar target encoding) happens BEFORE train_test_split(), OR
2. Statistics like y.mean(), y.std(), or target-based calculations occur on the FULL dataset BEFORE splitting

Answer NO if:
- The split happens FIRST, THEN target statistics are computed only from y_train or X_train
- Target means/statistics are computed from training data and APPLIED to test data (this is correct!)
- Example CORRECT: train_means = X_train.groupby()['target'].mean(); X_test['feature'] = X_test.map(train_means)
"""

warning_message = """
Data leakage: target-derived features encode test set information. Compute features only on training data.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

