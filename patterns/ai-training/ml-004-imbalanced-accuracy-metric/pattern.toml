[meta]
id = "ml-004"
name = "imbalanced-accuracy-metric"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using accuracy as an evaluation metric on imbalanced classification problems is misleading. When classes are imbalanced (e.g., 95% negative, 5% positive), a model that always predicts the majority class achieves high accuracy while being completely useless. Appropriate metrics include precision, recall, F1-score, or AUC-ROC.
"""

explanation = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze evaluation metrics for imbalanced classification.

Accuracy is misleading on imbalanced data. With 95% negative / 5% positive, predicting all-negative achieves 95% accuracy while being useless. Appropriate metrics: F1-score, precision/recall, AUC-ROC.

Does this code use accuracy on imbalanced classes?

Look for:
- accuracy_score() or scoring="accuracy" with class imbalance
- High majority class ratio (80/20 or more skewed)
- Classification task without appropriate metrics (F1, AUC, precision, recall)

YES = Bug found: accuracy used on imbalanced classification
NO = Correct: appropriate metrics (F1/AUC/precision/recall), or balanced classes
"""

warning_message = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

min_confidence = 0.85
false_positive_risks = []

