updated = "2026-03-03"
author = "scicode-lint"

description = """
Temporal leakage occurs when KFold or cross-validation with shuffle=True is used on time-series data. Shuffling breaks temporal ordering, causing the model to train on future data to predict the past, leading to unrealistic performance estimates. Use TimeSeriesSplit for time-series data to respect temporal ordering.
"""

explanation = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for temporal leakage in cross-validation. Answer YES only if you see:
1. KFold(shuffle=True) or cross_val_score with shuffle=True, AND
2. Evidence of temporal/time-series data such as: date columns ('date', 'timestamp'), time-based features ('open', 'close', 'price'), sort_values('date'), or sequential data

Answer NO if TimeSeriesSplit is used, or if shuffle=False, or if data is clearly not temporal (images, independent samples).
"""

warning_message = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

