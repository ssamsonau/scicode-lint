[meta]
id = "ml-005"
name = "cv-temporal-shuffle"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Temporal leakage occurs when KFold or cross-validation with shuffle=True is used on time-series data. Shuffling breaks temporal ordering, causing the model to train on future data to predict the past, leading to unrealistic performance estimates. Use TimeSeriesSplit for time-series data to respect temporal ordering.
"""

explanation = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

tags = ["sklearn", "cross-validation", "time-series", "temporal-data"]
related_patterns = ["ml-006"]
references = ["https://scikit-learn.org/stable/modules/cross_validation.html#time-series-split"]

[detection]
question = """
Analyze cross-validation setup for time-series data.

Shuffling time-series data in cross-validation causes temporal leakage: the model trains on future data to predict the past. This produces unrealistic performance estimates.

Correct approach: Use TimeSeriesSplit or shuffle=False to respect temporal ordering.

Does this code shuffle time-series data in cross-validation?

Look for:
- KFold(shuffle=True) or default shuffle on temporal data
- cross_val_score() without TimeSeriesSplit on time-series
- Date/time columns indicating temporal data with shuffled CV

YES = Bug found: shuffled cross-validation on time-series data
NO = Correct: TimeSeriesSplit used, or shuffle=False, or non-temporal data
"""

warning_message = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

min_confidence = 0.85
false_positive_risks = []

