description = """
Is there a shift(-1), shift(-N), or rolling/expanding window operation that could pull future values into the current row as a feature?

"""

explanation = """
Temporal leakage: shift or rolling operation may use future data as a feature. Verify the direction — the model may literally see the answer.

"""

tags = []
related_patterns = ["ml-003-temporal-leakage", "ml-005-cv-temporal-shuffle"]
references = []

[detection]
question = """
Look for future data leakage from shift operations. Answer YES only if you see:
1. shift() with NEGATIVE values (shift(-1), shift(-N)), OR
2. diff() with NEGATIVE values (diff(-1)), OR
3. rolling() with center=True which uses future values

Answer NO if shift/diff use POSITIVE values (shift(1), shift(N)) or if rolling has center=False or is not specified.
"""

warning_message = """
Temporal leakage: shift or rolling operation may use future data as a feature. Verify the direction — the model may literally see the answer.

"""

