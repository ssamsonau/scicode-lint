[meta]
id = "pt-001"
name = "missing-train-mode"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Training after model.eval() without calling model.train() first leaves dropout and batch normalization in evaluation mode, causing incorrect behavior.
"""

explanation = """
After calling model.eval() for validation, you must call model.train() before resuming training. Without this, dropout layers won't drop units and batch norm uses running statistics instead of batch statistics, resulting in poor model performance.
"""

tags = ["pytorch", "training", "dropout", "batch-normalization"]
related_patterns = ["pt-007"]
references = []

[detection]
question = """
Does training code run after model.eval() without model.train() in between?

Check for: model.eval() ... loss.backward() ... with NO model.train() between them.

YES = Found: training (backward/step) after eval() without train() call
NO = Clean: model.train() called between eval() and training, or no eval before training
"""

warning_message = """
Missing model.train() after model.eval(): Training continues with dropout and batch normalization in evaluation mode. Call model.train() after validation blocks before resuming training.
"""

min_confidence = 0.85
false_positive_risks = []

