[meta]
id = "pt-001"
name = "missing-train-mode"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is there a training loop where model.train() is missing before training, or where model.train() is not called after model.eval() to resume training?
"""

explanation = """
Missing model.train() causes dropout and batch normalization to remain in evaluation mode during training. This leads to incorrect behavior: dropout layers won't drop units, and batch norm uses running statistics instead of batch statistics, resulting in poor model performance.
"""

tags = ["pytorch", "training", "dropout", "batch-normalization"]
related_patterns = ["pt-002"]
references = []

[detection]
question = """
Does the code perform PyTorch model training (has optimizer.step() and loss.backward()) but never calls model.train() in the visible code?
"""

warning_message = """
Missing model.train(): Dropout and batch normalization layers remain in evaluation mode during training. Dropout won't drop units and batch norm uses running statistics instead of batch statistics. Call model.train() before training and after any evaluation blocks.
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

