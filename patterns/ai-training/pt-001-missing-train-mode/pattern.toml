created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Training without calling model.train() leaves dropout and batch normalization in evaluation mode, causing incorrect behavior. Dropout won't drop units and batch norm uses running statistics instead of batch statistics.
"""

explanation = """
Missing model.train() causes dropout and batch normalization to remain in evaluation mode during training. This leads to incorrect behavior: dropout layers won't drop units, and batch norm uses running statistics instead of batch statistics, resulting in poor model performance.
"""

tags = ["pytorch", "training", "dropout", "batch-normalization"]
related_patterns = ["pt-007"]
references = []

[detection]
question = """
Find training loops (loss.backward() + optimizer.step()) in the code.
Is model.train() MISSING before the training loop?

YES = model.train() is MISSING before training (BUG)
NO = model.train() is called before training, OR no training loops exist
"""

warning_message = """
Missing model.train(): Dropout and batch normalization layers remain in evaluation mode during training. Dropout won't drop units and batch norm uses running statistics instead of batch statistics. Call model.train() before training and after any evaluation blocks.
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

