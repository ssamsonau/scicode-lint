[meta]
id = "pt-003"
name = "inplace-leaf-variable"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
In-place operations on leaf variables or input tensors that require gradients break PyTorch's autograd graph. This causes a runtime error during backward() because the tensor version has changed.
"""

explanation = """
In-place operations on leaf variables modify tensors that require gradients, which breaks PyTorch's autograd graph. This causes a runtime error: 'a leaf Variable that requires grad is being used in an in-place operation'. Avoid in-place operations (add_, sub_, mul_, div_, etc.) on inputs or parameters that need gradients.
"""

tags = ["pytorch", "gradients", "autograd", "in-place-operations"]
related_patterns = []
references = []

[detection]
question = """
Find in-place operations (+=, -=, *=, /=, add_(), sub_(), mul_(), div_()) on tensors in the code.
Does the tensor have requires_grad=True or is it an input to forward()?

YES = in-place op found on tensor WITH requires_grad=True (BUG)
NO = in-place ops only on detached/no-grad tensors, OR no in-place ops exist
"""

warning_message = """
In-place operation on leaf variable: In-place operations modify tensors with requires_grad=True, breaking the autograd graph. This will cause a runtime error during backward(). Use non-in-place operations instead (e.g., x = x + y instead of x.add_(y)).
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

