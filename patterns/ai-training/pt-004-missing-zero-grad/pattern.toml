updated = "2026-03-03"
author = "scicode-lint"

description = """
Missing optimizer.zero_grad() in training loops causes gradients to accumulate across batches instead of being reset. This leads to incorrect gradient updates, exploding gradients, and NaN losses.
"""

explanation = """
Missing optimizer.zero_grad() causes gradients to accumulate across batches instead of being reset. This leads to incorrect gradient updates, exploding gradients, and NaN losses. Always call optimizer.zero_grad() before each loss.backward().
"""

tags = ["pytorch", "gradients", "optimizer", "training"]
related_patterns = ["pt-012"]
references = ["https://pytorch.org/docs/stable/optim.html#torch.optim.Optimizer.zero_grad"]

[detection]
question = """
Analyze the PyTorch training loop structure.

WHY THIS MATTERS: PyTorch accumulates gradients by default. Without clearing gradients before each backward(), gradients from previous batches add up, causing incorrect updates, exploding gradients, and NaN losses.

Does this code have missing or misplaced zero_grad()?

Look for:
- Training loop with backward() but no zero_grad() call
- zero_grad() called once before the batch loop instead of inside each batch iteration
- Manual gradient clearing done outside the per-batch iteration

CORRECT pattern (zero_grad inside batch loop):
  for batch in loader:      # batch loop
      optimizer.zero_grad() # inside batch loop - CORRECT
      ...
      loss.backward()

BUG pattern (zero_grad outside batch loop):
  optimizer.zero_grad()     # outside - BUG
  for batch in loader:
      loss.backward()

Check indentation carefully: zero_grad() must be INSIDE the loop that iterates over batches.

YES = Bug found: zero_grad() is missing or called outside the per-batch loop
NO = Correct: zero_grad() is called inside the batch loop before backward()
"""

warning_message = """
Missing optimizer.zero_grad(): Gradients accumulate across batches instead of being reset. This causes incorrect updates, exploding gradients, and NaN losses. Call optimizer.zero_grad() before each backward() in your training loop.
"""

