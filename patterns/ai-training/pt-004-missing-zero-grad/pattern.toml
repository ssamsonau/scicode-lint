[meta]
id = "pt-004"
name = "missing-zero-grad"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is there a training loop where optimizer.zero_grad() is missing or not called before each backward pass?
"""

explanation = """
Missing optimizer.zero_grad() causes gradients to accumulate across batches instead of being reset. This leads to incorrect gradient updates, exploding gradients, and NaN losses. Always call optimizer.zero_grad() before each loss.backward().
"""

tags = ["pytorch", "gradients", "optimizer", "training"]
related_patterns = []
references = []

[detection]
question = """
Look for training loops with missing or incorrectly placed optimizer.zero_grad().

Answer YES ONLY if you see EXPLICIT evidence of:
1. Training loop with "loss.backward()" and "optimizer.step()" BUT no "optimizer.zero_grad()" anywhere in the same loop scope
2. "optimizer.zero_grad()" or "p.grad.zero_()" called OUTSIDE the batch loop (before all epochs start) BUT not called INSIDE the loop before each backward()
3. Loop contains "loss.backward()" with "optimizer.step()" but gradient clearing appears after backward() instead of before it

Answer NO if:
- "optimizer.zero_grad()" appears in the batch loop BEFORE "loss.backward()"
- Proper sequence visible: "optimizer.zero_grad()" then "loss.backward()" then "optimizer.step()"
- Code is for inference only (no backward() or optimizer.step())
- Using gradient accumulation intentionally (comment or code structure indicates deliberate accumulation)
"""

warning_message = """
Missing optimizer.zero_grad(): Gradients accumulate across batches instead of being reset. This causes incorrect updates, exploding gradients, and NaN losses. Call optimizer.zero_grad() before each backward() in your training loop.
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

