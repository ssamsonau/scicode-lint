Find backward() calls in the code.
Is backward() called on a DETACHED loss tensor?

YES = backward() called on detached loss (.detach(), .data, or .item() used before backward) (BUG)
NO = backward() on original loss tensor, OR no backward() exists
"""

warning_message = """
