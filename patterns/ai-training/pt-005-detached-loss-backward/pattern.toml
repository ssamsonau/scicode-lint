[meta]
id = "pt-005"
name = "detached-loss-backward"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling backward() on a detached loss tensor or after calling .item() disconnects the computation graph, preventing gradient computation. The model parameters won't be updated.
"""

explanation = """
Calling backward() on a detached tensor or after calling .item() breaks the gradient computation because the tensor is disconnected from the autograd graph. This results in no gradients being computed and the model not learning. Always call backward() on the original loss tensor before detaching or converting to scalar.
"""

tags = ["pytorch", "gradients", "autograd", "loss"]
related_patterns = []
references = []

[detection]
question = """
Analyze the loss computation and backward pass in this code.

Calling backward() on a detached tensor (.detach(), .data) or after converting to scalar (.item()) disconnects the computation graph. No gradients will be computed and the model won't learn.

Correct approach: Call backward() on the original loss tensor, then use .item() for logging.

Does this code call backward() on a detached loss?

Look for:
- loss.detach().backward() or similar
- Using .data before backward()
- Storing loss.item() then trying to backpropagate

YES = Bug found: backward() called on detached or scalar loss
NO = Correct: backward() called on original loss tensor
"""

warning_message = """
Backward on detached loss: Calling backward() on a detached loss or after .item() prevents gradient computation. The model parameters won't be updated. Call backward() on the original loss tensor before detaching or converting to scalar with .item().
"""

min_confidence = 0.85
