[meta]
id = "pt-008"
name = "optimizer-before-backward"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling optimizer.step() before loss.backward() updates parameters with stale or zero gradients from the previous iteration. The correct order is: zero_grad(), forward, loss, backward(), step().
"""

explanation = """
Calling optimizer.step() before loss.backward() updates parameters before gradients are computed. This means the optimizer updates with stale or zero gradients from the previous iteration, preventing the model from learning correctly. The correct order is: zero_grad(), forward pass, loss computation, backward(), then step().
"""

tags = ["pytorch", "optimizer", "gradients", "training"]
related_patterns = ["pt-004"]
references = []

[detection]
question = """
Analyze the training loop order of operations.

The correct PyTorch training sequence is: zero_grad() → forward → loss → backward() → step(). Calling optimizer.step() before backward() updates parameters with stale or zero gradients.

Does this code call optimizer.step() before backward()?

Look for:
- optimizer.step() appearing before loss.backward() in training loop
- Parameter updates happening before gradient computation

YES = Bug found: optimizer.step() called before backward()
NO = Correct: backward() called before step()
"""

warning_message = """
Optimizer step before backward: Calling optimizer.step() before loss.backward() updates parameters with old/zero gradients instead of current gradients. The correct sequence is: optimizer.zero_grad(), compute loss, loss.backward(), then optimizer.step().
"""

