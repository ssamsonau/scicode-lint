[meta]
id = "pt-009"
name = "multiple-backward-calls"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is the loss tensor accumulated directly (e.g., total_loss += loss) instead of extracting the scalar value (total_loss += loss.item())?
"""

explanation = """
Accumulating loss tensors directly keeps the entire computation graph in memory for each accumulated loss. This causes severe memory leaks in training loops. Use loss.item() or loss.detach() to extract the scalar value and free the computation graph.
"""

tags = ["pytorch", "memory", "computation-graph", "loss"]
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Accumulating loss tensors directly without extracting scalar values:
   - epoch_loss = epoch_loss + loss (where epoch_loss and loss are both tensors)
   - total_loss += loss (without .item() or .detach())
   - running_loss = running_loss + loss (tensor accumulation)

2. Storing loss tensors in lists or data structures:
   - loss_history.append(loss) where loss is a tensor with grad_fn
   - losses.append(loss) without .item() or .detach()
   - Keeping references to loss tensors across iterations

Answer NO if:
- Extracting scalar before accumulation: running_loss += loss.item()
- Detaching before storage: loss_history.append(loss.detach().cpu().item())
- Using loss.detach() or loss.item() to break computation graph
- Accumulating only for gradient accumulation pattern (with explicit backward on accumulated loss)

Context exclusions:
- Skip if it's intentional gradient accumulation (loss scaled by accumulation steps before backward)
- Skip if loss.backward() is called on the accumulated tensor (gradient accumulation pattern)
- Accept if loss is only used once for backward() then discarded
"""

warning_message = """
Loss tensor accumulation: Accumulating loss tensors directly keeps entire computation graphs in memory, causing memory leaks. Extract the scalar value using loss.item() or loss.detach().cpu().item() before accumulating.
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = ["Intentional gradient accumulation across batches"]

