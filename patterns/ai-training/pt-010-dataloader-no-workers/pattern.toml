# Pattern: pt-010-dataloader-no-workers
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "pt-010"
name = "dataloader-no-workers"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
DataLoader with num_workers=0 (or unspecified) forces single-process data loading, creating a bottleneck where the GPU waits idle while data is loaded. Set num_workers to 2-8 for multi-process data loading.
"""

explanation = """
Using num_workers=0 (or omitting it, which defaults to 0) forces single-process data loading, creating a bottleneck where the GPU waits idle while data is loaded. Setting num_workers to 2-8 enables multi-process data loading, significantly improving training throughput by pre-fetching batches while the GPU trains.

"""

tags = ["pytorch", "data-loading", "performance", "dataloader"]
related_patterns = []
references = ["https://pytorch.org/docs/stable/data.html#multi-process-data-loading"]

[detection]
question = """
Does this code have DataLoader without num_workers in GPU training?

Check for: DataLoader(...) without num_workers (or num_workers=0) AND .cuda() or loss.backward().

YES = Found: DataLoader missing num_workers with GPU training code
NO = Clean: num_workers set, or CPU-only code, or inference-only
"""

warning_message = """
DataLoader with num_workers=0 forces single-process data loading, creating a bottleneck where the GPU idles while waiting for data. Set num_workers to 2-8 (based on CPU cores) to enable multi-process data loading with prefetching, significantly improving training throughput.

"""

min_confidence = 0.85
false_positive_risks = []

