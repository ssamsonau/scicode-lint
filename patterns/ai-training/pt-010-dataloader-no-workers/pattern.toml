# Pattern: pt-010-dataloader-no-workers
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "pt-010"
name = "dataloader-no-workers"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
DataLoader with num_workers=0 (or unspecified) forces single-process data loading, creating a bottleneck where the GPU waits idle while data is loaded. Set num_workers to 2-8 for multi-process data loading.
"""

explanation = """
Using num_workers=0 (or omitting it, which defaults to 0) forces single-process data loading, creating a bottleneck where the GPU waits idle while data is loaded. Setting num_workers to 2-8 enables multi-process data loading, significantly improving training throughput by pre-fetching batches while the GPU trains.

"""

tags = ["pytorch", "data-loading", "performance", "dataloader"]
related_patterns = []
references = ["https://pytorch.org/docs/stable/data.html#multi-process-data-loading"]

[detection]
question = """
Does this code have DataLoader with single-process loading in GPU training?

Single-process loading = num_workers=0 OR num_workers not specified (defaults to 0)

Check for BOTH:
1. DataLoader(...) with num_workers=0 OR num_workers parameter missing entirely
2. GPU training indicators: .cuda(), .to(device), loss.backward()

YES = Bug: DataLoader uses num_workers=0 or omits it, with GPU training code present
NO = Clean: num_workers >= 1 specified, or CPU-only code, or inference-only
"""

warning_message = """
DataLoader with num_workers=0 forces single-process data loading, creating a bottleneck where the GPU idles while waiting for data. Set num_workers to 2-8 (based on CPU cores) to enable multi-process data loading with prefetching, significantly improving training throughput.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/dataloader_explicit_zero_workers.py"
description = "DataLoader explicitly sets num_workers=0 in GPU training code"
expected_issue = "DataLoader with num_workers=0 and loss.backward()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_with_single_worker"
snippet = "num_workers=0"

[[tests.positive]]
file = "test_positive/dataloader_missing_workers.py"
description = "DataLoader omits num_workers parameter, defaulting to 0 and preventing multi-process data loading in training"
expected_issue = "DataLoader without num_workers parameter (defaults to 0)"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "prepare_dataloaders"
snippet = "train_loader = DataLoader(train_dataset, batch_size=128, shuffle=True)"

[[tests.negative]]
file = "test_negative/dataloader_with_workers.py"
description = "Correct usage: DataLoader sets num_workers=4 for training and num_workers=2 for validation with pin_memory"

[[tests.negative]]
file = "test_negative/optimal_workers_config.py"
description = "Correct usage: DataLoader with num_workers=4 for multi-process data loading"

[[tests.context_dependent]]
file = "test_context_dependent/debugging_single_worker.py"
description = "Conditionally uses num_workers=0 in debug mode for easier debugging, but uses num_workers=4 in production - acceptable pattern"
context_notes = "Using num_workers=0 for debugging is acceptable as it makes error tracebacks clearer and allows breakpoint debugging"
allow_detection = true
allow_skip = true

[[tests.negative]]
file = "test_negative/small_dataset_inference.py"
description = "Inference-only code with num_workers=0 - detection explicitly excludes inference-only cases"


[[tests.positive]]
file = "test_positive/image_loader.py"
description = "ImageDataset with DataLoaders that omit num_workers parameter, defaulting to single-process data loading and creating GPU bottleneck during image training"
expected_issue = "DataLoader without num_workers parameter (defaults to 0) in image loading pipeline"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "get_training_loader"
snippet = "DataLoader(train_data, batch_size=batch_size, shuffle=True, pin_memory=True)"

[[tests.negative]]
file = "test_negative/image_loader_workers.py"
description = "Correct usage: ImageDataset with DataLoaders that explicitly set num_workers=4 for efficient multi-process image loading"
