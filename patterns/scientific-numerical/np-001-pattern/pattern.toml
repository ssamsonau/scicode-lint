explanation = """
NumPy view mutation: basic slicing returns a view — modifying it modifies the original. Use .copy() if you need an independent array.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for NumPy slice views being modified (which unintentionally modifies the original array).

Answer YES ONLY if you see EXPLICIT evidence of:
1. Variable assigned from slice WITHOUT .copy() (e.g., "subset = data[10:50]") THEN that variable is modified with "subset[:] =", "subset *=", "subset +=", or "subset -= "
2. Slice modified directly with in-place operators: "arr[10:20] += value" or "matrix[2:8, 3:7] -= mean"
3. Slice elements modified in a loop: "for i in range(len(slice_view)): slice_view[i] = ..."

Answer NO if:
- Slice uses .copy(): "subset = data[10:50].copy()"
- Slice only used for reading: ".mean()", ".std()", ".argmax()", ".sum()", "np.sum(slice ** 2)"
- Creating new array from slice: "new_arr = slice * 2" (doesn't modify view)
- Intent is clearly to modify original (parameter name like "arr_to_modify", docstring indicates in-place)
"""

warning_message = """
NumPy view mutation: basic slicing returns a view — modifying it modifies the original. Use .copy() if you need an independent array.

"""

