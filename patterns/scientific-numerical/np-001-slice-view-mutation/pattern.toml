[meta]
id = "np-001"
name = "slice-view-mutation"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
NumPy basic slicing returns a view, not a copy. Modifying a slice (e.g., subset[:] = 0, subset += value) will silently modify the original array. This is a common source of bugs when the programmer expects an independent copy.
"""

explanation = """
NumPy view mutation: basic slicing returns a view — modifying it modifies the original. Use .copy() if you need an independent array.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze NumPy slicing for unintended view mutations.

NumPy basic slicing returns a view, not a copy. Modifying a slice (subset += value, subset[:] = 0) silently modifies the original array. This is a common source of bugs when expecting an independent copy.

Correct approach: Use .copy() when you need an independent array.

Does this code modify a slice without .copy()?

Look for:
- slice_var = arr[i:j] followed by slice_var += x or slice_var[:] = y
- In-place operations on variables that hold array slices
- Missing .copy() when slice will be modified

Not a bug: arr[i:j] = values (direct assignment), read-only operations

YES = Bug found: slice view modified in-place without .copy()
NO = Correct: uses .copy() before modification, or read-only operations
"""

warning_message = """
NumPy view mutation: basic slicing returns a view — modifying it modifies the original. Use .copy() if you need an independent array.
"""

min_confidence = 0.85
false_positive_risks = ["Direct array slice assignment like arr[i:j] = values is NOT a view mutation bug"]

