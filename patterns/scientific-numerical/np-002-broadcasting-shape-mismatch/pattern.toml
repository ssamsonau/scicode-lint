description = "Reduction with axis parameter used in arithmetic without keepdims=True, causing silent broadcasting issues"
expected_issue = "Reduction without keepdims=True used in arithmetic with original array"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "normalize_batch"
snippet = "data - batch_mean"

[[tests.positive]]
file = "test_positive/broadcasting_confusion.py"
description = "Operations like subtraction or matrix multiplication on arrays with potentially incompatible semantic dimensions that broadcast without validation"
expected_issue = "Shape mismatch silently handled by broadcasting rules"
min_confidence = 0.85

[tests.positive.expected_location]
