[meta]
id = "np-002"
name = "broadcasting-shape-mismatch"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using .mean(axis=1) or .std(axis=1) without keepdims=True returns a 1D array that broadcasts incorrectly when used in arithmetic with the original 2D array. For example, `data - data.mean(axis=1)` broadcasts the 1D result against columns instead of rows. Use keepdims=True to preserve the shape for correct row-wise operations.
"""

explanation = """
Missing keepdims=True on axis=1 reductions causes wrong broadcasting. Use data.mean(axis=1, keepdims=True) for correct row-wise operations.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/user/basics.broadcasting.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.mean.html",
]

[detection]
question = """
Does this code have the EXACT pattern: .mean(axis=1) or .std(axis=1) WITHOUT keepdims=True?

SIMPLE RULE: Any call to .mean(axis=1) or .std(axis=1) without "keepdims=True" is a bug if the result is used in arithmetic (-, /, *, +) with a 2D array.

Example bugs:
  batch_mean = data.mean(axis=1)    # NO keepdims
  normalized = data - batch_mean    # BUG

  row_means = X.mean(axis=1)        # NO keepdims
  return X - row_means              # BUG

NOT bugs:
  mean = data.mean(axis=1, keepdims=True)  # Has keepdims=True
  col_mean = data.mean(axis=0)             # axis=0 is different

YES = Code has .mean(axis=1) or .std(axis=1) WITHOUT the keepdims=True parameter
NO = All axis=1 reductions use keepdims=True, or only axis=0 reductions exist
"""

warning_message = """
Missing keepdims=True: .mean(axis=1) returns 1D array that broadcasts against columns, not rows. Use keepdims=True for correct row-wise operations.
"""

min_confidence = 0.75
false_positive_risks = [
    "Cannot detect shape mismatches without explicit shape information",
    "Standard normalization (arr - arr.mean()) is safe",
    "sklearn/pandas handle broadcasting internally"
]

[tests]

[[tests.positive]]
