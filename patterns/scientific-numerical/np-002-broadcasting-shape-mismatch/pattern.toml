[meta]
id = "np-002"
name = "broadcasting-shape-mismatch"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Broadcasting arrays with semantically incompatible shapes causes subtle bugs. NumPy will silently produce wrong-shaped results when array dimensions are numerically compatible but semantically mismatched.
"""

explanation = """
Broadcasting silent error: shapes are numerically compatible but semantically wrong. Verify array shapes explicitly before operations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Does this code use reduction(axis=N) without keepdims=True in arithmetic?

Check for: arr - arr.mean(axis=1) or similar WITHOUT keepdims=True.

YES = Found: reduction with axis= then arithmetic, missing keepdims=True
NO = Clean: keepdims=True used, or result reshaped, or no arithmetic after reduction

YES = Found: reduction(axis=N) without keepdims used in arithmetic with original array
NO = Clean: keepdims=True used, or result reshaped, or no arithmetic interaction
"""

warning_message = """
Broadcasting dimension mismatch: verify array shapes match semantically, not just numerically. Use keepdims=True for reductions.
"""

min_confidence = 0.75
false_positive_risks = [
    "Cannot detect shape mismatches without explicit shape information",
    "Standard normalization (arr - arr.mean()) is safe",
    "sklearn/pandas handle broadcasting internally"
]

[tests]

[[tests.positive]]
file = "test_positive/shape_mismatch.py"
description = "Arrays with semantically incompatible shapes are broadcast together (e.g., (100,64,64,3) with (64,1) or (32,128) with (32,1)) producing wrong-shaped results silently"
expected_issue = "Broadcasting produces semantically incorrect shape without error"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "apply_weights"
snippet = "weighted = images * weights"

[[tests.positive]]
file = "test_positive/broadcasting_confusion.py"
description = "Operations like subtraction or matrix multiplication on arrays with potentially incompatible semantic dimensions that broadcast without validation"
expected_issue = "Shape mismatch silently handled by broadcasting rules"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_distances"
snippet = "diffs = points - centers"

[[tests.negative]]
file = "test_negative/explicit_shape_check.py"
description = "Explicit shape assertions or checks before array operations to verify semantic compatibility"

[[tests.negative]]
file = "test_negative/correct_broadcasting.py"
description = "Proper use of keepdims and reshape to ensure broadcasting happens along intended dimensions with correct semantic meaning"


