[detection]
question = """
Look for NumPy broadcasting silent errors where shapes are numerically compatible but semantically wrong.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "images * weights" where shapes like (100,64,64,3) and (64,1) broadcast incorrectly without validation
2. "data - means" or "points - centers" with mismatched shapes like (32,128) and (32,1) or (1000,3) and (10,3)
3. Array operations without shape assertions where semantic dimensions could be wrong despite numerical compatibility

Answer NO if:
- "assert images.shape[-1] == weights.shape[0]" or explicit shape checks before operations
- "keepdims=True" or explicit "reshape()" to ensure correct broadcasting dimensions
- Operations where shapes are clearly semantically compatible (e.g., broadcasting scalar or 1D array to match last dimension)
"""

warning_message = """
Broadcasting silent error: shapes are numerically compatible but semantically wrong. Verify array shapes explicitly before operations.

"""

