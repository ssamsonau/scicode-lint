[meta]
id = "num-001"
name = "float-equality-comparison"
category = "scientific-numerical"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Floating point numbers should never be compared using == or != due to precision limitations. For example, 0.1 + 0.2 != 0.3 in floating point arithmetic. Use np.isclose() or np.allclose() with appropriate tolerance instead.
"""

explanation = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.isclose.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.allclose.html",
    "https://docs.python.org/3/tutorial/floatingpoint.html",
]

[detection]
question = """
Analyze equality comparisons in this code for floating point issues.

Floating point arithmetic has precision limitations: 0.1 + 0.2 != 0.3 due to binary representation. Direct equality (==, !=) on floats fails unpredictably.

Correct approach: Use np.isclose(), np.allclose(), or abs(a-b) < epsilon.

Does this code compare floats with exact equality?

Look for:
- if x == 0.0 or value != expected on computed floats
- (arr1 == arr2).all() on float arrays
- Convergence checks without tolerance

YES = Bug found: float comparison using == or != without tolerance
NO = Correct: uses isclose/allclose/epsilon, or comparing integers/indices
"""

warning_message = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

min_confidence = 0.85
false_positive_risks = []

