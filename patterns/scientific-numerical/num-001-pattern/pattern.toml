description = """
Are floating point numbers compared using == or != instead of np
"""

explanation = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Direct == or != comparisons on float literals, float variables, or computed float values:
   - if current == target: where current/target are floats
   - if (0.1 + 0.2) == 0.3:
   - if fx == 0.0: where fx is a float computation result

2. Array equality checks with == on floating point arrays:
   - if (arr1 == arr2).all(): where arr1/arr2 are float arrays
   - if values[0] == 1.0: where values is a float array
   - if computed != expected: where these are float values

Answer NO if:
- Comparing integer variables, array indices, loop counters, or shape values (if idx == max_idx, if rows == cols)
- Comparing integer dtype arrays (dtype=int, dtype=np.int32)
- Comparing boolean flags or True/False values
- Already using np.isclose(), np.allclose(), math.isclose(), or tolerance-based comparisons with abs()

Context exclusions:
- Skip if comparing values explicitly cast to int or used as indices
- Skip if variables are clearly counters, iterations, or shape dimensions
"""

warning_message = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

