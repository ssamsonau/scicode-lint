severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is there a subtraction of two large, nearly equal numbers that could lose significant digits (catastrophic cancellation)?

"""

explanation = """
Catastrophic cancellation: subtracting nearly equal large numbers loses precision. Restructure the formula to avoid this.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for catastrophic cancellation from subtracting nearly equal large numbers.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "mean_sq - mean_val ** 2" for variance calculation on large values (e.g., data * 1e10 + 1e12)
2. "val1 - val2" where values like "np.exp(x)" and "np.exp(x - 1e-8)" are nearly equal
3. "(large_val + small_delta) - large_val" where subtraction loses precision

Answer NO if:
- "np.var(data)" or other stable library functions for variance/statistics
- Subtracting well-separated values (e.g., "10.5 - 3.2")
- Using ratios instead of differences (e.g., "val1 / val2" instead of "val1 - val2")
- "np.gradient()" or "np.diff()" on arrays with sufficient separation
"""

warning_message = """
Catastrophic cancellation: subtracting nearly equal large numbers loses precision. Restructure the formula to avoid this.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/cancellation.py"
description = "Variance computed as mean(x^2) - mean(x)^2 with large values, or subtraction of nearly equal large numbers (1.0000001 - 1.0000000) losing precision"
expected_issue = "Catastrophic cancellation from subtracting nearly equal numbers"
min_confidence = 0.85

[tests.positive.expected_location]
