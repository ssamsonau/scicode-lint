description = """
Is np
"""

explanation = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for np.log() on potentially zero values without guards.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "np.log(probabilities)" without epsilon guard where probabilities could contain zeros
2. "np.log(p / q)" or "np.sum(p * np.log(p / q))" in KL divergence without protection
3. "np.log(data)" or "np.log(measurements)" without "np.maximum()", "np.clip()", or epsilon addition

Answer NO if:
- "np.log(probabilities + eps)" or "np.log(data + 1e-10)" with epsilon guard
- "np.log(np.maximum(data, 1e-8))" or "np.log(np.clip(observations, 1e-10, None))"
- "np.log1p(x)" for log(1+x) calculations
- "log_ratio[nonzero] = np.log(...)" with explicit nonzero masking
"""

warning_message = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

