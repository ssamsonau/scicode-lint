[meta]
id = "num-003"
name = "unguarded-log-zero"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling np.log() on values that could be zero produces -inf, which silently poisons all downstream computations. This commonly occurs with probability arrays, KL divergence calculations, or any data that could contain zeros. Use np.log1p(x) for log(1+x), or add an epsilon guard like np.log(x + 1e-10).
"""

explanation = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze log operations for zero input handling.

np.log(0) returns -inf, which silently poisons all downstream computations (sum, mean become -inf or NaN). This commonly occurs with probability arrays or ratios.

Correct approach: Use np.log(x + epsilon), np.log1p(x), or np.maximum(x, epsilon).

Does this code call log on values that could be zero?

Look for:
- np.log(probabilities) where probs could contain zeros
- Log-likelihood or entropy calculations without guards
- KL divergence: np.log(p/q) where q could be zero

YES = Bug found: np.log() on potentially zero values without guard
NO = Correct: has epsilon guard, uses log1p, or input guaranteed positive
"""

warning_message = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

min_confidence = 0.85
false_positive_risks = []

