[meta]
id = "num-003"
name = "unguarded-log-zero"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling np.log() on values that could be zero produces -inf, which silently poisons all downstream computations. This commonly occurs with probability arrays, KL divergence calculations, or any data that could contain zeros. Use np.log1p(x) for log(1+x), or add an epsilon guard like np.log(x + 1e-10).
"""

explanation = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find np.log() on values that could be zero (probabilities, data arrays, ratios) in the code.
Is zero guard MISSING for np.log() (no + epsilon, np.maximum, np.clip, np.log1p, or nonzero mask)?

YES = zero guard is MISSING for np.log() (BUG)
NO = has guard, OR no such np.log() exists, OR input is guaranteed positive
"""

warning_message = """
np.log(0) returns -inf silently and poisons downstream computations. Use np.log1p(x) for log(1+x), or add a guard/clamp.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

