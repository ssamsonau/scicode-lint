[meta]
id = "num-004"
name = "int32-overflow"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Integer overflow in summations using int32 causes incorrect results. The int32 max is ~2.1 billion, so summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.
"""

explanation = """
int32 overflow: max is ~2.1 billion. Summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/arrays.dtypes.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.sum.html",
]

[detection]
question = """
Analyze integer aggregations for overflow risk.

int32 max is ~2.1 billion. Summing large int32 arrays wraps silently, producing incorrect results. This is especially dangerous with large datasets or cumulative sums.

Correct approach: Use dtype=np.int64 or dtype=np.float64 in aggregation functions.

Does this code aggregate int32 values without overflow protection?

Look for:
- np.sum() or .sum() on explicitly int32 arrays without dtype parameter
- np.cumsum() on int32 data
- Large array aggregations where intermediate values exceed 2 billion

Only flag explicit int32 (dtype=np.int32, astype('int32')). Ignore float64 arrays.

YES = Bug found: int32 aggregation without dtype upgrade on large arrays
NO = Correct: uses int64/float64, or arrays are small
"""

warning_message = """
int32 overflow risk: max is ~2.1 billion. Use dtype=np.int64 for large int32 aggregations.
"""

min_confidence = 0.85
false_positive_risks = [
    "np.random.randn/rand return float64, not int32",
    "sklearn/pandas data is typically float64",
    "Only explicit int32 arrays are at risk"
]

[tests]

[[tests.positive]]
file = "test_positive/int32_overflow.py"
description = "np.sum() or np.cumsum() on large int32 arrays (1M elements * 5000) without dtype parameter, causing silent overflow wraparound"
expected_issue = "int32 aggregation overflow on large array without dtype=int64"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_total"
snippet = "total = np.sum(data)"

[[tests.positive]]
file = "test_positive/large_accumulation.py"
description = "Products or cumulative sums on int32 matrices/streams where intermediate or final values exceed 2.1 billion"
expected_issue = "Large int32 array accumulation risks overflow"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "sum_products"
snippet = "total = products.sum()"

[[tests.negative]]
file = "test_negative/safe_dtype.py"
description = "Aggregations using dtype=np.int64 or dtype=np.float64, or explicit astype() conversion before sum/cumsum"

[[tests.negative]]
file = "test_negative/float_aggregation.py"
description = "Small arrays where overflow is impossible, or arrays already using float64/int64 dtypes"


