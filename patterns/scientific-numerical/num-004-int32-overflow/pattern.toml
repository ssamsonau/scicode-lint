[meta]
id = "num-004"
name = "int32-overflow"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Integer overflow in summations using int32 causes incorrect results. The int32 max is ~2.1 billion, so summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.
"""

explanation = """
int32 overflow: max is ~2.1 billion. Summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find np.sum() or np.cumsum() on large int32 arrays in the code.
Is dtype upgrade MISSING for int32 aggregation (no dtype=int64, dtype=float64, or astype() before aggregation)?

YES = dtype upgrade is MISSING for int32 aggregation (BUG)
NO = has dtype parameter or astype(), OR no such aggregation exists, OR array is already int64/float64
"""

warning_message = """
int32 overflow: max is ~2.1 billion. Summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/int32_overflow.py"
description = "np.sum() or np.cumsum() on large int32 arrays (1M elements * 5000) without dtype parameter, causing silent overflow wraparound"
