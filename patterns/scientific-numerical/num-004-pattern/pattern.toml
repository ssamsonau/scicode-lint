[meta]
id = "num-004"
name = "pattern"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is a sum, cumsum, or aggregation performed on an int32 array that could overflow (large array or large values)?

"""

explanation = """
int32 overflow: max is ~2.1 billion. Summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for int32 aggregation overflow on large arrays.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "np.sum(data)" or "data.sum()" on int32 arrays without dtype parameter (e.g., 1M elements * 5000)
2. "np.cumsum(values)" on large int32 arrays without "dtype=np.int64" or "dtype=np.float64"
3. "products.sum()" where int32 matrix products could exceed 2.1 billion

Answer NO if:
- "np.sum(data, dtype=np.int64)" or "np.cumsum(values, dtype=np.int64)"
- "counts.astype(np.int64).sum()" or "astype(np.float64)" before aggregation
- Small arrays where overflow is mathematically impossible
- Arrays already using float64 or int64 dtypes
"""

warning_message = """
int32 overflow: max is ~2.1 billion. Summing large arrays wraps silently. Use dtype=np.int64 or np.float64 for aggregations.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/int32_overflow.py"
description = "np.sum() or np.cumsum() on large int32 arrays (1M elements * 5000) without dtype parameter, causing silent overflow wraparound"
expected_issue = "int32 aggregation overflow on large array without dtype=int64"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_total"
snippet = "total = np.sum(data)"

[[tests.positive]]
file = "test_positive/large_accumulation.py"
description = "Products or cumulative sums on int32 matrices/streams where intermediate or final values exceed 2.1 billion"
expected_issue = "Large int32 array accumulation risks overflow"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "sum_products"
snippet = "total = products.sum()"

[[tests.negative]]
file = "test_negative/safe_dtype.py"
description = "Aggregations using dtype=np.int64 or dtype=np.float64, or explicit astype() conversion before sum/cumsum"
max_false_positives = 0

[[tests.negative]]
file = "test_negative/float_aggregation.py"
description = "Small arrays where overflow is impossible, or arrays already using float64/int64 dtypes"
max_false_positives = 0

