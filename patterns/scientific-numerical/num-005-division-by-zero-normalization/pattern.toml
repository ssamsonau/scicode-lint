[meta]
id = "num-005"
name = "division-by-zero-normalization"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Division by standard deviation, range, or other computed values that could be zero produces inf or NaN. This commonly occurs in normalization when a feature is constant (std=0) or in min-max scaling when min equals max. Always add an epsilon guard or check for zero before dividing.
"""

explanation = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.std.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.maximum.html",
]

[detection]
question = """
Analyze normalization operations for division by zero.

Standard deviation or range can be zero for constant features, causing inf or NaN. This commonly occurs in z-score normalization (x - mean) / std when a feature has no variance.

Correct approach: Add epsilon to denominator: (x - mean) / (std + 1e-8).

Does this code divide by std/range without zero protection?

Look for:
- (data - mean) / std without epsilon
- (x - min) / (max - min) where max could equal min
- Any normalization where denominator could be zero

YES = Bug found: division by std/range without epsilon guard
NO = Correct: denominator has + epsilon, np.maximum, or explicit zero check
"""

warning_message = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

min_confidence = 0.85
false_positive_risks = []

