explanation = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for normalization that could divide by zero.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "(data - mean) / std" or "(x - mu) / sigma" WITHOUT epsilon (no "+ 1e-8" or "+ eps" in denominator)
2. "(arr - min) / (max - min)" for min-max scaling WITHOUT zero-range checks (no "if range_val == 0" or "np.isclose")
3. Coefficient of variation "std / mean" WITHOUT safeguards (no epsilon, no np.maximum)

Answer NO if:
- Denominator includes epsilon: "std + 1e-8" or "sigma + eps" or "(mean + epsilon)"
- Explicit zero checks: "if std > 0:" or "if sigma == 0:" or "np.isclose(range_val, 0)"
- Library functions handle it: "StandardScaler()" or "normalize()" or "preprocessing.scale()"
- Using np.maximum: "np.maximum(std, 1e-8)"
- Denominator cannot be zero (constants like "/ 2.0", "sqrt(x + 1)")
"""

warning_message = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

min_confidence = 0.85
