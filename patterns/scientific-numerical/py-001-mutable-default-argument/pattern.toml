created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Mutable default arguments like def func(x, items=[]) share the same object across all function calls. This causes subtle bugs where the list/dict accumulates values between calls. Use None as default and create the mutable object inside the function.
"""

explanation = """
Mutable default argument: the default object is shared across all calls. Use None as default and create inside the function.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze function definitions for mutable default arguments.

Mutable defaults (def func(items=[])) share the same object across all calls. The list/dict accumulates values between calls, causing subtle bugs.

Correct approach: Use None as default, create mutable inside: if items is None: items = [].

Does this code use mutable default arguments?

Look for:
- def func(data=[]) or def func(cache={})
- Default arguments that are lists, dicts, or sets
- Functions that modify their default argument

YES = Bug found: mutable default argument ([] or {} in function signature)
NO = Correct: uses None as default, or only immutable defaults
"""

warning_message = """
Mutable default argument: the default object is shared across all calls. Use None as default and create inside the function.

"""

min_confidence = 0.85
false_positive_risks = []

