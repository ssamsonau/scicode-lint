[detection]
question = """
Look for mutable default arguments in function definitions.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "def function_name(..., param=[])" - list as default argument
2. "def function_name(..., param={})" - dict as default argument
3. "def function_name(..., cache={})" or "def function_name(..., history=[])" - mutable defaults used for caching or accumulation

Answer NO if:
- "def function_name(..., param=None):" followed by "if param is None: param = []" inside the function
- Function uses only immutable defaults (floats, ints, strings, tuples, None)
- No default arguments in function definition
"""

warning_message = """
Mutable default argument: the default object is shared across all calls. Use None as default and create inside the function.

"""

