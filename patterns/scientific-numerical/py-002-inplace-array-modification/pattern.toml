[meta]
id = "py-002"
name = "inplace-array-modification"
category = "scientific-numerical"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
NumPy arrays are passed by reference. Modifying an array parameter in-place (using -=, /=, indexing assignment) silently changes the caller's original data. Either document this behavior clearly, return a modified copy, or call .copy() at the start of the function.
"""

explanation = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find a function that modifies an array parameter in-place.
Is .copy() MISSING before in-place modification?

YES = .copy() is MISSING before in-place modification (BUG)
NO = has .copy() before modification, OR no in-place modification
"""

warning_message = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/inplace_mutation.py"
description = "Functions that modify input arrays in-place using -= /= indexing or element assignment without .copy(), silently changing caller's data"
expected_issue = "Array parameter modified in-place without copy or documentation"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "preprocess_data"
snippet = "data -= data.mean()"

[[tests.positive]]
file = "test_positive/silent_modification.py"
description = "Preprocessing, normalization, or augmentation functions that mutate input arrays through operations like /=, *=, or boolean indexing"
expected_issue = "Function silently mutates input array by reference"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "apply_threshold"
snippet = "data[data < threshold] = 0"

[[tests.negative]]
file = "test_negative/explicit_copy.py"
description = "Functions that explicitly copy input arrays using .copy() before any modifications, preserving caller's original data"
max_false_positives = 0

[[tests.negative]]
file = "test_negative/nonmutating_ops.py"
description = "Functions that create new arrays via operations like division, np.where(), np.maximum(), or explicit new array creation"
max_false_positives = 0

