[meta]
id = "py-002"
name = "inplace-array-modification"
category = "scientific-numerical"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
NumPy arrays are passed by reference. Modifying an array parameter in-place (using -=, /=, indexing assignment) silently changes the caller's original data. Either document this behavior clearly, return a modified copy, or call .copy() at the start of the function.
"""

explanation = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze functions for unintended in-place array modification.

NumPy arrays are passed by reference. Modifying an array parameter in-place (data -= mean, arr[i] = 0) silently changes the caller's original data. This is a common source of bugs in preprocessing functions.

Correct approach: Copy the array first (data = data.copy()) or document the mutation.

Does this function modify array parameters in-place?

Look for:
- In-place operators (-=, /=, *=) on function parameters
- Index assignment (param[i] = value) on array parameters
- Operations that mutate the caller's data without .copy()

YES = Bug found: function parameter modified in-place without copy
NO = Correct: creates copy before modification, or only uses non-mutating operations
"""

warning_message = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

min_confidence = 0.85
false_positive_risks = []

