description = """
Is a NumPy array passed to a function that modifies it in place, without documentation or an explicit 
"""

explanation = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for in-place modification of NumPy array parameters without explicit copying.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "data -= data.mean()" or "data /= data.std()" - in-place operations on array parameter
2. "array[array < threshold] = value" - boolean indexing with assignment on parameter
3. "features[:, 0] *= 2" or "weights /= total" - in-place modification via augmented assignment

Answer NO if:
- "result = data.copy()" at the start of function before any modifications
- "normalized = weights / total" - creating new array instead of modifying
- "cleaned = np.where(mask, array, value)" - using functions that return new arrays
- "clipped = np.clip(array, min, max)" - using non-mutating operations
"""

warning_message = """
NumPy arrays are passed by reference. Modifying inside a function silently changes the original. Document this behavior or .copy() on entry.

"""

min_confidence = 0.85
