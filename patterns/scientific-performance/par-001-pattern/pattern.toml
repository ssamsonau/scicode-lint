description = """
Is ThreadPoolExecutor or threading used for CPU-bound work (e
"""

explanation = """
Wrong concurrency: threading on CPU-bound work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for threading used for CPU-bound numerical computation instead of multiprocessing.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "ThreadPoolExecutor(max_workers=...)" used with CPU-bound functions like "np.linalg.eig", "compute_eigenvalues", or numerical computations on arrays
2. "threading.Thread(target=normalize_features" or similar with NumPy/numerical operations as the target function
3. Threading used for feature engineering, matrix operations, or array preprocessing (not IO operations)

Answer NO if:
- "ProcessPoolExecutor(max_workers=...)" used for CPU-bound work
- "threading.Thread(target=fetch_data_from_api" - threading used for IO-bound operations like API calls, file reading, or network requests
- "Pool(processes=...)" used for numerical computation
- Code uses sequential processing without concurrency
"""

warning_message = """
Wrong concurrency: threading on CPU-bound work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

