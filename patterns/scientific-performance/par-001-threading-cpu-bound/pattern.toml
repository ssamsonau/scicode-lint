[meta]
id = "par-001"
name = "threading-cpu-bound"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using ThreadPoolExecutor or threading for CPU-bound numerical work (e.g., NumPy operations, matrix computations) provides no speedup due to Python's GIL. Threads only help for I/O-bound tasks. Use ProcessPoolExecutor or multiprocessing for CPU-bound work.
"""

explanation = """
Wrong concurrency: threading on CPU-bound work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze threading usage for appropriate workload.

Python's GIL prevents threads from executing CPU-bound Python code in parallel. ThreadPoolExecutor with NumPy operations provides no speedup and adds overhead. Threads only help for I/O-bound tasks (network, file I/O).

Correct approach: Use ProcessPoolExecutor or multiprocessing for CPU-bound work.

Does this code use threading for CPU-bound numerical work?

Look for:
- ThreadPoolExecutor running NumPy/matrix computations
- threading.Thread with numerical array operations
- Parallel CPU work that should use multiprocessing instead

YES = Bug found: threading used for CPU-bound numerical work (GIL blocks parallelism)
NO = Correct: threading for I/O, or uses ProcessPoolExecutor for CPU work
"""

warning_message = """
Wrong concurrency: threading on CPU-bound work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

min_confidence = 0.85
false_positive_risks = []

