author = "scicode-lint"

description = """
Is multiprocessing or ProcessPoolExecutor used to parallelize work on large arrays without shared memory, causing each process to copy the full data?

"""

explanation = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Pool.map() or ProcessPoolExecutor passing the same large array/matrix to all workers:
   - pool.map(function, [large_array] * num_processes)
   - results = pool.map(apply_filter, [data_matrix] * workers)
   - Each process receives full data copy causing memory multiplication

2. ProcessPoolExecutor.submit() sending full dataset to each worker:
   - futures = [executor.submit(compute, data_matrix) for _ in range(N)]
   - for worker in range(count): executor.submit(process, full_array)
   - Same large numpy array submitted multiple times to different workers

Answer NO if:
- Using multiprocessing.shared_memory or SharedMemory to share arrays
- Passing only index ranges/slices to workers (start_idx, end_idx)
- Using threading (ThreadPoolExecutor) instead of multiprocessing
- Workers load their own data from disk using different file paths
- Splitting data into chunks and passing different chunks to each worker

Context exclusions:
- Skip if passing indices, filenames, or parameters instead of data
- Skip if using shared_memory, RawArray, or Manager for data sharing
- Skip if parallelizing over different data subsets (not the same array)
"""

warning_message = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.

"""

