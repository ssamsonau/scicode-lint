[meta]
id = "par-003"
name = "parallel-before-vectorize"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Adding parallelism before vectorizing operations is inefficient. Code is often slow due to Python loops, not lack of cores. Vectorize with NumPy operations first, then parallelize if needed.
"""

explanation = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Does this code parallelize INDIVIDUAL ELEMENTS instead of using vectorized NumPy operations?

THE BUG: Using pool.map() or ThreadPoolExecutor to process array elements ONE AT A TIME.
This is slow because Python function call overhead dominates.

CORRECT PATTERNS (NOT bugs):
- Using vectorized NumPy operations (np.where, np.sqrt, broadcasting)
- Parallelizing CHUNKS where each chunk uses vectorized NumPy operations inside
- No parallelism at all (just NumPy)

Look for these BUGS:
- pool.map(func, arr.tolist()) - converting array to list for element-by-element processing
- executor.submit(func, x) for x in array - processing one element at a time
- Each parallel task processes ONE number/element

NOT a bug:
- pool.map(func, chunks) where func uses NumPy operations on the chunk
- np.array_split() followed by parallel processing of chunks

YES = Bug: parallelizing individual elements (tolist(), per-element submit)
NO = Correct: vectorized operations or parallelizing vectorized chunks
"""

warning_message = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

min_confidence = 0.85
false_positive_risks = []

