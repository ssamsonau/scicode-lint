updated = "2026-03-03"
author = "scicode-lint"

description = """
Adding parallelism before vectorizing operations is inefficient. Code is often slow due to Python loops, not lack of cores. Vectorize with NumPy operations first, then parallelize if needed.
"""

explanation = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find Pool.map() or ThreadPoolExecutor parallelizing over array elements.
Does it apply simple element-wise operations that could be vectorized?

YES = parallelizing element-wise ops instead of vectorizing (BUG)
NO = no unvectorized parallel element operations exist
"""

warning_message = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/parallel_element_processing.py"
description = "Multiprocessing applied to element-wise array operations with Python loop - vectorization would be much faster than parallelizing slow loop"
expected_issue = "Parallelizing element-wise array processing instead of vectorizing"
min_confidence = 0.85

[tests.positive.expected_location]
