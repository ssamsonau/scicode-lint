[meta]
id = "par-003"
name = "pattern"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Is parallelism being added (multiprocessing, threading) to code that iterates over NumPy arrays with Python loops, where vectorization would be more effective?

"""

explanation = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Pool.map() or ThreadPoolExecutor parallelizing element-wise array operations:
   - pool.map(process_element, arr.tolist()) converting array to list for parallel processing
   - futures = [executor.submit(transform, x) for x in array]
   - Parallelizing simple operations (square, multiply, add) that could vectorize

2. Multiprocessing/threading applied to loops over array elements with simple operations:
   - pool.map(square_if_positive, array_elements) where logic is just conditionals
   - Threading over array elements for operations like np.where() or broadcasting
   - Parallelizing element-wise conditionals instead of using vectorized np.where()

Answer NO if:
- Using vectorized operations without parallelism (np.where, broadcasting, fancy indexing)
- Parallelizing already-vectorized chunk processing (chunks are processed with numpy operations)
- Threading/multiprocessing for I/O-bound tasks, not array computations
- Parallelizing complex per-element operations (file I/O, API calls, heavy computation)

Context exclusions:
- Skip if chunks are processed with vectorized numpy operations inside workers
- Skip if parallelizing truly independent complex tasks (not simple element-wise math)
- Skip if the operation inside the loop is too complex to vectorize easily
"""

warning_message = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/parallel_element_processing.py"
