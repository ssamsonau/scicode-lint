description = """
Setting DataLoader num_workers too high (e.g., >8 or more than CPU cores) causes each worker to duplicate the dataset in memory, leading to OOM errors or thrashing. Start with num_workers=4 and increase while monitoring memory usage.
"""

explanation = """
num_workers too high: each worker duplicates the dataset in memory. Too many workers causes OOM or thrashing. Start with 4 and increase while monitoring memory.

"""

