[meta]
id = "par-004"
name = "excessive-dataloader-workers"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Setting DataLoader num_workers too high (e.g., >8 or more than CPU cores) causes each worker to duplicate the dataset in memory, leading to OOM errors or thrashing. Start with num_workers=4 and increase while monitoring memory usage.
"""

explanation = """
num_workers too high: each worker duplicates the dataset in memory. Too many workers causes OOM or thrashing. Start with 4 and increase while monitoring memory.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze DataLoader configuration for worker count.

Setting num_workers too high (>8 or more than CPU cores) causes each worker to duplicate the dataset in memory. This leads to OOM errors or thrashing as workers compete for memory and CPU.

Correct approach: Start with num_workers=4, increase while monitoring memory.

Does this code use excessive DataLoader workers?

Look for:
- num_workers=32 or other high fixed values
- num_workers = cpu_count() * 2 or similar
- num_workers > 8 without memory considerations

YES = Bug found: num_workers too high (>8 or > CPU cores)
NO = Correct: reasonable worker count (2-8), or dynamically limited
"""

warning_message = """
num_workers too high: each worker duplicates the dataset in memory. Too many workers causes OOM or thrashing. Start with 4 and increase while monitoring memory.

"""

min_confidence = 0.85
false_positive_risks = []

