[detection]
question = """
Find CUDA initialization (.cuda() or .to(device)) in the code.
Does it happen before mp.Process or Pool creation without spawn method?

YES = CUDA initialized before fork (BUG)
NO = no CUDA-before-fork exists
"""

warning_message = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

