explanation = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for CUDA initialization before multiprocessing spawn.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "data = torch.randn(...).to(device)" or ".cuda()" BEFORE "mp.Process" or "Pool(processes=...)" creation
2. "model = model.cuda()" at module level or before "Pool" creation
3. CUDA tensor/model creation BEFORE multiprocessing spawn, WITHOUT "mp.set_start_method('spawn')"

Answer NO if:
- "mp.set_start_method('spawn')" is set AND CUDA initialization happens inside worker functions
- "device = torch.device('cuda')" inside worker function (after spawn)
- "model = model.to(device)" happens within worker function, not in main process
- No multiprocessing used in the code
- CPU-only code with no CUDA usage
"""

warning_message = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

