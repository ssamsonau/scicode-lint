[detection]
question = """
Look for parallel task results collected without preserving deterministic order.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "pool.imap_unordered(function, data)" followed by appending results to a list WITHOUT subsequent sorting
2. "for future in as_completed(futures):" with "results.append(future.result())" and NO index tracking or sorting
3. Unordered result collection from parallel tasks WITHOUT "results.sort()" or index-based reordering afterward

Answer NO if:
- "pool.map(function, data)" - map preserves input order automatically
- "executor.map(function, data)" - executor.map maintains order
- "results.sort(key=lambda x: x[0])" - results are sorted by index after collection
- Results include indices: "return idx, value" followed by sorting
- Sequential processing with no parallelization
"""

warning_message = """
