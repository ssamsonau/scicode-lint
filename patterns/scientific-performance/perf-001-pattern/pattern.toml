[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Python for loops with range(len(arr)) accessing array elements:
   - for i in range(len(arr)): result[i] = arr[i] * 2 if arr[i] > 0 else 0
   - for i in range(len(data)): data[i] = max(data[i], threshold)
   - Element-by-element operations that could use np.where() or broadcasting

2. Nested loops over array indices for pairwise operations:
   - for i in range(n): for j in range(m): distances[i,j] = compute(arr[i], arr[j])
   - Double loops computing distances, similarities, or comparisons element-wise
   - Operations that could use broadcasting (arr[:, None] - arr)

Answer NO if:
- Already using vectorized operations (np.where, broadcasting, fancy indexing)
- Looping over a regular Python list, not a numpy array
- Loop body contains I/O operations, complex control flow, or non-vectorizable logic
- Iterating for side effects (plotting, logging, file writes)
- Building up results where vectorization isn't straightforward

Context exclusions:
- Skip loops that print, log, or perform I/O in each iteration
- Skip loops with complex branching, function calls, or state dependencies
- Skip if the loop is iterating over objects, dictionaries, or non-array data
"""

