description = """
Python for loops over NumPy array elements (e.g., for i in range(len(arr))) are 100-1000x slower than vectorized operations. Use NumPy broadcasting, np.where(), or fancy indexing instead of element-wise Python loops.
"""

explanation = """
Python loop over NumPy array: 100-1000x slower than vectorized operation. Use broadcasting, np.where, or fancy indexing.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze array processing for vectorization opportunities.

Python for loops over NumPy array elements (for i in range(len(arr))) are 100-1000x slower than vectorized operations. NumPy's power comes from compiled C operations on entire arrays.

Correct approach: Use broadcasting, np.where(), or fancy indexing instead of element-wise loops.

Does this code use Python loops over array elements?

Look for:
- for i in range(len(arr)) with arr[i] access
- Nested loops computing pairwise operations
- Element-wise conditionals that could use np.where()

YES = Bug found: Python loop over array elements instead of vectorization
NO = Correct: uses vectorized NumPy operations
"""

warning_message = """
Python loop over NumPy array: 100-1000x slower than vectorized operation. Use broadcasting, np.where, or fancy indexing.

"""

