author = "scicode-lint"

description = """
Is a full pairwise distance matrix (N×N) computed and stored in memory, where N could be large?

"""

explanation = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Computing full N×N distance or similarity matrix with scipy.spatial.distance.cdist():
   - distance_matrix = cdist(points, points, metric='euclidean')
   - similarity = cdist(embeddings, embeddings, metric='cosine')
   - Where N is large (thousands or more) and full matrix is stored

2. Allocating full pairwise matrix with nested loops:
   - matrix = np.zeros((num_samples, num_samples))
   - for i in range(n): for j in range(n): matrix[i,j] = distance(data[i], data[j])
   - Creating full N×N matrix where N could be large (10k+)

Answer NO if:
- Using KDTree, BallTree, or spatial indexing for nearest neighbor queries
- Computing distances in chunks and keeping only k-nearest or minimum distances
- Computing only upper/lower triangle (not full matrix)
- Using approximate nearest neighbor methods (FAISS, Annoy)
- Computing distances on-demand without storing full matrix

Context exclusions:
- Skip if N is demonstrably small (< 1000 elements)
- Skip if only a sparse subset of distances is computed
- Skip if using memory-mapped arrays or out-of-core computation
"""

warning_message = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

min_confidence = 0.85
code_patterns = []
