description = """
Are large intermediate arrays created in a computation that could use in-place operations or np
"""

explanation = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for creation of large intermediate arrays that could be avoided with np.linalg functions or in-place operations.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "squared = diff ** 2" followed by "summed = np.sum(squared, axis=1)" followed by "distances = np.sqrt(summed)" - multiple intermediates for norm computation
2. "squared_matrix = matrix ** 2" then "row_sums = np.sum(squared_matrix, axis=1)" - could use "np.linalg.norm(matrix, axis=1)"
3. Manual norm calculation creating intermediate arrays when "np.linalg.norm" would avoid temporaries

Answer NO if:
- "distances = np.linalg.norm(vectors, axis=1)" - using optimized linalg functions
- "matrix -= mean_vals" and "matrix /= std_vals" - using in-place operations
- "normalized = normalize_inplace(data.copy())" - explicit in-place operations
- Small arrays or single computations where intermediate storage is negligible
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

