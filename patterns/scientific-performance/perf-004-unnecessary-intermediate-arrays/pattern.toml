[meta]
id = "perf-004"
name = "unnecessary-intermediate-arrays"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Creating large intermediate arrays (e.g., squared = diff ** 2; summed = np.sum(squared)) wastes memory when optimized functions exist. Use np.linalg.norm() instead of manual norm computation, or in-place operations to avoid temporary allocations.
"""

explanation = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze computations for unnecessary temporary arrays.

Creating large intermediate arrays (squared = diff ** 2; summed = np.sum(squared)) wastes memory when optimized functions exist. np.linalg.norm() computes norms without materializing intermediates.

Correct approach: Use np.linalg.norm(), np.einsum(), or in-place operations.

Does this code create unnecessary large intermediate arrays?

Look for:
- diff = a - b; squared = diff ** 2; norm = np.sqrt(np.sum(squared))
- Multiple separate array operations that could be combined
- Manual norm/distance computation instead of np.linalg.norm()

YES = Bug found: large intermediate arrays where optimized function exists
NO = Correct: uses optimized functions like np.linalg.norm()
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

min_confidence = 0.85
false_positive_risks = []

