[detection]
question = """
Find manual norm computations like "squared = arr ** 2" followed by "np.sum(squared)" then "np.sqrt()".
Does the code create large intermediate arrays instead of using np.linalg.norm()?

YES = unnecessary intermediate arrays found (BUG)
NO = no such patterns exist
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

