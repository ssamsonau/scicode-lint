created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
train_test_split() without random_state parameter produces different splits each run, making experiments non-reproducible.
"""

explanation = """
Missing random_state in train_test_split makes data splits non-reproducible. Add random_state=42 (or any fixed integer) for consistent results.
"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find train_test_split() calls in the code.

Is random_state MISSING from train_test_split()?

YES = random_state is missing from train_test_split call (BUG)
NO = random_state is present, OR no train_test_split exists
"""

warning_message = """
train_test_split() missing random_state parameter. Add random_state=42 for reproducible data splits.
"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/only_numpy_seed.py"
description = "Training script that only sets np.random.seed but uses both PyTorch and Python random operations. Missing torch.manual_seed and random.seed."
expected_issue = "Only NumPy seed is set, but code uses torch.nn and torch.optim which require torch.manual_seed for reproducibility"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_model"
snippet = "model = nn.Linear(10, 2)"

[[tests.positive]]
file = "test_positive/only_torch_seed.py"
description = "Simulation using torch.manual_seed but also uses np.random.normal and random.random without setting their seeds."
expected_issue = "Only PyTorch seed is set, but code uses np.random and random module without setting np.random.seed and random.seed"
min_confidence = 0.85

[tests.positive.expected_location]
