[detection]
question = """
Analyze data splitting for reproducibility.

train_test_split() without random_state produces different splits each run, making experiments non-reproducible. Results will vary between runs even with identical code.

Correct approach: Add random_state=42 (or any fixed integer) for consistent splits.

Does this code split data without random_state?

Look for:
- train_test_split(...) without random_state parameter
- Data splits that will differ between runs

YES = Bug found: train_test_split missing random_state
NO = Correct: random_state is set, or no train_test_split used
"""

warning_message = """
