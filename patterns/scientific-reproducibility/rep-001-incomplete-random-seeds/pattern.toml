[meta]
id = "rep-001"
name = "incomplete-random-seeds"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using multiple random libraries (numpy, random, torch, sklearn) without seeding all of them produces non-reproducible results. Each library has a separate random state.
"""

explanation = """
Incomplete seeding causes non-reproducibility. Seed ALL random libraries you use: np.random.seed(), random.seed(), torch.manual_seed(), and random_state parameters in sklearn.
"""

tags = []
related_patterns = []
references = [
    "https://docs.pytorch.org/docs/stable/notes/randomness.html",
    "https://numpy.org/doc/stable/reference/random/generator.html",
    "https://docs.python.org/3/library/random.html",
]

[detection]
question = """
Analyze random operations for incomplete seeding.

CRITICAL FACTS:
- sklearn functions (train_test_split, etc.) do NOT use numpy's global seed
- sklearn requires EXPLICIT random_state parameter for reproducibility
- np.random.seed() has NO effect on sklearn functions

Incomplete seeding patterns:
- train_test_split() without random_state parameter (even if np.random.seed is set!)
- np.random.seed() set but random.seed() not set when both libraries are used
- Using multiple random libraries but only seeding some

Does this code have incomplete random seeding?

YES = Bug: train_test_split missing random_state, OR uses multiple random sources without seeding all
NO = Clean: train_test_split has random_state AND all other used random sources are seeded
"""

warning_message = """
Incomplete random seeding detected. Seed all random libraries: np.random.seed(), random.seed(), torch.manual_seed(), and sklearn random_state parameters.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/train_test_split_no_seed.py"
description = "train_test_split called without random_state parameter"
expected_issue = "train_test_split() missing random_state - produces different splits each run"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "prepare_data"
snippet = "train_test_split(X, y, test_size=0.2)"

[[tests.negative]]
file = "test_negative/train_test_split_with_seed.py"
description = "train_test_split called with random_state parameter"


