updated = "2026-03-03"
author = "scicode-lint"

description = """
Is np
"""

explanation = """
Incomplete random seeds: NumPy, PyTorch, and Python random each use separate RNGs. Set all three for reproducibility.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Look for incomplete random seed initialization across multiple libraries.

Answer YES ONLY if you see EXPLICIT evidence of:
1. "np.random.seed()" is set AND "torch.nn" or "torch.optim" is imported/used BUT no "torch.manual_seed()"
2. "torch.manual_seed()" is set AND "np.random" is used (np.random.normal, np.random.randn) BUT no "np.random.seed()"
3. Either numpy or torch seed is set AND "random.random()" or "random.shuffle()" is used BUT no "random.seed()"

Answer NO if:
- All three seeds present: "np.random.seed()", "torch.manual_seed()", "random.seed()"
- Only one library used and its seed is set (e.g., only numpy code with np.random.seed())
- No random operations visible in the code
"""

warning_message = """
Incomplete random seeds: NumPy, PyTorch, and Python random each use separate RNGs. Set all three for reproducibility.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/only_numpy_seed.py"
description = "Training script that only sets np.random.seed but uses both PyTorch and Python random operations. Missing torch.manual_seed and random.seed."
expected_issue = "Only NumPy seed is set, but code uses torch.nn and torch.optim which require torch.manual_seed for reproducibility"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_model"
snippet = "model = nn.Linear(10, 2)"

[[tests.positive]]
file = "test_positive/only_torch_seed.py"
description = "Simulation using torch.manual_seed but also uses np.random.normal and random.random without setting their seeds."
expected_issue = "Only PyTorch seed is set, but code uses np.random and random module without setting np.random.seed and random.seed"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "run_simulation"
snippet = "noise = np.random.normal(0, 0.1, state.shape)"

[[tests.negative]]
file = "test_negative/all_seeds_set.py"
description = "Properly sets all three seeds (np.random.seed, torch.manual_seed, random.seed) before using all three libraries."
max_false_positives = 0

[[tests.negative]]
file = "test_negative/deterministic_setup.py"
description = "Complete reproducibility setup with all seeds set to same value at initialization."
