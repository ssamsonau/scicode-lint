[meta]
id = "rep-003"
name = "hardcoded-hyperparameters"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Hardcoded hyperparameters scattered through code hinder reproducibility. Magic numbers buried in code can't be tracked or reproduced across experiments. Use a config file or argparse for all hyperparameters.
"""

explanation = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Find hyperparameters (learning_rate, epochs, batch_size, dropout) as literal values inside functions/methods.

Are hyperparameters hardcoded WITHOUT a config/constants section or argparse?

YES = hyperparameters are hardcoded without config/constants/argparse (BUG)
NO = config/constants/argparse is present, OR no hardcoded hyperparameters exist
"""

warning_message = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/hardcoded_hyperparameters.py"
description = "Neural network training with hardcoded hyperparameters (learning rate 0.01, momentum 0.9, dropout 0.3, batch size 64, epochs 50, layer dimensions) instead of config."
expected_issue = "Hyperparameters like learning rate, dropout rate, batch size, and layer dimensions are hardcoded as magic numbers"
min_confidence = 0.85

[tests.positive.expected_location]
type = "class"
name = "NeuralNet"
snippet = "self.dropout = nn.Dropout(0.3)"

[[tests.positive]]
file = "test_positive/magic_paths_and_values.py"
description = "Signal processing with hardcoded file paths, threshold values (0.75, 2.3, 1.42, 15), normalization factors (127.5), and smoothing window (5)."
expected_issue = "File paths and processing parameters are hardcoded throughout the code without configuration"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_data"
snippet = "with open(\"/data/experiments/trial_042/results.json\", \"r\") as f:"

[[tests.negative]]
file = "test_negative/config_based.py"
description = "Uses argparse to define all hyperparameters as configurable command-line arguments with defaults."
max_false_positives = 0

[[tests.negative]]
file = "test_negative/constants_file.py"
description = "All magic numbers and paths extracted to named constants at the top of the file for easy tracking."
max_false_positives = 0

[quality]
target_precision = 0.90
target_recall = 0.80
target_f1 = 0.85
