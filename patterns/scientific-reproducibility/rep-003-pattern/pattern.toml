[meta]
id = "rep-003"
name = "pattern"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Are hyperparameters, file paths, or configuration values hardcoded as magic numbers/strings instead of defined in a config file, argparse, or constants section?

"""

explanation = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Answer YES ONLY if you see EXPLICIT evidence of:
1. Hyperparameters hardcoded directly in model/training code:
   - nn.Dropout(0.3) or nn.Linear(256, 128) with literal dimension values
   - optimizer = SGD(params, lr=0.01, momentum=0.9) with literal values
   - for epoch in range(50): or batch_size = 64 embedded in functions

2. File paths or configuration values hardcoded as string literals:
   - open("/data/experiments/trial_042/results.json", "r")
   - threshold = 0.75 or smoothing_window = 5 without named constants
   - Multiple magic numbers (1.42, 2.3, 127.5) throughout processing code

Answer NO if:
- Using argparse for command-line arguments with defaults
- Hyperparameters defined in a config dict/file at the top
- All magic numbers extracted to named CONSTANTS
- Using configparser, YAML, or JSON config files
- Parameters passed as function arguments from a central config

Context exclusions:
- Skip mathematical/physical constants (e.g., np.pi, speed of light)
- Skip array dimensions determined by data.shape
- Skip common defaults that are universal (e.g., random seed initialization)
- Skip if values are in a clearly marked CONSTANTS section at file top
"""

warning_message = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

min_confidence = 0.85
code_patterns = []
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/hardcoded_hyperparameters.py"
description = "Neural network training with hardcoded hyperparameters (learning rate 0.01, momentum 0.9, dropout 0.3, batch size 64, epochs 50, layer dimensions) instead of config."
expected_issue = "Hyperparameters like learning rate, dropout rate, batch size, and layer dimensions are hardcoded as magic numbers"
min_confidence = 0.85

[tests.positive.expected_location]
type = "class"
name = "NeuralNet"
snippet = "self.dropout = nn.Dropout(0.3)"

[[tests.positive]]
file = "test_positive/magic_paths_and_values.py"
description = "Signal processing with hardcoded file paths, threshold values (0.75, 2.3, 1.42, 15), normalization factors (127.5), and smoothing window (5)."
expected_issue = "File paths and processing parameters are hardcoded throughout the code without configuration"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_data"
snippet = "with open(\"/data/experiments/trial_042/results.json\", \"r\") as f:"

[[tests.negative]]
file = "test_negative/config_based.py"
description = "Uses argparse to define all hyperparameters as configurable command-line arguments with defaults."
max_false_positives = 0

[[tests.negative]]
file = "test_negative/constants_file.py"
description = "All magic numbers and paths extracted to named constants at the top of the file for easy tracking."
max_false_positives = 0

[quality]
target_precision = 0.90
target_recall = 0.80
target_f1 = 0.85
