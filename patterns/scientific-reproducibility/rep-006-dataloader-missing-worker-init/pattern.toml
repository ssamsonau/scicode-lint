[meta]
id = "rep-006"
name = "dataloader-missing-worker-init"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
DataLoader with num_workers>0 but no worker_init_fn causes workers to have identical random states. This produces identical augmentations across workers, reducing effective data diversity.
"""

explanation = """
DataLoader workers fork from the parent and inherit the same random state. Use worker_init_fn to seed each worker uniquely based on worker_id.
"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze DataLoader for random state in workers.

When DataLoader uses num_workers>0, worker processes are forked from the parent. They inherit identical numpy/random states, causing identical random augmentations across workers.

Correct approach: Provide worker_init_fn that seeds each worker based on worker_id.

Does this code use DataLoader with workers but without worker_init_fn?

Look for:
- DataLoader(num_workers=N) where N>0 without worker_init_fn
- Dataset using numpy/random for augmentation with multi-worker loading

YES = Bug found: DataLoader with workers but no worker_init_fn
NO = Correct: worker_init_fn provided, or num_workers=0
"""

warning_message = """
DataLoader workers inherit identical random states. Add worker_init_fn to seed each worker uniquely for proper randomization.
"""

min_confidence = 0.85
false_positive_risks = []

