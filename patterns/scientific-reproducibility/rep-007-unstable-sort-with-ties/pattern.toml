[meta]
id = "rep-007"
name = "unstable-sort-with-ties"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using numpy sort() or argsort() without kind='stable' on data with ties produces non-deterministic ordering of equal elements. Default quicksort has arbitrary tie-breaking.
"""

explanation = """
For reproducible sorting with potential ties, use kind='stable' (mergesort) which preserves relative order of equal elements.
"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze sorting for stable tie-breaking.

NumPy's default sort (quicksort) does not guarantee stable ordering of equal elements. When sorting data with potential ties (rankings, scores, probabilities), the relative order of ties varies between runs.

Correct approach: Use kind='stable' for reproducible tie-breaking.

Does this code sort data with potential ties without stable sort?

Look for:
- np.sort() or np.argsort() without kind='stable'
- Sorting scores, rankings, or data that may have duplicates
- Order-dependent operations after sorting

YES = Bug found: sorting without kind='stable' on data with potential ties
NO = Correct: kind='stable' used, or data is guaranteed unique
"""

warning_message = """
Default numpy sort has non-deterministic tie-breaking. Use kind='stable' for reproducible ordering of equal elements.
"""

min_confidence = 0.85
false_positive_risks = []

