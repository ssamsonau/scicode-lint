# scicode-lint configuration
#
# SINGLE SOURCE OF TRUTH for all default values.
# This file is bundled with the package and loaded by config.py.
#
# Override order (highest priority first):
# 1. Environment variables (SCICODE_LINT_*)
# 2. Local config: ./config.toml
# 3. User config: ~/.config/scicode-lint/config.toml
# 4. This bundled default (lowest priority)

[llm]
# Model path for starting vLLM server (HuggingFace model ID)
# RedHatAI version: ~50% memory reduction, ~2x throughput via dynamic FP8 quantization
model = "RedHatAI/Qwen3-8B-FP8-dynamic"

# Served model name for API calls (the --served-model-name alias)
# This is what vLLM exposes via /v1/models endpoint
# Must match the name from start_vllm.sh (derived from model path)
model_served_name = "qwen3-8b-fp8"

# API base URL (auto-detected if not specified)
# vLLM typically runs on http://localhost:5001 or http://localhost:8000
base_url = ""

# Request timeout in seconds
timeout = 180

# Sampling parameters for Qwen3 thinking mode
# (recommended by https://huggingface.co/Qwen/Qwen3-8B-FP8)
# DO NOT use greedy decoding (temperature=0) with thinking models
temperature = 0.6
top_p = 0.95
top_k = 20

# Maximum input tokens (code + prompts)
# Covers ~1,500 line files (90-95th percentile of Python files)
# Qwen3-8B supports up to 32K native context
max_input_tokens = 16000

# Maximum output tokens (thinking + response)
# See benchmarks/reports/max_tokens/BENCHMARK_SUMMARY.md for accuracy/speed tradeoffs
max_completion_tokens = 4096

# Note: vLLM max_model_len is calculated as max_input_tokens + max_completion_tokens (20K total)
# With FP8 KV cache, 20K context uses ~1.5GB VRAM, fits comfortably on 16GB GPUs

[vllm]
# Minimum VRAM requirement in MB (16GB = 16384 MB, with some tolerance = 15500)
min_vram_mb = 15500

# GPU memory utilization (0.0-1.0)
gpu_memory_utilization = 0.85

# Note: All patterns are checked concurrently (no limit)
# vLLM handles batching and queuing internally

[llm.prompts]
# System prompt for vLLM (short version to avoid concurrent request issues)
vllm_system = """You are a code analyzer. Analyze the code and answer the detection question.
Be conservative - only report bugs you're confident about (confidence >= 0.7).
Use function/class/method names for locations, not line numbers."""

[linter]
# Path to detection catalog YAML
catalog_path = "src/scicode_lint/detection_catalog.yaml"

# Minimum confidence threshold (0.0-1.0)
min_confidence = 0.7

# Enabled severity levels
enabled_severities = ["critical", "high", "medium"]

[performance]
# Process multiple files in parallel (not yet implemented)
max_concurrent_files = 1

# Max concurrent pattern checks per file (--lint-concurrency)
# Controls how many LLM requests client sends in parallel
# Reduced from 200 to 150 based on speed benchmark showing 100% KV cache
# utilization and 527 preemptions - see benchmarks/reports/speed/
lint_concurrency = 150

# vLLM --max-num-seqs: Max sequences vLLM server can batch
# This is vLLM's internal limit, passed to start_vllm.sh
# Default 256 is vLLM's default; reduce if OOM during high concurrency
vllm_max_num_seqs = 256

[claude_cli]
# Global rate limiting for all Claude CLI calls (shared across ALL callers)
# Prevents API rate limit errors (HTTP 429) when multiple tools run simultaneously

# Max parallel Claude CLI subprocesses (asyncio.Semaphore)
# Memory-bound: ~500MB per process. 32 × 500MB = 16GB, fits in 20GB with headroom
claude_max_parallel_processes = 32

# Max requests per minute (token bucket via aiolimiter)
# Tier 1 API limit is 50 RPM; 40 gives safe margin
# Increase if on higher tier (Tier 4 = 4000 RPM)
claude_max_requests_per_minute = 40

[pattern_verification]
# Model for semantic validation: "sonnet" or "opus"
# Sonnet recommended for batch tasks; Opus for development only
semantic_model = "sonnet"

# Model for diversity check: "sonnet" or "opus"
# Sonnet with low effort recommended for batch pairwise comparisons
diversity_model = "sonnet"

[preprocessing]
# Strip # comments before LLM analysis
# Prevents intention leakage, removes misleading comments, reduces tokens
strip_comments = true

# Keywords for ML import filter (deterministic, no LLM)
# Files containing any of these are sent to LLM for classification
# Files without any of these are skipped (fast path)
ml_import_keywords = [
    # ML frameworks
    "sklearn",
    "torch",
    "tensorflow",
    "keras",
    "xgboost",
    "lightgbm",
    "catboost",
    # Data processing
    "pandas",
    "numpy",
    # Common ML operations (found in code, not just imports)
    "train_test_split",
    "cross_val",
    "fit",
    "predict",
    "model",
    "classifier",
    "regressor",
    "neural",
    "dataset",
    "dataloader",
]

# Max concurrent LLM requests for file classification (--filter-concurrency)
filter_concurrency = 50
