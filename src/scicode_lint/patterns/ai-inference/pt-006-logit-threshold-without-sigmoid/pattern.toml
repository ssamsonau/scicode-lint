# Pattern: pt-006-logit-threshold-without-sigmoid
# Fixed: Pattern was misnamed. Actual detection is about thresholding raw logits.

[meta]
id = "pt-006"
name = "logit-threshold-without-sigmoid"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-06"
author = "scicode-lint"

description = """
Thresholding raw logits (e.g., logits > 0.5) is meaningless because logits are unbounded values. A logit of 0.5 does not mean 50% probability. Apply torch.sigmoid() to convert logits to probabilities before thresholding.
"""

explanation = """
Thresholding raw logits is meaningless — logits are unbounded. Apply torch.sigmoid() first, then threshold.

"""

tags = ["pytorch", "binary-classification", "inference"]
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/generated/torch.nn.BCEWithLogitsLoss.html",
    "https://pytorch.org/docs/stable/generated/torch.sigmoid.html",
]

[detection]
question = """
Does this code apply a THRESHOLD to raw neural network LOGITS for BINARY CLASSIFICATION without converting to probabilities first?

CRITICAL: This pattern ONLY applies when there is an ACTUAL COMPARISON with a threshold value (like > 0.5, > 0.7).

Look for code that does: output > 0.5 or output > threshold WITHOUT torch.sigmoid() first.

NOT a bug (answer NO):
- Multi-class classification using argmax (no threshold needed)
- Regression models predicting continuous values (no threshold comparison)
- Code that applies sigmoid() before thresholding
- Code with NO threshold comparison at all

BUG (answer YES):
- Binary classifier output compared to 0.5 without sigmoid (e.g., logits > 0.5)
- BCEWithLogitsLoss used but raw output thresholded directly

IMPORTANT: If there is NO threshold comparison (no > 0.5 or similar), answer NO.

YES = Bug found: raw logits compared to threshold without sigmoid
NO = Correct: sigmoid applied, OR no threshold comparison, OR multi-class/regression
"""

warning_message = """
Thresholding raw logits is meaningless — logits are unbounded. Apply torch.sigmoid() first, then threshold.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/binary_classifier_threshold.py"
description = "Binary classifier that thresholds raw logits without applying sigmoid first"
expected_issue = "The predict_batch and evaluate_model functions apply threshold (> 0.5) directly to unbounded logits instead of probabilities"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "predict_batch"
snippet = "predictions = (logits > 0.5).float()"
lines = [22]

[[tests.positive]]
file = "test_positive/sentiment_classifier.py"
description = "Sentiment classifier thresholding raw model output without sigmoid"
expected_issue = "The classify_text and process_reviews functions threshold raw logits at 0.5 without converting to probabilities"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "classify_text"
snippet = "is_positive = raw_output > 0.5"
lines = [24]

[[tests.negative]]
file = "test_negative/multiclass_classifier.py"
description = "Multi-class classifier using argmax - not binary classification, no sigmoid needed"

[[tests.negative]]
file = "test_negative/text_encoder_multiclass.py"
description = "Multi-class text encoder using softmax and argmax - not binary classification"


[[tests.positive]]
file = "test_positive/batch_prediction.py"
description = "Batch predictor class and image classifier function both threshold raw logits without sigmoid"
expected_issue = "The BatchPredictor.predict_batch and classify_images functions threshold raw unbounded logits (>0.5, >0.7) directly instead of converting to probabilities with sigmoid first"
min_confidence = 0.85

[tests.positive.expected_location]
type = "class"
name = "BatchPredictor"
snippet = "class BatchPredictor"
lines = [4]

[[tests.negative]]
file = "test_negative/regression_model.py"
description = "Regression model predicting continuous values - no binary classification threshold"
