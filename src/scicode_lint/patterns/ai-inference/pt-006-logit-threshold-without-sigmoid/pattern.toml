# Pattern: pt-006-logit-threshold-without-sigmoid
# Fixed: Pattern was misnamed. Actual detection is about thresholding raw logits.

[meta]
id = "pt-006"
name = "logit-threshold-without-sigmoid"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-06"
author = "scicode-lint"

description = """
Thresholding raw logits (e.g., logits > 0.5) is meaningless because logits are unbounded values. A logit of 0.5 does not mean 50% probability. Apply torch.sigmoid() to convert logits to probabilities before thresholding.
"""

explanation = """
Thresholding raw logits is meaningless — logits are unbounded. Apply torch.sigmoid() first, then threshold.

"""

tags = ["pytorch", "binary-classification", "inference"]
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/generated/torch.nn.BCEWithLogitsLoss.html",
    "https://pytorch.org/docs/stable/generated/torch.sigmoid.html",
]

[detection]
question = """
Analyze BINARY classification thresholding in this code.

FIRST: Determine if this is BINARY classification (2 classes, single output) or MULTI-CLASS (3+ classes, multiple outputs).
- Binary: single output neuron, BCELoss/BCEWithLogitsLoss, threshold at 0.5
- Multi-class: multiple output neurons, CrossEntropyLoss, use argmax for prediction

This pattern ONLY applies to BINARY classification. Multi-class classification correctly uses argmax on logits.

For binary: Raw logits are unbounded. Thresholding logits > 0.5 is meaningless without sigmoid.
Correct approach: Apply sigmoid() to convert logits to probabilities [0,1], then threshold.

Does this BINARY classification code threshold raw logits without sigmoid?

Look for:
- Single-output binary classifier with output > 0.5 without sigmoid
- BCEWithLogitsLoss used but threshold applied to raw output
- NOT multi-class with argmax (that is correct)

YES = Bug found: BINARY classification thresholding raw logits without sigmoid
NO = Correct: sigmoid applied before threshold, OR this is MULTI-CLASS using argmax
"""

warning_message = """
Thresholding raw logits is meaningless — logits are unbounded. Apply torch.sigmoid() first, then threshold.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/binary_classifier_threshold.py"
description = "Binary classifier that thresholds raw logits without applying sigmoid first"
expected_issue = "The predict_batch and evaluate_model functions apply threshold (> 0.5) directly to unbounded logits instead of probabilities"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "predict_batch"
snippet = "predictions = (logits > 0.5).float()"

[[tests.positive]]
file = "test_positive/sentiment_classifier.py"
description = "Sentiment classifier thresholding raw model output without sigmoid"
expected_issue = "The classify_text and process_reviews functions threshold raw logits at 0.5 without converting to probabilities"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "classify_text"
snippet = "is_positive = raw_output > 0.5"

[[tests.negative]]
file = "test_negative/binary_classifier_correct.py"
description = "Binary classifier that correctly applies sigmoid before thresholding"

[[tests.negative]]
file = "test_negative/sentiment_with_sigmoid.py"
description = "Sentiment classifier that correctly converts logits to probabilities before thresholding"


[[tests.positive]]
file = "test_positive/batch_prediction.py"
description = "Batch predictor class and image classifier function both threshold raw logits without sigmoid"
expected_issue = "The BatchPredictor.predict_batch and classify_images functions threshold raw unbounded logits (>0.5, >0.7) directly instead of converting to probabilities with sigmoid first"
min_confidence = 0.85

[tests.positive.expected_location]
type = "class"
name = "BatchPredictor"
snippet = "class BatchPredictor"

[[tests.negative]]
file = "test_negative/batch_prediction_correct.py"
description = "Batch predictor and image classifier correctly apply sigmoid before thresholding"
