# Pattern: pt-011-unbatched-gpu-inference

[meta]
id = "pt-011"
name = "unbatched-gpu-inference"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-06"
author = "scicode-lint"

description = """
Sending the entire test dataset to GPU in a single forward pass causes out-of-memory errors on large datasets. Process data in batches using a DataLoader to avoid OOM and enable efficient GPU utilization.
"""

explanation = """
Sending the entire test set to GPU at once causes OOM on large datasets. Evaluate in batches.

"""

tags = ["pytorch", "gpu", "memory", "inference"]
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/data.html",
]

[detection]
question = """
Does this code send an ENTIRE dataset to GPU in a single forward pass?

The bug: Loading ALL test data to GPU at once (e.g., model(X_test.cuda())) causes OOM on large datasets.

ANSWER YES (bug) if:
- Full dataset variable (X_test, test_images, all_data) sent to GPU
- No batch loop or DataLoader visible
- Single forward pass on entire dataset

ANSWER NO (correct) if ANY of these:
- Uses DataLoader for batching
- Has batch loop (for batch in ..., batch_size parameter, accumulates into batches)
- Processes items one at a time in a stream/loop
- Uses torch.stack() on accumulated small batches

YES = Bug: entire dataset to GPU in single forward pass
NO = Correct: uses batching, DataLoader, or streaming
"""

warning_message = """
Sending the entire test set to GPU at once causes OOM on large datasets. Evaluate in batches.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/entire_dataset_to_gpu.py"
description = "Evaluation functions that move entire test dataset to GPU in a single operation without batching"
expected_issue = "The evaluate_on_test_set and run_inference functions load all test data to GPU at once, which will cause OOM errors on large datasets"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "evaluate_on_test_set"
snippet = "test_images = test_images.to(device)"

[[tests.positive]]
file = "test_positive/single_forward_pass.py"
description = "Test functions that perform single forward pass on entire test set loaded to GPU"
expected_issue = "The test_model and predict_all functions move complete datasets to GPU without batching, risking memory overflow"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "test_model"
snippet = "X_test = X_test.cuda()"

[[tests.positive]]
file = "test_positive/embedding_full_dataset.py"
description = "Embedding extraction that loads entire sequence dataset to GPU in one operation"
expected_issue = "The compute_embeddings and extract_features functions load all sequences to GPU at once without batching"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_embeddings"
snippet = "sequences_gpu = all_sequences.to(device)"

[[tests.negative]]
file = "test_negative/batched_evaluation.py"
description = "Properly batched evaluation using data loaders to process test set in chunks"

[[tests.negative]]
file = "test_negative/proper_batch_processing.py"
description = "Correct implementation using DataLoader for batch-wise GPU processing"


[[tests.context_dependent]]
file = "test_context_dependent/real_time_processor.py"
description = "Real-time streaming inference processing individual items - inefficient for throughput but acceptable when latency is critical"
context_notes = "Single-sample inference is acceptable in true real-time streaming where latency matters more than throughput"
allow_detection = true
allow_skip = true

[[tests.negative]]
file = "test_negative/real_time_processor_batched.py"
description = "Real-time inference with buffering that accumulates samples into batches before GPU processing"
