[meta]
id = "pt-013"
name = "missing-inference-mode"
category = "ai-inference"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using torch.no_grad() instead of torch.inference_mode() for production inference. inference_mode() is faster and uses less memory because it disables view tracking and version counting.
"""

explanation = """
torch.inference_mode() is faster than no_grad() for production inference. Use inference_mode() when gradients will never be needed.
"""

tags = ["pytorch", "inference", "performance"]
related_patterns = ["pt-007-inference-without-eval"]
references = [
    "https://pytorch.org/docs/stable/generated/torch.autograd.grad_mode.inference_mode.html",
    "https://pytorch.org/docs/stable/generated/torch.no_grad.html",
]

[detection]
question = """
Is this PRODUCTION INFERENCE code using torch.no_grad() instead of torch.inference_mode()?

KEY DISTINCTION:
- PRODUCTION INFERENCE: API endpoints, model serving, standalone prediction scripts
- TRAINING VALIDATION: evaluate/validation functions in training pipelines (no_grad is fine here)

How to tell the difference:
- If the file has model.train() or optimizer.step() anywhere → it's training code, no_grad() is OK
- If the file is an API/serving endpoint with no training code → production inference, use inference_mode()

Does this file contain PRODUCTION SERVING code (no training) using no_grad()?

YES = Production inference API/serving code using no_grad() instead of inference_mode()
NO = Training validation (file has training code), or already uses inference_mode()
"""

warning_message = """
torch.inference_mode() is faster than no_grad() for production inference. Use inference_mode() when gradients will never be needed.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/production_inference_no_grad.py"
description = "Production inference server using torch.no_grad() instead of torch.inference_mode()"
expected_issue = "Production inference using no_grad() where inference_mode() would be faster"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "serve_prediction"
snippet = "with torch.no_grad():"
lines = [19]

[[tests.negative]]
file = "test_negative/training_validation.py"
description = "Training validation using no_grad() appropriately"

[[tests.negative]]
file = "test_negative/scripted_model_inference.py"
description = "TorchScript model inference correctly using torch.inference_mode()"

[[tests.negative]]
file = "test_negative/production_inference_mode.py"
description = "Production inference correctly using torch.inference_mode()"

[[tests.positive]]
file = "test_positive/api_endpoint_no_grad.py"
description = "Image classification service with preprocessing pipeline using torch.no_grad()"
expected_issue = "Production image classification service using no_grad() instead of inference_mode()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "classify_image"
snippet = "with torch.no_grad():"
lines = [20]

[[tests.positive]]
file = "test_positive/embedding_service.py"
description = "Similarity search engine using torch.no_grad() for query encoding and document indexing"
expected_issue = "Production similarity search using no_grad() instead of inference_mode() for encoding"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "find_similar"
snippet = "with torch.no_grad():"
lines = [16]
