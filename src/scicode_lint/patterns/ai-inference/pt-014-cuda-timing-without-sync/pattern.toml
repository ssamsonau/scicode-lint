[meta]
id = "pt-014"
name = "cuda-timing-without-sync"
category = "ai-inference"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Measuring CUDA timing without torch.cuda.synchronize() produces inaccurate results. CUDA operations are asynchronous - GPU kernels return immediately while execution continues in background.
"""

explanation = """
CUDA operations are asynchronous. Without synchronize(), timing only captures the time to queue operations, not actual execution time. Always call torch.cuda.synchronize() before measuring end time.
"""

tags = []
related_patterns = []
references = ["https://pytorch.org/docs/stable/notes/cuda.html#asynchronous-execution"]

[detection]
question = """
Does this code benchmark GPU KERNEL timing without synchronization?

IMPORTANT: Only flag code explicitly measuring GPU kernel/model execution time.
High-level program timing (measuring overall script duration) does NOT need synchronize().

Look for explicit GPU benchmarking patterns:
- Timing model inference: start = time.time(); model(x); elapsed = time.time() - start
- Timing specific GPU operations: timing individual layers, forward passes
- Benchmarking code: functions named "benchmark", "profile", "measure_latency"

NOT a bug (answer NO):
- High-level program timing (timing entire script, epoch, or long process)
- torch.profiler (handles sync internally)
- torch.cuda.Event() (proper GPU timing method)
- PyTorch Lightning Trainer (handles sync internally)
- Operations that implicitly sync: .cpu(), .numpy(), print(tensor), saving results
- torch.cuda.synchronize() called before end time

YES = Bug: Explicit GPU kernel timing without synchronize() before end time
NO = Clean: High-level timing, profiler, CUDA events, implicit sync, or synchronize() called
"""

warning_message = """
CUDA timing without torch.cuda.synchronize() is inaccurate. Call synchronize() before measuring end time to ensure all GPU operations complete.
"""

min_confidence = 0.85
false_positive_risks = ["Code that intentionally measures queue overhead rather than execution time", "Timing regions where GPU work is negligible compared to CPU work"]

[tests]

[[tests.positive]]
file = "test_positive/timing_without_sync.py"
description = "Timing GPU operations without CUDA synchronization"
expected_issue = "time.perf_counter() used without torch.cuda.synchronize()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "benchmark_model"
snippet = "time.perf_counter()"
lines = [10, 13]

[[tests.positive]]
file = "test_positive/timing_without_sync.py"
description = "Single inference timing without CUDA synchronization"
expected_issue = "time.time() used without torch.cuda.synchronize()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "measure_inference_time"
snippet = "time.time()"
lines = [20, 23]

[[tests.negative]]
file = "test_negative/cpu_benchmark.py"
description = "CPU-only benchmarking (no CUDA sync needed)"

[[tests.negative]]
file = "test_negative/torch_profiler.py"
description = "Using torch.profiler for GPU profiling"

[[tests.negative]]
file = "test_negative/cuda_events.py"
description = "Using CUDA events for accurate GPU timing"

[[tests.negative]]
file = "test_negative/highlevel_timing.py"
description = "High-level program timing (epoch duration, experiment time) - microsecond precision not needed"

[[tests.positive]]
file = "test_positive/gpu_profiler.py"
description = "Layer-by-layer GPU timing without synchronization causing inaccurate measurements"
expected_issue = "time.time() and time.perf_counter() used to measure GPU layer execution without torch.cuda.synchronize()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "profile_layers"
snippet = "time.time()"
lines = [10, 12, 14, 16]

[[tests.positive]]
file = "test_positive/latency_measurement.py"
description = "Forward pass and batch size benchmarking without CUDA synchronization producing unreliable timing"
expected_issue = "time.perf_counter() and time.time() measure GPU operations without torch.cuda.synchronize() before end time"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "profile_forward_pass"
snippet = "time.perf_counter()"
lines = [10, 12]
