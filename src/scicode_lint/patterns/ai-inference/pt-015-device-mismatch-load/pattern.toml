[meta]
id = "pt-015"
name = "device-mismatch-load"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Loading a model with torch.load() without map_location can fail when CUDA is unavailable or when deploying to CPU-only environments. Models saved on GPU will try to load onto that GPU device.
"""

explanation = """
Always specify map_location when loading models to ensure portability. Use map_location='cpu' for CPU inference or map_location=device for flexible deployment.
"""

tags = ["pytorch", "model-loading", "deployment"]
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/generated/torch.load.html",
    "https://pytorch.org/tutorials/beginner/saving_loading_models.html",
]

[detection]
question = """
Analyze model loading for device compatibility.

torch.load() without map_location attempts to load to the original save device.
This fails on CPU-only machines if saved on GPU.

Does this code use torch.load() without map_location?

Look for:
- torch.load(path) without map_location parameter

NOT a bug (answer NO):
- PyTorch Lightning: load_from_checkpoint() handles device mapping internally
- torch.jit.load() - different API, handles device mapping
- safetensors.torch.load_file() - no device encoding in format
- torch.load(..., map_location=...) - explicitly specified
- CUDA-only scripts: if code explicitly requires CUDA (assert cuda.is_available), map_location doesn't help

YES = Bug: torch.load() without map_location in general-purpose code
NO = Clean: Lightning load_from_checkpoint, jit.load, safetensors, map_location specified, or CUDA-only
"""

warning_message = """
torch.load() without map_location can fail on CPU-only systems. Always specify map_location='cpu' or map_location=device for portable model loading.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/load_without_map_location.py"
description = "Loading model without map_location parameter"
expected_issue = "torch.load() without map_location will fail on CPU-only systems"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_model"
snippet = "torch.load(path)"
lines = [16]

[[tests.positive]]
file = "test_positive/load_without_map_location.py"
description = "Loading checkpoint without map_location parameter"
expected_issue = "torch.load() without map_location will fail on CPU-only systems"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_checkpoint"
snippet = "torch.load(checkpoint_path)"
lines = [22]

[[tests.negative]]
file = "test_negative/jit_load_model.py"
description = "Using torch.jit.load with map_location"

[[tests.negative]]
file = "test_negative/model_from_scratch.py"
description = "Loading checkpoints with map_location using a class-based loader and helper functions"

[[tests.negative]]
file = "test_negative/safetensors_load.py"
description = "Loading with safetensors (no device mismatch)"

[[tests.negative]]
file = "test_negative/load_with_map_location.py"
description = "Using torch.load with map_location parameter for portable loading"

[[tests.negative]]
file = "test_negative/lightning_load.py"
description = "PyTorch Lightning load_from_checkpoint handles device mapping internally - no map_location needed"

[[tests.positive]]
file = "test_positive/load_ensemble.py"
description = "Loading multiple models in a loop without map_location will fail when models were saved on GPU"
