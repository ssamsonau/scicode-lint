[meta]
id = "pt-016"
name = "half-precision-cpu-inference"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using float16/half precision on CPU is extremely slow. CPUs lack native float16 support and must convert to float32 for computation. Use float32 or bfloat16 for CPU inference.
"""

explanation = """
float16 on CPU can be 50x slower than float32. Use float32 for CPU inference, or bfloat16 if available. Reserve float16 for GPU inference only.
"""

tags = ["pytorch", "precision", "cpu", "performance"]
related_patterns = []
references = [
    "https://pytorch.org/tutorials/recipes/recipes/amp_recipe.html",
    "https://github.com/pytorch/pytorch/issues/97068",
]

[detection]
question = """
Does this code use float16/half precision on CPU?

float16 on CPU is extremely slow because CPUs lack native float16 arithmetic.

CRITICAL: float16 on GPU is CORRECT - only flag float16 on CPU as a bug.

Check for BOTH conditions:
1. Half precision: .half(), torch.float16, dtype=torch.float16
2. EXPLICIT CPU device: .cpu(), device='cpu', device="cpu", map_location='cpu'

ANSWER NO (not a bug) if ANY of these are true:
- Code uses .cuda() anywhere with .half()
- Code uses device='cuda' or device="cuda"
- Code has device_type="cuda" or "cuda" in device strings
- No explicit CPU device is mentioned

ANSWER YES (bug) only if:
- Code has EXPLICIT CPU device (.cpu(), device='cpu', device="cpu")
- AND uses float16 (.half(), torch.float16)

YES = Bug: float16/half AND explicit CPU device in same code path
NO = Not a bug: GPU code, no explicit CPU, or no float16
"""

warning_message = """
float16 on CPU is extremely slow (~50x slower than float32). Use float32 for CPU inference. Reserve float16 for GPU only.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/half_on_cpu.py"
description = "Recommendation model deployed on CPU with half precision for scoring"
expected_issue = "model.half() and torch.float16 used on CPU for recommendation inference"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "deploy_recommender"
snippet = "model.half()"
lines = [21]

[[tests.negative]]
file = "test_negative/cpu_proper_precision.py"
description = "CPU inference with proper precision (float32, quantized)"

[[tests.negative]]
file = "test_negative/gpu_half_precision.py"
description = "float16 on GPU with tensor cores (correct usage)"

[[tests.negative]]
file = "test_negative/bfloat16_cpu.py"
description = "bfloat16 on CPU (efficient on supported hardware)"

[[tests.positive]]
file = "test_positive/cpu_half_model.py"
description = "Speech encoder model using half precision for CPU transcription"
expected_issue = "model.cpu().half() for speech recognition on CPU"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "transcribe_on_cpu"
snippet = "model.half()"
lines = [21]

[[tests.positive]]
file = "test_positive/half_precision_cpu.py"
description = "Multiple functions converting Transformer model to half precision and CPU in various patterns: chained .half().cpu(), .to(dtype=torch.float16, device='cpu'), and sequential calls."
expected_issue = "float16 precision used on CPU device in model conversion and inference"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "run_cpu_inference"
snippet = "model.half().cpu()"
lines = [20]
