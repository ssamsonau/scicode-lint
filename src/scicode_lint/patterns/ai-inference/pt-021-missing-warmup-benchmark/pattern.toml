[meta]
id = "pt-021"
name = "missing-warmup-benchmark"
category = "ai-inference"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Benchmarking inference without warmup iterations produces inflated timing measurements. First passes incur JIT compilation, CUDA kernel launches, and memory allocation overhead.
"""

explanation = """
Always run warmup iterations before timing inference. The first few forward passes include one-time overhead that doesn't represent steady-state performance.
"""

tags = ["benchmark", "cuda", "performance"]
related_patterns = []
references = ["https://pytorch.org/tutorials/recipes/recipes/benchmark.html"]

[detection]
question = """
Does this code measure GPU BENCHMARK timing without warmup?

CRITICAL DISTINCTION - This pattern ONLY applies to BENCHMARK code:
- BENCHMARK code: Measures model inference speed for performance comparison or reporting
- OPERATIONAL code: Measures total pipeline time, training progress, or wall-clock duration

FIRST: Is this BENCHMARK code? Look for these indicators:
- Function/variable names: benchmark, latency, throughput, fps, inference_time, profile
- Purpose: Comparing model speed, reporting performance numbers, measuring per-iteration time
- Output: Reports ms/iter, samples/sec, or similar performance metrics

If NOT benchmark code (answer NO immediately):
- Training progress monitoring (epoch timing, batch timing for logging)
- End-to-end pipeline timing (total script duration)
- Wall-clock measurements where startup costs ARE part of what's being measured
- Inference scripts that just run predictions (not measuring performance)

SECOND: For BENCHMARK code only, check for warmup:
- Uses torch.profiler or `with profile(` → NO (profiler handles warmup)
- Warmup loop runs BEFORE timing starts → NO
- First N iterations discarded from results → NO
- CPU-only code (no .cuda(), no CUDA tensors) → NO

YES = GPU BENCHMARK timing from first iteration without warmup
NO = Not benchmark code, OR has warmup, OR CPU-only, OR uses profiler
"""

warning_message = """
Benchmark without warmup includes one-time overhead. Run 10-50 warmup iterations before timing for accurate measurements.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/benchmark_no_warmup.py"
description = "Benchmarking from first iteration without warmup"
expected_issue = "Timing starts from first forward pass without warmup"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "start = time"
lines = [12, 25]

[[tests.negative]]
file = "test_negative/profiler_benchmark.py"
description = "Using torch.profiler for benchmarking"

[[tests.negative]]
file = "test_negative/cpu_timing.py"
description = "CPU-only timing without GPU warmup needs"

[[tests.negative]]
file = "test_negative/warmup_benchmark.py"
description = "Proper benchmarking with warmup iterations"

[[tests.negative]]
file = "test_negative/training_timing.py"
description = "Training progress timing - operational monitoring, not benchmarking"

[[tests.positive]]
file = "test_positive/profile_model.py"
description = "Profiling inference timing without warmup iterations before measurement loop"
expected_issue = "Timing includes overhead from first inference pass, producing inaccurate baseline measurements"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "start = time"
lines = [14, 26]

[[tests.positive]]
file = "test_positive/throughput_test.py"
description = "Measuring throughput by timing batches without warming up model first"
expected_issue = "First batch includes JIT compilation and cuDNN autotuning overhead, skewing throughput calculation"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "start = time"
lines = [13, 27]
