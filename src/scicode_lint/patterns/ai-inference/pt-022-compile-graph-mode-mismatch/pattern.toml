[meta]
id = "pt-022"
name = "compile-graph-mode-mismatch"
category = "ai-inference"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
A torch.compile() model used in both training and inference modes triggers recompilation overhead when switching modes, degrading performance.
"""

explanation = """
torch.compile() caches graphs based on input shapes and modes. Switching between train()/eval() or no_grad()/requires_grad on a compiled model triggers recompilation each time, adding significant overhead. This is a performance issue, not a functional error - the code still runs correctly but slower than expected.
"""

tags = ["pytorch", "torch-compile", "performance"]
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/generated/torch.compile.html",
    "https://pytorch.org/tutorials/intermediate/torch_compile_tutorial.html",
]

[detection]
question = """
Does this code use the SAME torch.compile() model in BOTH training and inference modes?

PERFORMANCE ISSUE: torch.compile() caches graphs for the mode (train/eval) at first call. Reusing one compiled model for both modes triggers recompilation each time the mode switches, adding significant overhead. This is NOT a functional error - the code runs correctly but slower than expected due to repeated recompilations.

Look for a SINGLE compiled model that:
1. Calls train() then later eval() (or vice versa)
2. Used both with and without no_grad()/inference_mode()

NOT an issue:
- Separate torch.compile() calls for train and eval modes
- Only one mode used throughout (always train or always eval)

YES = Same compiled model switches between train/eval modes (performance issue)
NO = Separate compilations for each mode, or single mode only
"""

warning_message = """
torch.compile() models incur recompilation overhead when switching between training and inference modes. Consider separate compiled models for each mode to avoid repeated recompilation.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/compile_mode_switch.py"
description = "Compiled model used in both training and inference modes"
expected_issue = "torch.compile() model switches between train/eval modes"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_and_eval"
snippet = "compiled_model.train()"
lines = [19]

[[tests.negative]]
file = "test_negative/uncompiled_model.py"
description = "Uncompiled model (no torch.compile)"

[[tests.negative]]
file = "test_negative/eval_only_compiled.py"
description = "Compiled model used only in eval mode"

[[tests.negative]]
file = "test_negative/separate_compiled_models.py"
description = "Separate compiled models for train/eval modes"

[[tests.positive]]
file = "test_positive/compiled_mode_switch.py"
description = "Compiled model switches between training and evaluation modes in validation loop"
expected_issue = "torch.compile() model reuses cached graph across train/eval modes"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_and_validate"
snippet = "compiled_model = torch.compile(model)"
lines = [27]

[[tests.positive]]
file = "test_positive/finetune_then_serve.py"
description = "Online learning system that finetunes compiled model then serves predictions, switching between train and eval modes"
expected_issue = "torch.compile() model switches between train() for finetuning and eval() for serving"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "online_learning_loop"
snippet = "compiled_model.train()"
lines = [23]

