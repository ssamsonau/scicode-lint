# Pattern: ml-003-target-encoding-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-003"
name = "target-encoding-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Target-derived features computed using statistics from the full dataset (including test data) before train/test split cause data leakage. The model sees test set information during training, leading to overly optimistic performance estimates.
"""

explanation = """
Data leakage: target-derived features encode test set information. Compute features only on training data.

"""

tags = ["sklearn", "feature-engineering", "data-leakage", "target-encoding"]
related_patterns = ["ml-001", "ml-002"]
references = ["https://scikit-learn.org/stable/common_pitfalls.html#data-leakage"]

[detection]
question = """
Analyze target encoding for data leakage.

Target encoding (replacing categories with target means) must use only training data statistics. Computing encodings before train/test split causes leakage because test set target values influence the encoding.

Correct approach: Compute target means only from training data, apply mapping to both train and test.

Does this code compute target encoding before train/test split?

Look for:
- df.groupby('category')['target'].mean() on full dataset
- Target encoding computed before train_test_split()
- Encoding statistics that include test set target values

YES = Bug found: target encoding uses full dataset including test
NO = Correct: encoding computed from training data only
"""

warning_message = """
Data leakage: target-derived features encode test set information. Compute features only on training data.

"""

min_confidence = 0.85
false_positive_risks = []

