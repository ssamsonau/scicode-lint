# Pattern: ml-004-imbalanced-accuracy-metric
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-004"
name = "imbalanced-accuracy-metric"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using accuracy as an evaluation metric on imbalanced classification problems is misleading. When classes are imbalanced (e.g., 95% negative, 5% positive), a model that always predicts the majority class achieves high accuracy while being completely useless. Appropriate metrics include precision, recall, F1-score, or AUC-ROC.
"""

explanation = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

tags = ["sklearn", "metrics", "classification", "imbalanced-data"]
related_patterns = ["ml-008"]
references = ["https://scikit-learn.org/stable/modules/model_evaluation.html#classification-metrics"]

[detection]
question = """
Does this code use accuracy_score() on data that is described as IMBALANCED or for RARE EVENT detection (fraud, anomaly, disease)?

WHY THIS MATTERS: On imbalanced data (e.g., 1% fraud), a model predicting "no fraud" always gets 99% accuracy while catching zero fraud cases.

PROBLEMATIC patterns:
- accuracy_score() with comments mentioning imbalance, rare events, or low percentages
- Fraud/anomaly/disease detection using accuracy_score()
- Code noting class distribution like "1% positive" or "rare cases"

ACCEPTABLE patterns:
- Using f1_score, roc_auc_score, precision_score, recall_score, balanced_accuracy_score
- accuracy_score() with no evidence of imbalance in the code

YES = accuracy_score() used on explicitly imbalanced or rare-event data
NO = Appropriate metrics used, or no evidence of imbalance in code
"""

warning_message = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]
# Test cases for ml-004-imbalanced-accuracy-metric

[[tests.positive]]
file = "test_positive/accuracy_on_imbalanced.py"
