expected_issue = "Wrong metric: accuracy on imbalanced classes is misleading"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "evaluate_with_accuracy_imbalanced"
snippet = "accuracy_score(y_test, y_pred)"

