# Pattern: ml-004-imbalanced-accuracy-metric
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-004"
name = "imbalanced-accuracy-metric"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using accuracy as an evaluation metric on imbalanced classification problems is misleading. When classes are imbalanced (e.g., 95% negative, 5% positive), a model that always predicts the majority class achieves high accuracy while being completely useless. Appropriate metrics include precision, recall, F1-score, or AUC-ROC.
"""

explanation = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

tags = ["sklearn", "metrics", "classification", "imbalanced-data"]
related_patterns = ["ml-008"]
references = ["https://scikit-learn.org/stable/modules/model_evaluation.html#classification-metrics"]

[detection]
question = """
Does this code use accuracy as the evaluation metric for FRAUD, ANOMALY, or DISEASE detection?

WHY THIS MATTERS: These are inherently imbalanced problems (e.g., 1% fraud). A model predicting "no fraud" always gets 99% accuracy while catching zero fraud cases.

PROBLEMATIC patterns (look for class/function names containing fraud, anomaly, disease, etc.):
- Class names like "FraudClassifier", "AnomalyDetector", "DiseasePredictor" using accuracy
- accuracy_score() or scoring="accuracy" in fraud/anomaly/disease detection code
- IsolationForest, OneClassSVM used with accuracy metric

ACCEPTABLE patterns:
- Using f1_score, roc_auc_score, precision_score, recall_score, balanced_accuracy_score
- Accuracy used in non-fraud/anomaly/disease contexts

YES = accuracy metric used in fraud/anomaly/disease detection code (look at class/function names)
NO = Appropriate metrics used, or not a fraud/anomaly/disease detection context
"""

warning_message = """
Wrong metric: accuracy on imbalanced classes is misleading. A model predicting the majority class gets high accuracy while being useless. Use AUC-ROC, precision-recall, or F1.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]
