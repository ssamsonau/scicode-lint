# Pattern: ml-006-temporal-shift-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-006"
name = "temporal-shift-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Negative shift operations (shift(-1), shift(-N)) or rolling/expanding windows with center=True pull future values into current rows as features, causing temporal data leakage. The model literally sees the answer it's trying to predict.
"""

explanation = """
Temporal leakage: shift or rolling operation may use future data as a feature. Verify the direction — the model may literally see the answer.

"""

tags = ["pandas", "feature-engineering", "time-series", "data-leakage"]
related_patterns = ["ml-003", "ml-005"]
references = ["https://pandas.pydata.org/docs/reference/api/pandas.DataFrame.shift.html"]

[detection]
question = """
Analyze temporal feature engineering for future data leakage.

Negative shift operations (shift(-1), shift(-N)) pull future values into current rows as features. Rolling windows with center=True also use future data. The model literally sees tomorrow's value when predicting today.

Correct approach: Only use shift(1) or positive shifts (past data), rolling windows without centering.

Does this code use future data in temporal features?

Look for:
- shift(-1), shift(-N) creating "tomorrow's value" features
- center=True in rolling/expanding windows
- Any operation that pulls future values into current row

YES = Bug found: feature uses future data (shift(-N) or center=True)
NO = Correct: only past data used (positive shifts, no centering)
"""

warning_message = """
Temporal leakage: shift or rolling operation may use future data as a feature. Verify the direction — the model may literally see the answer.

"""

min_confidence = 0.85
false_positive_risks = []

