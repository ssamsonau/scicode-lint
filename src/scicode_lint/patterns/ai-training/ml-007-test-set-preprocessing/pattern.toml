# Pattern: ml-007-test-set-preprocessing
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-007"
name = "test-set-preprocessing"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when fit_transform() is called on test data instead of transform(). This causes the test set to compute and use its own statistics (mean, std, min, max) rather than applying the statistics learned from the training set. This leads to overly optimistic performance estimates and models that fail in production where test statistics are unknown.
"""

explanation = """
Data leakage: fit_transform on test data means the test set uses its own statistics instead of training statistics. Use transform() on test data.

"""

tags = ["sklearn", "preprocessing", "data-leakage", "train-test-split"]
related_patterns = ["ml-001"]
references = ["https://scikit-learn.org/stable/common_pitfalls.html#data-leakage"]

[detection]
question = """
Analyze test set preprocessing for data leakage.

Using fit_transform() on test data computes statistics (mean, std) from the test set itself. This is leakage because in production, test statistics are unknown. The scaler should learn from training data only.

Correct approach: fit_transform(X_train), then transform(X_test).

Does this code fit preprocessing on test data?

Look for:
- scaler.fit_transform(X_test) or scaler.fit(X_test)
- Creating new scaler/encoder for test data
- Any fit() call on data after train_test_split that uses test portion

YES = Bug found: fit() or fit_transform() called on test data
NO = Correct: only transform() applied to test data
"""

warning_message = """
Data leakage: fit_transform on test data means the test set uses its own statistics instead of training statistics. Use transform() on test data.

"""

min_confidence = 0.85
false_positive_risks = []

