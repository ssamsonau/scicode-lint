[meta]
id = "ml-008"
name = "unstratified-split"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Missing stratification in train/test splits or cross-validation can cause skewed class distributions across folds, especially with imbalanced datasets. This leads to unreliable performance estimates and potentially biased models. Best practice is to use stratify parameter in train_test_split() or StratifiedKFold for classification tasks.
"""

explanation = """
Unstratified split on imbalanced data can produce folds with skewed class distributions. Use StratifiedKFold or train_test_split(stratify=y).

"""

tags = ["sklearn", "train-test-split", "classification", "stratification"]
related_patterns = ["ml-004"]
references = ["https://scikit-learn.org/stable/modules/cross_validation.html#stratification"]

[detection]
question = """
Analyze train/test splitting for classification tasks.

FIRST: Determine if this is a CLASSIFICATION task (discrete classes/labels) or REGRESSION task (continuous values).
- Classification indicators: categorical labels, class names, discrete categories, CrossEntropyLoss, accuracy metrics
- Regression indicators: continuous target values, MSELoss, MAE, R² metrics, price/temperature/measurement prediction

This pattern ONLY applies to classification. Regression tasks do NOT need stratification.

For classification: without stratification, random splits can produce skewed class distributions.
Correct approach: Use stratify=y in train_test_split() or StratifiedKFold.

Does this code have unstratified classification splitting?

Look for:
- train_test_split() without stratify parameter on CLASSIFICATION (not regression)
- KFold instead of StratifiedKFold for classification
- Discrete class labels being split without stratification

YES = Bug found: CLASSIFICATION task split without stratification
NO = Correct: stratify used, StratifiedKFold used, OR this is a REGRESSION task
"""

warning_message = """
Unstratified split on imbalanced data can produce folds with skewed class distributions. Use StratifiedKFold or train_test_split(stratify=y).

"""

min_confidence = 0.85
false_positive_risks = []

