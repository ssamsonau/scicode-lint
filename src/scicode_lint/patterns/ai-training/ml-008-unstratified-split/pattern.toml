[meta]
id = "ml-008"
name = "unstratified-split"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Missing stratification in train/test splits or cross-validation can cause skewed class distributions across folds, especially with imbalanced datasets. This leads to unreliable performance estimates and potentially biased models. Best practice is to use stratify parameter in train_test_split() or StratifiedKFold for classification tasks.
"""

explanation = """
Unstratified split on imbalanced data can produce folds with skewed class distributions. Use StratifiedKFold or train_test_split(stratify=y).

"""

tags = ["sklearn", "train-test-split", "classification", "stratification"]
related_patterns = ["ml-004"]
references = ["https://scikit-learn.org/stable/modules/cross_validation.html#stratification"]

[detection]
question = """
Analyze train/test splitting for classification tasks.

FIRST: Is this code CREATING splits or LOADING pre-defined splits?

PRE-DEFINED SPLITS (answer NO immediately):
- Loading splits from files: train.csv/test.csv, train_idx.npy, split_indices.json
- Using dataset with built-in splits: dataset.get_split(), load_data(split='train')
- Loading indices from external source: np.load('train_indices.npy')
- Stratification should be checked at split creation, not loading time

SECOND: For code CREATING splits, determine if CLASSIFICATION or REGRESSION:
- Classification indicators: categorical labels, class names, discrete categories, CrossEntropyLoss, NLLLoss, accuracy/precision/recall/F1 metrics, num_classes, softmax output
- Regression indicators: continuous target values, MSELoss, MAELoss, L1Loss, R² metrics, price/temperature/measurement prediction, single output neuron without activation

This pattern ONLY applies to classification. Regression tasks do NOT need stratification.

THIRD: For classification tasks CREATING splits, check for stratification:
- train_test_split() with stratify=y → NO (correct)
- StratifiedKFold, StratifiedShuffleSplit → NO (correct)
- train_test_split() WITHOUT stratify on classification → YES (bug)
- KFold on classification → YES (bug)

YES = Bug found: CLASSIFICATION task CREATING splits without stratification
NO = Loads pre-defined splits, OR regression task, OR stratification used
"""

warning_message = """
Unstratified split on imbalanced data can produce folds with skewed class distributions. Use StratifiedKFold or train_test_split(stratify=y).

"""

min_confidence = 0.85
false_positive_risks = []

