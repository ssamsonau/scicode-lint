# Pattern: pt-003-inplace-leaf-variable
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "pt-003"
name = "inplace-leaf-variable"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
In-place operations on leaf variables or input tensors that require gradients break PyTorch's autograd graph. This causes a runtime error during backward() because the tensor version has changed.
"""

explanation = """
In-place operations on leaf variables modify tensors that require gradients, which breaks PyTorch's autograd graph. This causes a runtime error: 'a leaf Variable that requires grad is being used in an in-place operation'. Avoid in-place operations (add_, sub_, mul_, div_, etc.) on inputs or parameters that need gradients.
"""

tags = ["pytorch", "gradients", "autograd", "in-place-operations"]
related_patterns = ["pt-005"]
references = ["https://pytorch.org/docs/stable/notes/autograd.html#in-place-operations-with-autograd"]

[detection]
question = """
Analyze tensor operations in this code for autograd compatibility.

In-place operations (+=, -=, *=, /=, add_(), mul_(), etc.) on tensors that require gradients break PyTorch's autograd graph. This causes runtime errors during backward() because the original tensor values are overwritten.

Correct approach: Use non-in-place operations (x = x + y instead of x += y).

Does this code have in-place operations on gradient-tracked tensors?

Look for:
- In-place operators (+=, -=, *=, /=) on tensors with requires_grad=True
- In-place methods (add_(), sub_(), mul_(), div_()) on leaf variables or forward() inputs

YES = Bug found: in-place operation on tensor that requires gradients
NO = Correct: only non-in-place operations, or in-place only on detached tensors
"""

warning_message = """
In-place operation on leaf variable: In-place operations modify tensors with requires_grad=True, breaking the autograd graph. This will cause a runtime error during backward(). Use non-in-place operations instead (e.g., x = x + y instead of x.add_(y)).
"""

min_confidence = 0.85
false_positive_risks = []

