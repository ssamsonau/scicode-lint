[meta]
id = "pt-005"
name = "detached-loss-backward"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling backward() on a detached loss tensor or after calling .item() disconnects the computation graph, preventing gradient computation. The model parameters won't be updated.
"""

explanation = """
Calling backward() on a detached tensor or after calling .item() breaks the gradient computation because the tensor is disconnected from the autograd graph. This results in no gradients being computed and the model not learning. Always call backward() on the original loss tensor before detaching or converting to scalar.
"""

tags = ["pytorch", "gradients", "autograd", "loss"]
related_patterns = ["pt-009"]
references = ["https://pytorch.org/docs/stable/autograd.html#torch.Tensor.backward"]

[detection]
question = """
Analyze the loss computation and backward pass in this code.

Calling backward() on a tensor disconnected from the model's computation graph prevents gradient computation. The model won't learn.

Ways the graph gets disconnected:
1. loss.detach().backward() - explicit detach
2. Using .data before backward()
3. Creating a new tensor from a scalar: torch.tensor(value, requires_grad=True) - this creates a NEW tensor with NO connection to the model's parameters
4. Computing a metric from detached outputs and backpropagating through it

Correct approach: Call backward() directly on the loss tensor computed from model outputs.

Does this code call backward() on a disconnected tensor?

Look for:
- loss.detach().backward()
- loss.clone().detach() followed by setting requires_grad=True - still disconnected from model
- torch.tensor(scalar_value, requires_grad=True) followed by backward() - the new tensor is not connected to model parameters
- loss.data.backward()
- Metric computed from outputs.detach() then converted to tensor for backward

YES = Bug found: backward() called on tensor disconnected from model graph
NO = Correct: backward() called on loss connected to model outputs
"""

warning_message = """
Backward on detached loss: Calling backward() on a detached loss or after .item() prevents gradient computation. The model parameters won't be updated. Call backward() on the original loss tensor before detaching or converting to scalar with .item().
"""

min_confidence = 0.85
