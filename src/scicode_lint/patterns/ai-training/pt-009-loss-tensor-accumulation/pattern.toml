# Pattern: pt-009-loss-tensor-accumulation
# Fixed: Pattern was misnamed. Actual detection is about accumulating loss tensors causing memory leaks.

[meta]
id = "pt-009"
name = "loss-tensor-accumulation"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Accumulating loss tensors directly without extracting scalar values keeps entire computation graphs in memory, causing severe memory leaks in training loops. Use loss.item() or loss.detach() to free the computation graph.
"""

explanation = """
Accumulating loss tensors directly keeps the entire computation graph in memory for each accumulated loss. This causes severe memory leaks in training loops. Use loss.item() or loss.detach() to extract the scalar value and free the computation graph.
"""

tags = ["pytorch", "memory", "computation-graph", "loss"]
related_patterns = ["pt-005"]
references = ["https://pytorch.org/docs/stable/notes/faq.html#my-model-reports-cuda-runtime-error-2-out-of-memory"]

[detection]
question = """
Analyze loss tracking in the training loop.

Accumulating loss tensors directly (total_loss += loss, losses.append(loss)) keeps entire computation graphs in memory, causing severe memory leaks. Each accumulated tensor retains its full graph.

Correct approach: Use loss.item() or loss.detach() when accumulating for logging.

Does this code accumulate loss tensors without detaching?

Look for:
- total_loss += loss (without .item() or .detach())
- losses.append(loss) storing raw tensors
- Running sum of loss tensors

YES = Bug found: loss tensors accumulated without .item() or .detach()
NO = Correct: uses .item() or .detach() for accumulation
"""

warning_message = """
Loss tensor accumulation: Accumulating loss tensors directly keeps entire computation graphs in memory, causing memory leaks. Extract the scalar value using loss.item() or loss.detach().cpu().item() before accumulating.
"""

min_confidence = 0.85
false_positive_risks = ["Intentional gradient accumulation across batches"]

[tests]

[[tests.positive]]
file = "test_positive/accumulate_loss_tensor.py"
description = "Accumulating loss tensor using addition (epoch_loss = epoch_loss + loss) - keeps computation graph in memory"
expected_issue = "Loss tensor accumulated without extracting scalar"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_with_tensor_accumulation"
snippet = "epoch_loss = epoch_loss + loss"
lines = [41]

[[tests.positive]]
file = "test_positive/loss_list_accumulation.py"
description = "Appending loss tensors to a list (batch_losses.append(loss)) - memory leak from retained graphs"
expected_issue = "Loss tensors stored in list without detaching"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_with_amp_logging"
snippet = "batch_losses.append(loss)"
lines = [42, 60]

[[tests.negative]]
file = "test_negative/accumulate_scalar.py"
description = "Correct usage: accumulating loss.item() to track training progress"

[[tests.negative]]
file = "test_negative/detach_before_accumulate.py"
description = "Correct usage: detaching loss before storing in list"

[[tests.context_dependent]]
file = "test_context_dependent/gradient_accumulation.py"
description = "Intentional gradient accumulation over multiple batches - loss accumulation is deliberate for effective batch size increase"
allow_detection = true
allow_skip = true
context_notes = """
This is acceptable when intentionally accumulating gradients across multiple batches to simulate larger batch sizes.
The accumulated loss should still be divided by accumulation_steps and backward() called on the scaled loss.
However, accumulating the loss tensor itself (not just gradients) still causes memory issues - should accumulate loss.item() for logging.
"""

[tests.context_dependent.expected_location]
type = "function"
name = "train_with_gradient_accumulation"
snippet = "accumulated_loss += loss"
lines = [37]


[[tests.positive]]
file = "test_positive/epoch_loss_track.py"
description = "Accumulating raw loss tensors in training loop (total_loss += loss and losses.append(loss)) - keeps computation graphs and causes memory leak"
expected_issue = "Loss tensors accumulated without extracting scalar values"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_epoch"
snippet = "total_loss += loss"
lines = [13, 26]

[[tests.negative]]
file = "test_negative/epoch_loss_track_correct.py"
description = "Correct usage: using loss.item() to extract scalar values before accumulating in training loop"
