[meta]
id = "pt-020"
name = "softmax-before-cross-entropy"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Applying softmax() before CrossEntropyLoss results in double softmax computation. CrossEntropyLoss already applies log-softmax internally, so pre-applying softmax produces numerically incorrect results.
"""

explanation = """
CrossEntropyLoss expects raw logits, not probabilities. It internally applies log_softmax for numerical stability. Pass logits directly to the loss function.
"""

tags = ["pytorch", "loss-function", "cross-entropy", "softmax"]
related_patterns = ["pt-005"]
references = ["https://pytorch.org/docs/stable/generated/torch.nn.CrossEntropyLoss.html"]

[detection]
question = """
Analyze loss function usage for softmax redundancy.

PyTorch's CrossEntropyLoss and F.cross_entropy expect raw logits (unnormalized scores) and internally apply log_softmax. Applying softmax() or log_softmax() before passing to CrossEntropyLoss results in incorrect loss computation.

Correct approach: Pass raw model outputs directly to CrossEntropyLoss.

Does this code apply softmax before CrossEntropyLoss?

Look for:
- F.softmax() or .softmax() followed by CrossEntropyLoss
- F.log_softmax() followed by CrossEntropyLoss (not NLLLoss)
- Redundant probability conversion before cross entropy

YES = Bug found: softmax applied before CrossEntropyLoss
NO = Correct: raw logits passed to CrossEntropyLoss
"""

warning_message = """
CrossEntropyLoss expects raw logits. Applying softmax() before it causes double normalization and incorrect loss values.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/softmax_then_ce.py"
description = "CNN classifier and ensemble evaluation both apply softmax before CrossEntropyLoss"
expected_issue = "softmax() applied before CrossEntropyLoss"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "evaluate_ensemble"
snippet = "softmax"
lines = [24, 32, 34]

[[tests.negative]]
file = "test_negative/regression_loss.py"
description = "Regression loss (no softmax involved)"

[[tests.negative]]
file = "test_negative/nll_with_log_softmax.py"
description = "NLLLoss with log_softmax (correct alternative)"

[[tests.negative]]
file = "test_negative/direct_logits_ce.py"
description = "CrossEntropyLoss with raw logits (correct usage)"

[[tests.negative]]
file = "test_negative/softmax_for_inference_only.py"
description = "Softmax used for inference probabilities, raw logits for CrossEntropyLoss"

[[tests.positive]]
file = "test_positive/double_softmax.py"
description = "Distillation training step applies softmax to both student and teacher logits before cross_entropy"
expected_issue = "softmax() applied before CrossEntropyLoss"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_step"
snippet = "F.softmax(logits, dim=-1)"
lines = [12, 15]

[[tests.positive]]
file = "test_positive/redundant_softmax.py"
description = "Deep residual classifier with softmax applied before F.cross_entropy in compute_loss"
expected_issue = "softmax() applied before CrossEntropyLoss"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_loss"
snippet = "probs = F.softmax(logits, dim=-1)"
lines = [34]

[[tests.positive]]
file = "test_positive/log_softmax_then_ce.py"
description = "Applying log_softmax before CrossEntropyLoss"
expected_issue = "log_softmax() applied before CrossEntropyLoss"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_loss_with_log_softmax"
snippet = "log_probs = output.log_softmax(dim=-1)"
lines = [20]
