[meta]
id = "num-002"
name = "catastrophic-cancellation"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Subtracting nearly equal large numbers causes catastrophic cancellation, losing significant digits of precision. Common examples include naive variance calculation (mean_sq - mean^2) and exponential differences.
"""

explanation = """
Catastrophic cancellation: subtracting nearly equal large numbers loses precision. Restructure the formula to avoid this.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.var.html",
]

[detection]
question = """
Analyze numerical computations for catastrophic cancellation.

Subtracting nearly equal large numbers loses significant digits of precision. Classic example: computing variance as mean(x²) - mean(x)² can lose all precision when values are large.

Correct approach: Use stable algorithms (np.var, np.std) or numerically stable formulations.

Does this code have catastrophic cancellation?

Look for:
- Naive variance: mean_sq - mean**2 or mean(x**2) - mean(x)**2
- Exponential differences: exp(a) - exp(b) where a ≈ b
- Adding then subtracting large values: (large + small) - large

Safe patterns (ignore): np.var(), np.std(), sklearn scalers, distance calculations

YES = Bug found: naive variance formula or unstable subtraction of large values
NO = Correct: uses stable algorithms, or subtraction of well-separated values
"""

warning_message = """
Catastrophic cancellation: subtracting nearly equal large numbers loses precision. Use np.var() instead of mean(x^2)-mean(x)^2.
"""

min_confidence = 0.85
false_positive_risks = [
    "General subtraction is NOT catastrophic cancellation",
    "sklearn scalers use stable algorithms internally",
    "Distance calculations (point1 - point2) are safe"
]

[tests]

[[tests.positive]]
