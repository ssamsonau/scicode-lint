[meta]
id = "num-005"
name = "division-by-zero-normalization"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Division by standard deviation, range, or other computed values that could be zero produces inf or NaN. This commonly occurs in normalization when a feature is constant (std=0) or in min-max scaling when min equals max. Always add an epsilon guard or check for zero before dividing.
"""

explanation = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.std.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.maximum.html",
]

[detection]
question = """
Analyze normalization operations for division by zero.

Standard deviation or range can be zero for constant features, causing inf or NaN.

Does this code divide by COMPUTED std/range without zero protection?

Look for:
- (data - mean) / std where std is computed from data
- (x - min) / (max - min) where range is computed from data
- Division by values that could be zero if data is constant

NOT a bug (answer NO):
- Pre-computed constants: ImageNet stats [0.229, 0.224, 0.225], known non-zero values
- sklearn.preprocessing.StandardScaler - handles zero std internally (replaces with 1.0)
- sklearn.preprocessing.MinMaxScaler - handles zero range internally
- torchvision.transforms.Normalize - uses pre-computed dataset statistics
- Epsilon guards: (std + 1e-8), np.maximum(std, eps)
- Explicit zero checks before division

YES = Bug: Division by COMPUTED std/range from data without epsilon/check
NO = Clean: Pre-computed constants, library implementations, or guarded division
"""

warning_message = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/unguarded_division.py"
description = "Z-score normalization (data-mean)/std or min-max scaling without checking for zero std or zero range, producing inf/NaN for constant features"
expected_issue = "Division by std or range without zero check"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "normalize_features"
snippet = "normalized = (data - mean) / std"
lines = [7]

[[tests.positive]]
file = "test_positive/normalization_bug.py"
description = "Batch normalization and layer normalization implementations dividing by computed std without epsilon guard, causing NaN for constant activation channels"
expected_issue = "Division by computed std without epsilon guard in normalization layer"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "batch_norm_forward"
snippet = "x_hat = (x - batch_mean) / batch_std"
lines = [8]

[[tests.negative]]
file = "test_negative/safe_normalization.py"
description = "Division with epsilon added to denominator (std + 1e-8) or explicit zero checks before division"

[[tests.negative]]
file = "test_negative/checked_division.py"
description = "Explicit if/else handling for zero denominators using np.maximum(), np.isclose(), or conditional returns"


[[tests.positive]]
file = "test_positive/feature_norm.py"
description = "Cosine similarity and embedding normalization dividing by L2 norm without epsilon, producing NaN or inf for zero vectors"
expected_issue = "Division by L2 norm without epsilon guard in similarity/embedding computation"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "normalize_embedding_matrix"
snippet = "return embeddings / norms"
lines = [13]

[[tests.negative]]
file = "test_negative/feature_norm_safe.py"
description = "Safe normalization using epsilon guards: (std + eps), np.maximum(std, eps), and (norm + eps) patterns preventing division by zero"

[[tests.negative]]
file = "test_negative/precomputed_constants.py"
description = "Pre-computed constants (ImageNet/CIFAR stats) and sklearn StandardScaler/MinMaxScaler - values are never zero or handled internally"
