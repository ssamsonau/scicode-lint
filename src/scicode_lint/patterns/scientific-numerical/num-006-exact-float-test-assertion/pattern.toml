# Pattern: num-006-pattern
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "num-006"
name = "exact-float-test-assertion"
category = "scientific-numerical"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using exact equality assertions (assert x == y, assertEqual) on floating point values in tests is unreliable due to floating point precision limitations. Use np.testing.assert_allclose() with rtol/atol parameters for robust float comparisons in tests."""

explanation = """
Use np.testing.assert_allclose(actual, expected, rtol, atol) for float comparisons in tests. Exact equality assertions on floats are unreliable.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.testing.assert_allclose.html",
    "https://docs.pytest.org/en/stable/reference/reference.html#pytest-approx",
]

[detection]
question = """
Analyze test assertions for floating point comparison issues.

Exact equality assertions (assert x == y, assertEqual) on computed floats are unreliable due to floating point precision. Tests may pass on one machine and fail on another.

Correct approach: Use np.testing.assert_allclose(actual, expected, rtol, atol).

Does this test code use exact equality on floats?

Look for:
- assert result == 1.0 on computed float values
- assertEqual(computed, expected) for floats
- (array1 == array2).all() in test assertions

YES = Bug found: exact equality assertion on floating point values
NO = Correct: uses assert_allclose/assert_almost_equal, or asserting integers/shapes
"""

warning_message = """
Use np.testing.assert_allclose(actual, expected, rtol, atol) for float comparisons in tests. Exact equality assertions on floats are unreliable."""

min_confidence = 0.85
false_positive_risks = [
    "Integer array comparisons (exact equality is safe for ints)",
    "Shape and size assertions (exact equality is appropriate)",
    "Boolean and string array comparisons",
    "Index/argmax comparisons (integers)",
]

[tests]

[[tests.positive]]
file = "test_positive/exact_float_assertions.py"
description = "Test code using assert with == on float results (sin^2+cos^2==1.0, sqrt(2)*sqrt(2)==2.0) or assertEqual() on computed floats"
expected_issue = "Exact equality assertion on floating point test results"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "test_trigonometric"
snippet = "assert result == 1.0"
lines = [17]

[[tests.negative]]
file = "test_negative/proper_test_assertions.py"
description = "Signal processing tests using exact equality only on integers, shapes, indices, string labels, and array lengths — no float comparisons"

[[tests.negative]]
file = "test_negative/integer_assertions.py"
description = "Assertions on integers, shapes, indices, counts, and boolean flags where exact equality is appropriate"


[[tests.positive]]
file = "test_positive/test_numerical.py"
description = "Tests with exact float equality assertions: comparing computed trigonometric results, matrix inverses, and vector norms directly with == operator or (array == expected).all()"
expected_issue = "Exact equality assertions on floating point computed values without tolerance parameters"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "test_sine_values"
snippet = "assert result == 0.5"
lines = [7]

[[tests.positive]]
file = "test_positive/test_statistics.py"
description = "Statistical tests using exact equality assertions on correlation coefficients, standard deviations, and probability sums computed with scipy/numpy"
expected_issue = "Exact equality assertions on floating point statistical computations"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "test_correlation_coefficient"
snippet = "assert r == 1.0"
lines = [9]

[[tests.negative]]
file = "test_negative/test_numerical_correct.py"
description = "Molecular simulation tests using numpy.testing.assert_allclose() with rtol/atol for Lennard-Jones potential, bond lengths, and Boltzmann weights"
