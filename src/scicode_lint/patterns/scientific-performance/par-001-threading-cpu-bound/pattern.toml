[meta]
id = "par-001"
name = "threading-cpu-bound"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using ThreadPoolExecutor or threading for CPU-bound pure Python work (e.g., loops doing arithmetic, sorting, string processing) provides no speedup due to Python's GIL. Threads only help for I/O-bound tasks or C extensions that release the GIL (like NumPy BLAS). Use ProcessPoolExecutor or multiprocessing for CPU-bound pure Python work.
"""

explanation = """
Wrong concurrency: threading on CPU-bound pure Python work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

tags = []
related_patterns = []
references = [
    "https://docs.python.org/3/glossary.html#term-global-interpreter-lock",
    "https://docs.python.org/3/library/multiprocessing.html",
]

[detection]
question = """
Analyze threading usage for appropriate workload.

Python's GIL prevents threads from executing CPU-bound Python bytecode in parallel. Using ThreadPoolExecutor or threading.Thread for pure Python loops doing numerical computation (for loops with arithmetic, sorting, custom math) provides no speedup and adds overhead. Threads only help for I/O-bound tasks (network, file I/O) or C extensions that release the GIL.

Note: NumPy/SciPy BLAS and LAPACK operations (matrix multiply, eigenvalue decomposition, etc.) release the GIL and CAN benefit from threading. Only flag pure Python CPU-bound loops in threads.

Correct approach: Use ProcessPoolExecutor or multiprocessing for CPU-bound pure Python work.

Does this code use threading for CPU-bound pure Python computation?

Look for:
- ThreadPoolExecutor running pure Python loops with arithmetic or custom math
- threading.Thread with Python for-loops doing numerical work
- Parallel CPU work in pure Python that should use multiprocessing instead

YES = Bug found: threading used for CPU-bound pure Python work (GIL blocks parallelism)
NO = Correct: threading for I/O, threading with GIL-releasing C extensions (NumPy BLAS), or uses ProcessPoolExecutor for CPU work
"""

warning_message = """
Wrong concurrency: threading on CPU-bound pure Python work gives no speedup due to GIL. Use multiprocessing or ProcessPoolExecutor for CPU-bound tasks.

"""

min_confidence = 0.85
false_positive_risks = [
    "NumPy BLAS/LAPACK operations (matmul, eig, svd, etc.) release the GIL and can benefit from threading",
    "C extensions and ctypes calls that release the GIL during computation",
    "Mixed workloads where threads do both I/O and light Python computation",
]

[tests]

[[tests.positive]]
file = "test_positive/threadpool_matrix_ops.py"
description = "threading.Thread with Queue used for CPU-bound pure Python matrix multiplication - nested for-loops hold the GIL"
expected_issue = "threading.Thread used for CPU-bound pure Python matrix multiply loops"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_matrix_multiply"
snippet = "t = threading.Thread(target=multiply_matrices, args=(A, B, result_queue, idx))"
lines = [24]

[[tests.positive]]
file = "test_positive/threading_feature_engineering.py"
description = "ThreadPoolExecutor used for CPU-bound pure Python statistics computation - sum/sort loops hold the GIL"
expected_issue = "ThreadPoolExecutor for CPU-bound pure Python statistical computations"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "process_dataset"
snippet = "with ThreadPoolExecutor(max_workers=max_threads) as executor:"
