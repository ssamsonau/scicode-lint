[meta]
id = "par-002"
name = "multiprocessing-data-copy"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Passing large arrays to multiprocessing causes expensive data copying. Each process receives a full copy: 4 processes on a 4GB array = 16GB. Use multiprocessing.shared_memory or pass indices instead of data.
"""

explanation = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.

"""

tags = []
related_patterns = []
references = [
    "https://docs.python.org/3/library/multiprocessing.shared_memory.html",
    "https://docs.python.org/3/library/multiprocessing.html#sharing-state-between-processes",
]

[detection]
question = """
Analyze multiprocessing data transfer patterns.

Passing large arrays to multiprocessing causes expensive data copying. Each process receives a full copy: 4 processes on a 4GB array = 16GB memory usage.

Correct approach: Use multiprocessing.shared_memory, pass indices instead of data, or use file-based sharing.

Does this code copy large arrays to each worker process?

Look for:
- pool.map(func, [large_array] * N) duplicating array N times
- ProcessPoolExecutor submitting same large array to multiple workers
- Large arrays passed as function arguments to worker processes

YES = Bug found: large arrays copied to each worker process
NO = Correct: uses shared memory, passes indices, or small data only
"""

warning_message = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/multiprocessing_array_copy.py"
description = "Pool.map passing large array to all workers - each process gets full copy causing massive memory duplication"
expected_issue = "Large array passed to all processes without shared memory - causes data duplication"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_process_array"
snippet = "results = pool.map(apply_filter, [large_array] * num_processes)"
lines = [14]

[[tests.positive]]
file = "test_positive/processpool_full_data.py"
description = "functools.partial closing over large array - entire dataset copied when partial is pickled for each worker"
expected_issue = "Large array captured by partial function causes data duplication across workers"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_slice_analysis"
snippet = "worker_func = partial(compute_slice_stats, full_data=data)"
lines = [16, 18]

[[tests.negative]]
file = "test_negative/shared_memory_approach.py"
description = "Correctly uses multiprocessing.shared_memory to avoid data duplication across processes"

[[tests.negative]]
file = "test_negative/index_passing.py"
description = "Passes only index ranges to workers instead of full data - efficient memory usage"


[[tests.positive]]
file = "test_positive/shared_array_copy.py"
description = "ProcessPoolExecutor submitting object containing large array - serializes entire dataset to each worker"
expected_issue = "Object with large dataset attribute submitted to ProcessPoolExecutor workers"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "run_parallel_analysis"
snippet = "futures = [executor.submit(processor.analyze, op) for op in operations]"
lines = [20]

[[tests.negative]]
file = "test_negative/shared_array_proper.py"
description = "Uses numpy memmap for file-based data sharing - workers access shared file without data copying"
