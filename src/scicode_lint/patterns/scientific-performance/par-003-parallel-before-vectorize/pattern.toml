[meta]
id = "par-003"
name = "parallel-before-vectorize"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Adding parallelism before vectorizing operations is inefficient. Code is often slow due to Python loops, not lack of cores. Vectorize with NumPy operations first, then parallelize if needed.
"""

explanation = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/user/basics.broadcasting.html",
    "https://numpy.org/doc/stable/reference/ufuncs.html",
]

[detection]
question = """
Does this code parallelize INDIVIDUAL ELEMENTS instead of using vectorized NumPy operations?

THE BUG: Using pool.map() or ThreadPoolExecutor to process array elements ONE AT A TIME.
This is slow because Python function call overhead dominates.

CORRECT PATTERNS (NOT bugs):
- Using vectorized NumPy operations (np.where, np.sqrt, broadcasting)
- Parallelizing CHUNKS where each chunk uses vectorized NumPy operations inside
- No parallelism at all (just NumPy)

Look for these BUGS:
- pool.map(func, arr.tolist()) - converting array to list for element-by-element processing
- executor.submit(func, x) for x in array - processing one element at a time
- Each parallel task processes ONE number/element

NOT a bug:
- pool.map(func, chunks) where func uses NumPy operations on the chunk
- np.array_split() followed by parallel processing of chunks

YES = Bug: parallelizing individual elements (tolist(), per-element submit)
NO = Correct: vectorized operations or parallelizing vectorized chunks
"""

warning_message = """
Parallelizing before vectorizing: the code is slow because of Python loops, not because it needs more cores. Vectorize first, parallelize second.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/parallel_element_processing.py"
description = "Multiprocessing applied to element-wise array operations with Python loop - vectorization would be much faster than parallelizing slow loop"
expected_issue = "Parallelizing element-wise array processing instead of vectorizing"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_transform"
snippet = "result = pool.map(process_element, arr.tolist())"
lines = [15]

[[tests.positive]]
file = "test_positive/threading_loop_over_array.py"
description = "ThreadPoolExecutor used to process array elements one at a time - should vectorize with np.sin/np.cos instead"
expected_issue = "Thread parallelism applied to element-wise NumPy operations"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_element_transform"
snippet = "results = list(executor.map(transform_element, array.tolist()))"
lines = [12]

[[tests.negative]]
file = "test_negative/vectorized_transform.py"
description = "Properly uses vectorized np.where for conditional transformation - no unnecessary parallelism"

[[tests.negative]]
file = "test_negative/parallel_vectorized_chunks.py"
description = "Correctly parallelizes already-vectorized chunk processing - good use of both vectorization and parallelism"


[[tests.positive]]
file = "test_positive/element_wise_parallel.py"
description = "ProcessPoolExecutor clipping array elements one at a time via tolist() - np.clip is vectorized and faster"
expected_issue = "Parallelizing element-wise clip operation instead of using vectorized np.clip"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "parallel_clip"
snippet = "results = list(executor.map(clip_value, flat))"
lines = [17]

[[tests.negative]]
file = "test_negative/element_wise_vectorized.py"
description = "Correctly uses vectorized NumPy operations for element-wise transformations without unnecessary parallelization"
