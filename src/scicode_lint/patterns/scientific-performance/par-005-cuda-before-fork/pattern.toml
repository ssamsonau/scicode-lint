[meta]
id = "par-005"
name = "cuda-before-fork"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Initializing CUDA (e.g., tensor.cuda(), model.to(device)) before spawning multiprocessing workers can cause deadlocks. The CUDA context doesn't survive fork(). Use mp.set_start_method('spawn') and initialize CUDA inside each worker process.
"""

explanation = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

tags = []
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/notes/multiprocessing.html",
    "https://docs.python.org/3/library/multiprocessing.html#contexts-and-start-methods",
]

[detection]
question = """
Analyze CUDA initialization with multiprocessing.

CUDA context doesn't survive fork() - initializing CUDA before forking can deadlock. The default start method on Linux is fork. Using mp.set_start_method('spawn') avoids this because spawn creates fresh interpreter processes that don't inherit the parent's CUDA state.

WHAT INITIALIZES CUDA:
- tensor.cuda() or tensor.to("cuda") - actually moves tensor to GPU
- model.cuda() or model.to(device) where device is cuda
- torch.cuda.* operations (set_device, synchronize)

WHAT DOES NOT INITIALIZE CUDA:
- device = "cuda" or device = torch.device("cuda") - just a string/object
- DataLoader creation - workers spawn lazily when iteration starts
- Function definitions with CUDA code inside - only executed when called

Does this code initialize CUDA before multiprocessing Process/Pool creation without setting spawn method?

Check:
1. Is .cuda() or .to(cuda_device) called on tensor/model BEFORE Process/Pool?
2. Is the start method set to 'spawn' (via mp.set_start_method or mp.get_context)?

YES = Bug: CUDA init before Process/Pool creation WITHOUT spawn method set (uses fork default)
NO = Clean: spawn method is set, or CUDA init only happens inside workers, or only device strings (no actual CUDA init)
"""

warning_message = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

min_confidence = 0.85
false_positive_risks = []

