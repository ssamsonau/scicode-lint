[meta]
id = "par-005"
name = "cuda-before-fork"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Initializing CUDA (e.g., tensor.cuda(), model.to(device)) before spawning multiprocessing workers can cause deadlocks. The CUDA context doesn't survive fork(). Use mp.set_start_method('spawn') and initialize CUDA inside each worker process.
"""

explanation = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze CUDA initialization with multiprocessing.

Initializing CUDA before spawning multiprocessing workers can cause deadlocks. The CUDA context doesn't survive fork() correctly, leading to hangs or crashes.

Correct approach: Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

Does this code initialize CUDA before multiprocessing fork?

Look for:
- .cuda() or .to(device) in __main__ block before Process/Pool creation
- Model or tensor moved to GPU before multiprocessing spawn
- CUDA initialization followed by multiprocessing without spawn method

YES = Bug found: CUDA initialized before multiprocessing fork
NO = Correct: CUDA initialized inside workers, or uses spawn method
"""

warning_message = """
CUDA before fork: initializing CUDA then forking can deadlock. Use mp.set_start_method('spawn') and initialize CUDA inside each worker.

"""

min_confidence = 0.85
false_positive_risks = []

