[meta]
id = "par-006"
name = "nondeterministic-parallel-order"
category = "scientific-performance"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Collecting results from parallel tasks using imap_unordered or as_completed() without tracking indices produces non-deterministic output order. If results must be in a specific order, use map() (which preserves order) or sort results by index after collection.
"""

explanation = """
Non-deterministic parallel output: parallel tasks complete in arbitrary order. If results depend on order, sort by index after collection for reproducibility.

"""

tags = []
related_patterns = []
references = [
    "https://docs.python.org/3/library/multiprocessing.html#multiprocessing.pool.Pool.imap_unordered",
    "https://docs.python.org/3/library/concurrent.futures.html#concurrent.futures.as_completed",
]

[detection]
question = """
Analyze parallel result collection for determinism.

Using imap_unordered or as_completed() produces results in non-deterministic order based on completion time. This is only a bug when downstream use is order-sensitive (e.g., building arrays where row position matters, creating sequences, indexing by position). It is NOT a bug when results are used in order-independent ways (sums, counts, histograms, set operations).

Correct approach: Use ordered map(), or track indices and sort after collection.

Does this code collect parallel results in arbitrary order AND use them in an order-sensitive way?

Look for:
- pool.imap_unordered() or as_completed() collecting results without sorting
- Downstream use that depends on element position (array construction, sequential processing, indexing)

YES = Bug found: results collected in arbitrary order AND downstream use is order-sensitive
NO = Correct: uses ordered map(), sorts results by index, OR downstream use is order-independent (sums, histograms, aggregations)
"""

warning_message = """
Non-deterministic parallel output: parallel tasks complete in arbitrary order. If results depend on order, sort by index after collection for reproducibility.

"""

min_confidence = 0.85
false_positive_risks = []

