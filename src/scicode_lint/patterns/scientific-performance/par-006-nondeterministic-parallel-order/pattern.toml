author = "scicode-lint"

description = """
Collecting results from parallel tasks using imap_unordered or as_completed() without tracking indices produces non-deterministic output order. If results must be in a specific order, use map() (which preserves order) or sort results by index after collection.
"""

explanation = """
Non-deterministic parallel output: parallel tasks complete in arbitrary order. If results depend on order, sort by index after collection for reproducibility.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze parallel result collection for determinism.

Using imap_unordered or as_completed() produces results in non-deterministic order based on completion time. If results must be in specific order for reproducibility, this causes issues.

Correct approach: Use ordered map(), or track indices and sort after collection.

Does this code collect parallel results without preserving order?

Look for:
- pool.imap_unordered() appending results without sorting
- as_completed(futures) without index tracking
- Results depending on order but collected arbitrarily

YES = Bug found: non-deterministic result order without sorting
NO = Correct: uses ordered map(), or sorts results by index
"""

warning_message = """
Non-deterministic parallel output: parallel tasks complete in arbitrary order. If results depend on order, sort by index after collection for reproducibility.

"""

