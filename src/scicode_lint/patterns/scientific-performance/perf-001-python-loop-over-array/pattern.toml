[meta]
id = "perf-001"
name = "python-loop-over-array"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Python for loops over NumPy array elements (e.g., for i in range(len(arr))) are 100-1000x slower than vectorized operations. Use NumPy broadcasting, np.where(), or fancy indexing instead of element-wise Python loops.
"""

explanation = """
Python loop over NumPy array: 100-1000x slower than vectorized operation. Use broadcasting, np.where, or fancy indexing.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/user/basics.broadcasting.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.vectorize.html",
]

[detection]
question = """
Analyze NUMPY ARRAY processing for vectorization opportunities.

Python loops over NumPy ndarray elements are 100-1000x slower than vectorized operations.

IMPORTANT: Only flag loops over NUMPY ARRAYS, not strings or lists.

Does this code use Python loops over NumPy ARRAY elements?

Look for:
- for i in range(len(arr)) with arr[i] access WHERE arr is np.ndarray
- Nested loops computing pairwise operations on arrays
- Element-wise conditionals on arrays that could use np.where()

NOT a bug (answer NO):
- Loops over Python strings (character iteration) - can't be vectorized
- Loops over Python lists (unless building NumPy operations)
- Loops over DataFrame rows (use .apply() or vectorized ops instead)
- Loops that perform I/O, network calls, or other inherently sequential operations

YES = Bug: Python loop over NumPy ndarray elements (could use vectorized ops)
NO = Clean: Vectorized ops, or loop over string/list, or inherently sequential
"""

warning_message = """
Python loop over NumPy array: 100-1000x slower than vectorized operation. Use broadcasting, np.where, or fancy indexing.

"""

min_confidence = 0.85
false_positive_risks = []

