[meta]
id = "perf-003"
name = "full-pairwise-distance-matrix"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Computing full pairwise distance matrices when only partial results are needed wastes memory. An N×N self-pairwise matrix for N=50,000 uses ~20GB; an M×N query-to-database matrix can be similarly wasteful. Use spatial indexing (KD-tree, BallTree), chunked computation, or compute only needed distances.
"""

explanation = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

tags = []
related_patterns = []
references = [
    "https://scikit-learn.org/stable/modules/generated/sklearn.neighbors.KDTree.html",
    "https://docs.scipy.org/doc/scipy/reference/generated/scipy.spatial.distance.cdist.html",
]

[detection]
question = """
Does this code compute a full pairwise distance matrix for LARGE N where partial results would suffice?

The issue is O(N²) memory for large N (N>10,000). For small N, full pairwise is fine.

Check for:
- cdist(X, X) or pdist(X) on LARGE datasets (many thousands of points)
- Computing all distances when only k-nearest are needed

NOT a bug (answer NO) - small N makes O(N²) acceptable:
- Molecular structures: typically 10-1000 atoms
- Monte Carlo ensembles: typically 10-1000 samples
- Small graphs: hundreds of vertices
- Explicit small dimensions like (100, 3) or n_samples < 1000
- Gram matrices for kernel methods (needed for exact computation)
- Covariance/correlation matrices (needed for statistics)

YES = Bug: cdist/pdist on LARGE dataset (thousands of points) when k-NN would work
NO = Clean: Small N (molecular, ensemble, small graph), or KDTree used, or full matrix needed
"""

warning_message = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/full_distance_matrix.py"
description = "Computing full 50000x50000 distance matrix with cdist - uses 20GB memory, most entries never used"
expected_issue = "Full N×N pairwise distance matrix computed and stored in memory"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_all_distances"
snippet = "distance_matrix = cdist(points, points, metric=\"euclidean\")"
lines = [7]

[[tests.positive]]
file = "test_positive/pairwise_matrix_storage.py"
description = "Nested loops creating full 30000x30000 similarity matrix - massive memory allocation for pairwise computation"
expected_issue = "Full pairwise similarity matrix allocated and computed"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "calculate_similarity_matrix"
snippet = "for i in range(num_samples):"
lines = [8]

[[tests.negative]]
file = "test_negative/kdtree_approach.py"
description = "Uses KDTree spatial indexing to find neighbors efficiently - avoids full distance matrix"

[[tests.negative]]
file = "test_negative/kdtree_knn.py"
description = "Uses KD-tree for k-nearest neighbor distances - O(N log N) instead of O(N²)"


[[tests.positive]]
file = "test_positive/all_pairs.py"
description = "Computes full MxN distance matrix with cdist for k-nearest neighbor search - wastes memory when only k neighbors needed"
expected_issue = "Full query-to-database distance matrix computed for k-nearest neighbor search"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "find_nearest_neighbors"
snippet = "full_distances = cdist(query_embeddings, database_embeddings)"
lines = [6]

[[tests.negative]]
file = "test_negative/efficient_knn.py"
description = "Uses NearestNeighbors with ball_tree algorithm to efficiently find k neighbors without computing full distance matrix."

[[tests.negative]]
file = "test_negative/small_n_pairwise.py"
description = "Small N cases where full pairwise is acceptable: molecular distances, ensemble RMSD, small graphs, kernel matrices"
