[meta]
id = "perf-003"
name = "full-pairwise-distance-matrix"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Computing full pairwise distance matrices when only partial results are needed wastes memory. An N×N self-pairwise matrix for N=50,000 uses ~20GB; an M×N query-to-database matrix can be similarly wasteful. Use spatial indexing (KD-tree, BallTree), chunked computation, or compute only needed distances.
"""

explanation = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Does this code compute a full pairwise distance/similarity matrix when only partial results are needed?

Check for:
- cdist(X, X) or pdist(X) computing all self-pairwise distances
- cdist(X, Y) computing all query-to-database distances (e.g., for k-nearest neighbor search)
- Nested loops computing all pairs

YES = Found: full pairwise/distance matrix computed (cdist, pdist, or nested loops)
NO = Clean: uses KDTree/BallTree, or only computes needed distances
"""

warning_message = """
Full N×N distance matrix in memory: N=50,000 uses ~20 GB. Use spatial indexing (KD-tree), chunked computation, or only compute needed distances.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/full_distance_matrix.py"
description = "Computing full 50000x50000 distance matrix with cdist - uses 20GB memory, most entries never used"
expected_issue = "Full N×N pairwise distance matrix computed and stored in memory"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_all_distances"
snippet = "distance_matrix = cdist(points, points, metric=\"euclidean\")"

[[tests.positive]]
file = "test_positive/pairwise_matrix_storage.py"
description = "Nested loops creating full 30000x30000 similarity matrix - massive memory allocation for pairwise computation"
expected_issue = "Full pairwise similarity matrix allocated and computed"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "calculate_similarity_matrix"
snippet = "similarity = np.zeros((num_samples, num_samples))"

[[tests.negative]]
file = "test_negative/kdtree_approach.py"
description = "Uses KDTree spatial indexing to find neighbors efficiently - avoids full distance matrix"

[[tests.negative]]
file = "test_negative/kdtree_knn.py"
description = "Uses KD-tree for k-nearest neighbor distances - O(N log N) instead of O(N²)"


[[tests.positive]]
file = "test_positive/all_pairs.py"
description = "Computes full distance matrix with cdist when only k nearest neighbors are needed; allocates unnecessary memory for unused distances."
expected_issue = "Full distance matrix computed for k-nearest neighbor search"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "find_nearest"
snippet = "distances = cdist(query_points, database_points)"

[[tests.negative]]
file = "test_negative/efficient_knn.py"
description = "Uses NearestNeighbors with ball_tree algorithm to efficiently find k neighbors without computing full distance matrix."
