[meta]
id = "perf-004"
name = "unnecessary-intermediate-arrays"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Creating large intermediate arrays (e.g., squared = diff ** 2; summed = np.sum(squared)) wastes memory when optimized functions exist. Use np.linalg.norm() instead of manual norm computation, or in-place operations to avoid temporary allocations.
"""

explanation = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

tags = []
related_patterns = []
references = []

[detection]
question = """
Analyze computations for unnecessary temporary arrays.

Creating multiple intermediate arrays wastes memory. Two common patterns:

1. Manual norm computation: diff = a - b; squared = diff ** 2; norm = np.sqrt(np.sum(squared))
   Fix: Use np.linalg.norm() which computes norms without materializing intermediates.

2. Chained operations creating temporaries: temp1 = data * 2; temp2 = temp1 + 10; temp3 = np.sqrt(temp2)
   Fix: Use in-place operations (+=, -=, *=, /=) or out= parameter.

Does this code create unnecessary large intermediate arrays?

Look for:
- Manual norm/distance computation with squared, summed variables
- Multiple named temporaries (temp1, temp2, ...) for sequential operations
- Operations that could use in-place modification instead

YES = Bug found: multiple intermediate arrays where optimized approach exists
NO = Correct: uses np.linalg.norm(), in-place operations (+=, *=, out=), or single expressions
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

min_confidence = 0.85
false_positive_risks = []

