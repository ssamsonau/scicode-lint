[meta]
id = "perf-004"
name = "unnecessary-intermediate-arrays"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Creating large intermediate arrays (e.g., squared = diff ** 2; summed = np.sum(squared)) wastes memory when optimized functions exist. Use np.linalg.norm() instead of manual norm computation, or in-place operations to avoid temporary allocations.
"""

explanation = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.linalg.norm.html",
    "https://numpy.org/doc/stable/reference/ufuncs.html#ufuncs-output-type",
]

[detection]
question = """
Analyze computations for unnecessary intermediate arrays that are each used only once.

Creating named intermediate arrays that are each used only once wastes memory. The key indicator is a chain of assignments where each variable is consumed by exactly one subsequent operation and never referenced again.

Example of the problem:
  diff = vectors - mean
  squared = diff ** 2
  summed = np.sum(squared, axis=1)
  distances = np.sqrt(summed)

Each intermediate (diff, squared, summed) is used exactly once, so the entire chain could be replaced by np.linalg.norm(vectors - mean, axis=1).

Does this code create multiple named intermediate arrays where each is used only once and could be eliminated?

Important: An intermediate that is reused in multiple expressions is NOT unnecessary - it avoids redundant recomputation. Only flag intermediates that are consumed exactly once.

YES = Bug found: multiple named variables each used only once in a chain of operations
NO = Correct: intermediates are reused multiple times, or code uses single expressions, in-place operations, or optimized functions like np.linalg.norm
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

min_confidence = 0.85
false_positive_risks = [
    "Intermediates that are reused multiple times are efficient, not unnecessary",
]

[tests]

[[tests.positive]]
file = "test_positive/intermediate_array_creation.py"
description = "Creates multiple large intermediate arrays (diff, squared, summed) when np.linalg.norm would avoid all temporaries"
expected_issue = "Multiple large intermediate arrays created for norm computation"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_normalized_distance"
snippet = "squared = diff**2"
lines = [6]

[[tests.positive]]
file = "test_positive/manual_norm_computation.py"
description = "Signal processing pipeline with multiple named intermediates (windowed, filtered, amplitudes, normalized, clipped) each used only once"
expected_issue = "Multiple intermediate arrays created in signal processing pipeline"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "apply_bandpass_filter"
snippet = "windowed = spectrum * mask"
lines = [9]

[[tests.negative]]
file = "test_negative/linalg_norm.py"
description = "Weighted covariance and PCA projection using single-expression NumPy operations without named intermediates"

[[tests.negative]]
file = "test_negative/inplace_operations_opt.py"
description = "Uses in-place operations with -= and /= to avoid creating temporary arrays"

[[tests.positive]]
file = "test_positive/chained_ops.py"
description = "Creates multiple unnecessary intermediate arrays (temp1, temp2, temp3, temp4) through chained operations instead of combining computations"
expected_issue = "Multiple intermediate arrays created through sequential operations"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "process_data"
snippet = "temp1 = data * 2"
lines = [5]

[[tests.negative]]
file = "test_negative/chained_ops_inplace.py"
description = "Uses in-place operations (+=, *=, np.clip with out=) and single-expression computations to avoid unnecessary intermediates"
