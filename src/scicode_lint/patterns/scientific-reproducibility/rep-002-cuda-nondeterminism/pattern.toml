[meta]
id = "rep-002"
name = "cuda-nondeterminism"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
PyTorch CUDA operations are non-deterministic by default. For reproducible GPU training, set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False. Without these flags, results may vary between runs even with the same random seed.
"""

explanation = """
CUDA non-determinism: some GPU ops are non-deterministic by default. Set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False.

"""

tags = ["pytorch", "cuda", "gpu", "reproducibility"]
related_patterns = ["rep-001-incomplete-random-seeds"]
references = [
    "https://docs.pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html",
    "https://docs.pytorch.org/docs/stable/notes/randomness.html",
]

[detection]
question = """
Analyze CUDA TRAINING code for reproducibility.

CUDA non-determinism matters during TRAINING because:
- Gradient computation uses non-deterministic algorithms
- Some ops like atomicAdd have race conditions during backward pass

IMPORTANT: Inference-only code does NOT need deterministic flags.

Does this CUDA TRAINING code lack deterministic flags?

Only flag if ALL of these are present:
1. CUDA usage: .cuda() or .to(device)
2. TRAINING indicators: model.train(), optimizer.step(), or loss.backward()
3. Missing: torch.use_deterministic_algorithms(True) or torch.backends.cudnn.benchmark = False

NOT a bug (answer NO):
- Inference-only code: model.eval(), torch.no_grad(), no loss.backward()
- Both deterministic flags are set
- No CUDA usage

YES = Bug: CUDA training code without deterministic flags
NO = Correct: Inference-only, or deterministic flags set, or no CUDA
"""

warning_message = """
CUDA non-determinism: some GPU ops are non-deterministic by default. Set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/cuda_without_deterministic.py"
description = "CNN model training on CUDA without setting deterministic algorithms or disabling cudnn benchmark."
expected_issue = "CUDA training code lacks torch.use_deterministic_algorithms(True) or torch.backends.cudnn.benchmark = False"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_model"
snippet = "loss.backward()"
lines = [36]

[[tests.positive]]
file = "test_positive/gpu_training_no_flags.py"
description = "GPU training loop that checks for CUDA availability but doesn't configure deterministic behavior."
expected_issue = "Training uses CUDA device without deterministic flags, results may vary between runs"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_on_gpu"
snippet = "device = torch.device(\"cuda\")"
lines = [10]

[[tests.negative]]
file = "test_negative/deterministic_cuda.py"
description = "Properly sets both torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False before CUDA usage."

[[tests.negative]]
file = "test_negative/reproducible_gpu_setup.py"
description = "Complete deterministic setup for GPU training with both required flags set."


