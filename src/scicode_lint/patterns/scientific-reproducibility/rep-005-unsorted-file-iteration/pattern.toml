[meta]
id = "rep-005"
name = "unsorted-file-iteration"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using os.listdir(), glob.glob(), or Path.iterdir() without sorting produces filesystem-dependent ordering. File order varies between runs and machines, causing non-reproducible results.
"""

explanation = """
File iteration order is not guaranteed to be consistent. Always wrap file listing in sorted() for reproducible processing order.
"""

tags = ["filesystem", "ordering", "reproducibility"]
related_patterns = ["rep-011-set-iteration-order-dependency"]
references = [
    "https://docs.python.org/3/library/os.html",
    "https://docs.python.org/3/library/glob.html",
]

[detection]
question = """
Does this code have ORDER-DEPENDENT file iteration without sorting?

os.listdir(), glob.glob(), Path.glob() return files in non-deterministic order.
This is ONLY a bug when iteration order affects results.

BUG (answer YES) - order affects results:
- Appending to list/array then concatenating: for f in glob(): data.append(load(f)); concat(data)
- Merging configs in order: for f in glob(): config.update(load(f))
- Processing files sequentially where position matters
- Yielding files without sorting

NOT a bug (answer NO) - order doesn't affect results:
- Building dict from glob: {name: load(f) for f in glob()} - dict access by key ignores iteration order
- Finding max/min: max(glob(...), key=...)
- Counting files: len(glob(...))
- sorted() wrapper used
- Files come from JSON manifest (order defined by data file)

YES = Bug: unsorted iteration where order affects final result (list/array building, concat, merge)
NO = Clean: dict lookup, max/min, counting, sorted() used, manifest-based order
"""

warning_message = """
File iteration order is non-deterministic. Use sorted() for reproducible file processing order.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/unsorted_files.py"
description = "File iteration without sorting"
expected_issue = "os.listdir() or glob.glob() without sorted()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_dataset"
snippet = "os.listdir"
lines = [16]

[[tests.negative]]
file = "test_negative/manifest_file.py"
description = "Loading files from manifest (no iteration)"

[[tests.negative]]
file = "test_negative/single_file.py"
description = "Processing a single file (no iteration)"

[[tests.negative]]
file = "test_negative/sorted_glob.py"
description = "Using sorted() with glob/listdir for reproducibility"

[[tests.negative]]
file = "test_negative/dict_lookup.py"
description = "Glob results converted to dict for lookup - iteration order doesn't affect key-based access"

