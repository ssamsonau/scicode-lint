[meta]
id = "rep-005"
name = "unsorted-file-iteration"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using os.listdir(), glob.glob(), or Path.iterdir() without sorting produces filesystem-dependent ordering. File order varies between runs and machines, causing non-reproducible results.
"""

explanation = """
File iteration order is not guaranteed to be consistent. Always wrap file listing in sorted() for reproducible processing order.
"""

tags = ["filesystem", "ordering", "reproducibility"]
related_patterns = ["rep-011-set-iteration-order-dependency"]
references = [
    "https://docs.python.org/3/library/os.html",
    "https://docs.python.org/3/library/glob.html",
]

[detection]
question = """
Analyze file iteration for reproducibility issues.

os.listdir(), glob.glob(), and Path.iterdir() return files in arbitrary order that depends on the filesystem. This order varies between runs and machines.

ONLY these functions have non-deterministic order:
- os.listdir()
- os.scandir()
- glob.glob()
- Path.glob()
- Path.rglob()
- Path.iterdir()

Does this code use these functions without sorted()?

Look for these specific patterns:
- os.listdir() or os.scandir() not wrapped in sorted()
- glob.glob() or Path.glob() not wrapped in sorted()
- Path.iterdir() not wrapped in sorted()

Examples of CORRECT usage (NO bug):
- sorted(os.listdir(dir)) - explicitly sorted
- sorted(glob.glob(pattern)) - explicitly sorted
- Iterating over a JSON array (manifest["files"]) - JSON arrays preserve order
- Iterating over a list read from file - text files preserve order
- Iterating over Python list/tuple - these preserve order

YES = Bug: os.listdir/glob.glob/Path.iterdir used without sorted()
NO = Correct: sorted() used, or iterating over ordered data structure (JSON array, text file, list)
"""

warning_message = """
File iteration order is non-deterministic. Use sorted() for reproducible file processing order.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/unsorted_files.py"
description = "File iteration without sorting"
expected_issue = "os.listdir() or glob.glob() without sorted()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "load_dataset"
snippet = "os.listdir"

[[tests.negative]]
file = "test_negative/manifest_file.py"
description = "Loading files from manifest (no iteration)"

[[tests.negative]]
file = "test_negative/single_file.py"
description = "Processing a single file (no iteration)"

[[tests.negative]]
file = "test_negative/sorted_glob.py"
description = "Using sorted() with glob/listdir for reproducibility"

# === Auto-generated entries (review and update) ===
[[tests.positive]]
file = "test_positive/glob_unsorted.py"
