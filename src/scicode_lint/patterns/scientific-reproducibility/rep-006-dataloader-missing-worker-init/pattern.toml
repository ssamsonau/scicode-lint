[meta]
id = "rep-006"
name = "dataloader-missing-worker-init"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
DataLoader with num_workers>0 but no worker_init_fn causes workers to have identical random states. This produces identical augmentations across workers, reducing effective data diversity.
"""

explanation = """
DataLoader workers fork from the parent and inherit the same random state. Use worker_init_fn to seed each worker uniquely based on worker_id.
"""

tags = ["pytorch", "dataloader", "multiprocessing", "reproducibility"]
related_patterns = ["rep-001-incomplete-random-seeds", "rep-004-missing-random-seed"]
references = [
    "https://docs.pytorch.org/docs/stable/data.html",
    "https://docs.pytorch.org/docs/stable/notes/randomness.html",
]

[detection]
question = """
Analyze DataLoader for random state in workers.

When DataLoader uses num_workers>0, worker processes inherit identical numpy/random states, causing identical random augmentations across workers.

IMPORTANT: This is ONLY a problem when the Dataset uses random operations (numpy.random, random module, torch.random).

Does this code have BOTH conditions?
1. DataLoader with num_workers>0 without worker_init_fn
2. Dataset that uses random operations (np.random.*, random.*, torch.rand*)

Examples of CORRECT usage (NO bug):
- DataLoader with worker_init_fn provided
- DataLoader with num_workers=0
- Dataset with only deterministic transforms (Normalize, Resize, ToTensor) - no random ops
- Dataset that loads preprocessed data without random augmentation

YES = Bug: DataLoader(num_workers>0) without worker_init_fn AND Dataset uses random operations
NO = Correct: worker_init_fn provided, OR num_workers=0, OR Dataset has no random operations
"""

warning_message = """
DataLoader workers inherit identical random states. Add worker_init_fn to seed each worker uniquely for proper randomization.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/dataloader_no_init.py"
description = "DataLoader with workers but no worker_init_fn"
expected_issue = "DataLoader(num_workers>0) without worker_init_fn"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "create_dataloader"
snippet = "num_workers"
lines = [19, 24]

[[tests.negative]]
file = "test_negative/single_worker.py"
description = "DataLoader with num_workers=0"

[[tests.negative]]
file = "test_negative/deterministic_augmentation.py"
description = "Deterministic augmentation (no random)"

[[tests.negative]]
file = "test_negative/proper_worker_init.py"
description = "DataLoader with worker_init_fn for proper seeding"

