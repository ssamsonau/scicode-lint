[meta]
id = "rep-007"
name = "unstable-sort-with-ties"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using numpy sort() or argsort() without kind='stable' on data with ties produces non-deterministic ordering of equal elements. Default quicksort has arbitrary tie-breaking.
"""

explanation = """
For reproducible sorting with potential ties, use kind='stable' (mergesort) which preserves relative order of equal elements.
"""

tags = ["numpy", "sorting", "reproducibility"]
related_patterns = ["rep-011-set-iteration-order-dependency"]
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.sort.html",
]

[detection]
question = """
Analyze sorting for stable tie-breaking.

NumPy's default sort (quicksort) does not guarantee stable ordering of equal elements.
This matters when data has REALISTIC ties (integers, discrete categories, binned values).

Does this code sort INTEGER or DISCRETE data with potential ties without stable sort?

Look for:
- np.argsort() without kind='stable' on integer scores, rankings, categories
- Sorting discrete data (counts, labels, binned values) where ties are common

NOT a bug (answer NO) - ties are practically impossible or already handled:
- Continuous float outputs from neural networks (softmax, log_probs, embeddings)
- Random floating-point values (np.random.randn)
- Computed distances, similarities, or other continuous metrics
- Top-k selection on continuous scores (tie-breaking order doesn't matter if no ties)
- kind='stable' already specified
- np.lexsort() (always uses mergesort/stable internally)
- pandas sort_values() with kind='mergesort' or explicit tiebreaker column

YES = Bug: Unstable sort on INTEGER/DISCRETE data with likely ties
NO = Clean: Continuous ML outputs (ties impractical), kind='stable' used, or data is unique
"""

warning_message = """
Default numpy sort has non-deterministic tie-breaking. Use kind='stable' for reproducible ordering of equal elements.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/unstable_sort.py"
description = "Genomics pipeline sorting discretized expression levels, integer ages, variant counts without stable sort"
expected_issue = "np.argsort() and np.sort() without kind='stable' on discrete genomics data"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "rank_predictions"
snippet = "np.argsort(levels)"
lines = [9, 15, 20, 25]

[[tests.negative]]
file = "test_negative/unique_values.py"
description = "Sorting guaranteed unique values (no ties)"

[[tests.negative]]
file = "test_negative/pandas_tiebreaker.py"
description = "Using pandas rank with tiebreaker method"

[[tests.negative]]
file = "test_negative/stable_sort.py"
description = "Using kind='stable' for reproducible tie-breaking"

[[tests.negative]]
file = "test_negative/continuous_ml_outputs.py"
description = "Continuous float ML outputs (softmax, similarities, distances) - ties are practically impossible"

