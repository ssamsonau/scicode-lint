[meta]
id = "rep-008"
name = "pandas-sample-without-random-state"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using DataFrame.sample() or Series.sample() without random_state produces different samples each run, making experiments non-reproducible.
"""

explanation = """
Always specify random_state when sampling with pandas for reproducible results.
"""

tags = ["pandas", "sampling", "reproducibility"]
related_patterns = ["rep-004-missing-random-seed"]
references = [
    "https://pandas.pydata.org/docs/reference/api/pandas.DataFrame.sample.html",
]

[detection]
question = """
Analyze pandas sampling for reproducibility.

DataFrame.sample() and Series.sample() without random_state parameter produce different samples on each run. This affects data shuffling, bootstrap sampling, and subsampling operations.

Correct approach: Always specify random_state=42 or any fixed integer.

Does this code sample without random_state?

Look for:
- df.sample() without random_state
- series.sample() without random_state
- Sampling operations that will differ between runs

YES = Bug found: pandas sample() without random_state
NO = Correct: random_state specified, or no sampling
"""

warning_message = """
pandas sample() without random_state produces different samples each run. Add random_state for reproducibility.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/sample_no_state.py"
description = "Feature engineering class with sampling for subsampling, stats, and stratified downsample without random_state"
expected_issue = "self.df.sample() in multiple methods without random_state"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "subsample_data"
snippet = "self.df.sample(n=n)"
lines = [14, 18, 24]

[[tests.negative]]
file = "test_negative/sklearn_split.py"
description = "Using sklearn train_test_split instead"

[[tests.negative]]
file = "test_negative/no_sampling.py"
description = "Processing all data without sampling"

[[tests.negative]]
file = "test_negative/seeded_sample.py"
description = "Pandas sample with random_state for reproducibility"

[[tests.positive]]
file = "test_positive/sample_no_seed.py"
description = "Sampling operations without random_state for fixed counts, balanced sampling, and train-test splits"
expected_issue = "df.sample() with n parameter without random_state"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "subsample_data"
snippet = "df.sample(n=1000)"
lines = [5, 13, 19]

[[tests.positive]]
file = "test_positive/augmentation_sample.py"
description = "Data augmentation class using sample without random_state"
expected_issue = "df.sample() in oversample and bootstrap methods without random_state"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "oversample_minority"
snippet = ".sample(n=target_count"
lines = [15]
