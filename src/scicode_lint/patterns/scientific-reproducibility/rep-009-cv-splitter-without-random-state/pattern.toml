[meta]
id = "rep-009"
name = "cv-splitter-without-random-state"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using KFold, StratifiedKFold, or ShuffleSplit with shuffle=True but without random_state produces different folds each run, making cross-validation results non-reproducible.
"""

explanation = """
Always specify random_state when using shuffled cross-validation splitters for reproducible fold assignments.
"""

tags = ["sklearn", "cross-validation", "reproducibility"]
related_patterns = ["rep-001-incomplete-random-seeds", "rep-004-missing-random-seed"]
references = [
    "https://scikit-learn.org/stable/modules/cross_validation.html",
    "https://scikit-learn.org/stable/modules/generated/sklearn.model_selection.StratifiedKFold.html",
]

[detection]
question = """
Analyze cross-validation splitters for reproducibility.

scikit-learn CV splitters that shuffle data produce different fold assignments each run without random_state. This makes cross-validation scores non-reproducible.

Correct approach: Always specify random_state for shuffled splitters.

Does this code use shuffled CV splitters without random_state?

Look for:
- KFold(shuffle=True) without random_state
- StratifiedKFold(shuffle=True) without random_state
- ShuffleSplit() without random_state (ShuffleSplit always shuffles)
- GroupShuffleSplit() without random_state
- RepeatedKFold() or RepeatedStratifiedKFold() without random_state

YES = Bug found: shuffled CV splitter without random_state
NO = Correct: random_state specified, or shuffle=False (for KFold/StratifiedKFold)
"""

warning_message = """
CV splitter with shuffle=True but no random_state produces different folds each run. Add random_state for reproducibility.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.negative]]
file = "test_negative/no_shuffle_cv.py"
description = "CV with shuffle=False (no randomness)"

[[tests.negative]]
file = "test_negative/predefined_splits.py"
description = "Using predefined train/test splits"

[[tests.negative]]
file = "test_negative/seeded_cv.py"
description = "CV splitters with random_state parameter"

[[tests.positive]]
file = "test_positive/cv_no_seed.py"
description = "Multiple shuffled CV splitters (KFold, StratifiedKFold, ShuffleSplit) without random_state"
expected_issue = "KFold(n_splits=5, shuffle=True) missing random_state"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "cross_validate_model"
snippet = "kfold = KFold(n_splits=5, shuffle=True)"
lines = [10]

[[tests.positive]]
file = "test_positive/kfold_shuffle.py"
description = "Nested CV hyperparameter search class with KFold and ShuffleSplit missing random_state"
expected_issue = "KFold(shuffle=True) and ShuffleSplit() without random_state in nested CV"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "__init__"
snippet = "KFold(n_splits=5, shuffle=True)"
lines = [11, 12]

[[tests.positive]]
file = "test_positive/group_shuffle_split.py"
description = "GroupShuffleSplit and RepeatedStratifiedKFold without random_state"
expected_issue = "GroupShuffleSplit and RepeatedStratifiedKFold missing random_state"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "get_group_splitter"
snippet = "GroupShuffleSplit(n_splits"
lines = [8, 13, 18]
