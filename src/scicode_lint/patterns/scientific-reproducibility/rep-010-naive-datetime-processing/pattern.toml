[meta]
id = "rep-010"
name = "naive-datetime-processing"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using datetime.now() or datetime.utcnow() without timezone creates naive datetimes that depend on system timezone. Results vary between machines or after timezone/DST changes.
"""

explanation = """
Use timezone-aware datetimes: datetime.now(timezone.utc) instead of datetime.now() or datetime.utcnow().
"""

tags = ["datetime", "timezone", "reproducibility"]
related_patterns = []
references = [
    "https://docs.python.org/3/library/datetime.html",
    "https://docs.python.org/3/library/zoneinfo.html",
]

[detection]
question = """
Analyze datetime handling for REPRODUCIBILITY-CRITICAL timezone issues.

CRITICAL DISTINCTION - This pattern ONLY applies to datetimes that affect SCIENTIFIC REPRODUCIBILITY:
- Timestamps stored IN scientific data (experiment results, measurements, data files)
- Timestamps used for data filtering or selection (time-based splits, date ranges)
- Timestamps that must match across machines or runs for reproducibility

NOT a reproducibility issue (answer NO immediately):
- Directory/file naming for organizing outputs (e.g., results_2024_01_15/)
- Logging or display timestamps (human-readable output)
- User-facing metadata that can be overridden via arguments
- Progress reporting or console output
- Non-scientific organizational metadata

WHY THIS MATTERS: datetime.now() returns local timezone, datetime.utcnow() has no timezone info. Scientific data with naive timestamps varies between machines/timezones, breaking reproducibility.

For REPRODUCIBILITY-CRITICAL timestamps only, look for:
- datetime.now() without tz parameter stored in data
- datetime.utcnow() (deprecated) in scientific records
- datetime.fromtimestamp() without tz parameter in data processing

YES = Bug found: naive datetime in SCIENTIFIC DATA affecting reproducibility
NO = Organizational/logging use, OR timezone-aware datetime used
"""

warning_message = """
Naive datetime depends on system timezone. Use datetime.now(timezone.utc) for reproducible timestamps.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/naive_datetime.py"
description = "Creating naive datetimes without timezone in scientific data"
expected_issue = "datetime.now(), datetime.utcnow(), datetime.fromtimestamp() without timezone in data records"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "datetime.now()"
lines = [6, 11, 17, 18, 27]

[[tests.negative]]
file = "test_negative/unix_timestamp.py"
description = "Using unix timestamps (integer)"

[[tests.negative]]
file = "test_negative/no_datetime.py"
description = "No datetime operations"

[[tests.negative]]
file = "test_negative/timezone_aware.py"
description = "Using timezone-aware datetime.now(timezone.utc)"

[[tests.negative]]
file = "test_negative/directory_naming.py"
description = "Datetime for directory naming and logging - organizational metadata, not scientific data"

# === Auto-generated entries (review and update) ===
