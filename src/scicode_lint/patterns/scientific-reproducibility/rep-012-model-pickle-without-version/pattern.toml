[meta]
id = "rep-012"
name = "model-pickle-without-version"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Saving models with pickle/joblib without version metadata makes it impossible to identify the training environment. Models may produce different predictions or fail when loaded in different library versions.
"""

explanation = """
Save library versions alongside models: include sklearn.__version__, torch.__version__, etc. in the saved file or a separate metadata file.
"""

tags = ["pickle", "joblib", "serialization", "versioning"]
related_patterns = []
references = [
    "https://scikit-learn.org/stable/model_persistence.html",
]

[detection]
question = """
Does this code save models with pickle/joblib without version info anywhere?

Check the ENTIRE function/file for version tracking:
- pickle.dump() or joblib.dump() is used
- BUT no __version__ appears anywhere (not in bundle, not in metadata file)

Acceptable patterns (answer NO):
- Version in bundle: pickle.dump({"model": model, "sklearn_version": sklearn.__version__})
- Version in metadata file: json.dump({"sklearn_version": sklearn.__version__})
- torch.save (not pickle)

YES = Bug: model saved with pickle/joblib, but __version__ never appears in the function
NO = Clean: version info saved (in bundle or separate file), or uses torch.save, or no serialization
"""

warning_message = """
Model saved without version metadata. Include library versions (sklearn.__version__, torch.__version__) for reproducibility.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/save_without_version.py"
description = "Saving model without version metadata"
expected_issue = "pickle.dump(model) without version info"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "save_model"
snippet = "pickle.dump"

[[tests.negative]]
file = "test_negative/torch_save.py"
description = "Using torch.save (no pickle)"

[[tests.negative]]
file = "test_negative/onnx_export.py"
description = "Exporting to ONNX format"

[[tests.negative]]
file = "test_negative/versioned_save.py"
description = "Saving model with version metadata"

# === Auto-generated entries (review and update) ===
[[tests.positive]]
file = "test_positive/pickle_without_version.py"
