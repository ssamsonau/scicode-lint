snippet = "return loss == threshold"
lines = [5]

[[tests.positive]]
file = "test_positive/float32_exact_comparison.py"
description = "Using float32 for sum reductions and regression tests that require exact bit-level reproducibility"
expected_issue = "float32 computations may produce different results across architectures and math libraries"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "verify_computation"
snippet = "return result == expected"
lines = [7]
